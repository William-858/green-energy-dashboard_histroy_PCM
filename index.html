// ==================== 資料持久化 (新增) ====================
const STORAGE_KEY = 'dashboard_data_v1';
const OPINION_KEY = 'dashboard_opinion_v1';   // 輿情監控資料
const FILLING_BASE_KEY = 'dashboard_filling_base_v1';  // 填報基底資料(5 個 sheet)
const MONTH_PROJECTS_KEY = 'dashboard_month_projects_v1';  // 月報專案 + 收件狀態

// 填報基底資料(跟 DATA 完全分離),從 3 個 Excel 抽 5 個 sheet 而來
let DATA_FILLING = null;
try {
  const saved = localStorage.getItem(FILLING_BASE_KEY);
  if (saved) DATA_FILLING = JSON.parse(saved);
} catch(e) { console.warn('FILLING_BASE 載入失敗', e); }

// 月報專案 + 各管理處收件狀態
// 結構: { '11506': { period, created_at, submissions: { '桃園': {filler_name, filler_phone, submitted_at, source_file, sheets:{...}}, ... } } }
let MONTH_PROJECTS = {};
try {
  const saved = localStorage.getItem(MONTH_PROJECTS_KEY);

} catch(e) { console.warn('MONTH_PROJECTS 載入失敗', e); }

// ==================== 輿情監控功能 ====================
// loadOpinions / saveOpinions 支援 tab 分流 (solar/hydro)
// 為向後相容:若舊資料是 array,自動遷移到 solar
function loadAllOpinions() {
  try {
    const s = localStorage.getItem(OPINION_KEY);
    if (!s) return { solar: [], hydro: [] };
    const parsed = JSON.parse(s);
    // 舊版資料(array)→ 遷移成 solar
    if (Array.isArray(parsed)) {
      const migrated = { solar: parsed, hydro: [] };
      localStorage.setItem(OPINION_KEY, JSON.stringify(migrated));
      return migrated;
    }
    return { solar: parsed.solar || [], hydro: parsed.hydro || [] };
  } catch(e) { return { solar: [], hydro: [] }; }
}

function loadOpinions(tab) {
  const tabKey = tab || state.tab || 'solar';
  return loadAllOpinions()[tabKey] || [];
}

// 從同目錄抓 opinions.json(若有,代表這是「公開部署版」)
// 抓到後寫進 localStorage 作為主要資料來源
async function fetchOpinionsFromServer() {
  // 加上 cache buster 避免瀏覽器/CDN 快取舊版
  const url = 'opinions.json?t=' + Date.now();
  try {
    const resp = await fetch(url, { cache: 'no-store' });
    if (!resp.ok) return null;
    const data = await resp.json();
    // 驗證結構
    if (!data || typeof data !== 'object') return null;
    const normalized = {
      solar: Array.isArray(data.solar) ? data.solar : [],
      hydro: Array.isArray(data.hydro) ? data.hydro : []
    };
    // 寫進 localStorage(覆蓋本機;PDF 等大型內容仍會保留在本機,因為 server 端 JSON 不含 base64)
    // 為了不損失本機已上傳的 PDF base64,做合併:server 是基底,但本機已存在的 base64 留著
    try {
      const local = loadAllOpinions();
      ['solar','hydro'].forEach(tab => {
        normalized[tab].forEach(serverOp => {
          const localOp = (local[tab] || []).find(x => x.id === serverOp.id);
          if (!localOp) return;
          // 合併 negative/clarification 的 PDF base64(若 server 沒有但本機有,把 base64 補回去)
          ['negative','clarification'].forEach(side => {
            (serverOp[side] || []).forEach(srvSrc => {
              if (srvSrc.type === 'pdf' && !srvSrc.base64) {
                const localSrc = (localOp[side] || []).find(s => s.id === srvSrc.id);
                if (localSrc && localSrc.base64) {
                  srvSrc.base64 = localSrc.base64;
                  srvSrc.filename = srvSrc.filename || localSrc.filename;
                  srvSrc.filesize = srvSrc.filesize || localSrc.filesize;
                }
              }
            });
          });
        });
      });
    } catch(e) { /* 合併失敗也沒關係,server 版仍可用 */ }
    
    localStorage.setItem(OPINION_KEY, JSON.stringify(normalized));
    return normalized;
  } catch(e) {
    // 沒有 opinions.json 是正常的(本機開發/未發布雲端版),靜默
    return null;
  }
}

// 從同目錄抓 data.json(若有,代表這是「公開部署版」)
// 抓到後寫進 localStorage,讓所有開網頁的人看到一樣的最新資料
async function fetchDataFromServer() {
  const url = 'data.json?t=' + Date.now();
  try {
    const resp = await fetch(url, { cache: 'no-store' });
    if (!resp.ok) return null;
    const data = await resp.json();
    // 驗證結構
    if (!data || typeof data !== 'object' || !data.solar || !data.hydro) return null;
    // 寫進 localStorage 並更新 DATA / ORIGINAL_DATA
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    DATA = data;
    ORIGINAL_DATA = JSON.parse(JSON.stringify(data));
    try { recomputeSummaries(); } catch(e) {}
    return data;
  } catch(e) {
    // 沒 data.json 是正常的(舊環境/未發布雲端版),靜默
    return null;
  }
}

// 匯出 DATA 為 data.json 給使用者下載(供上傳到 GitHub 與他人同步)
function exportDataForDeploy() {
  const json = JSON.stringify(DATA, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'data.json';
  a.click();

// 安全取字串
function _str(v) { return v == null ? '' : String(v).replace(/^\s+|\s+$/g, ''); }
// 安全取數字
function _num(v) { 
  if (v == null || v === '') return null; 
  const n = parseFloat(String(v).replace(/[^0-9.\-]/g, ''));

}

// 從一個 workbook 找出符合的 sheet
function _findSheet(wb, parser) {
  // 先試精準名
  for (const exact of parser.sheetNames) {
    if (wb.SheetNames.includes(exact)) return exact;
  }
  // 再試模糊比對
  for (const sn of wb.SheetNames) {
    for (const contains of parser.sheetNameContains) {
      if (sn.includes(contains)) return sn;
    }
  }
  return null;
}

// 從一份 workbook 抽出所有可解析的 sheet 資料
function _parseFillingWorkbook(wb, sourceFileName) {
  const result = {};
  for (const [key, parser] of Object.entries(FILLING_SHEET_PARSERS)) {
    const sheetName = _findSheet(wb, parser);
    if (!sheetName) continue;
    
    const ws = wb.Sheets[sheetName];
    const arr = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', blankrows: false });
    if (arr.length <= parser.dataStartRow) continue;
    
    const records = [];
    for (let i = parser.dataStartRow; i < arr.length; i++) {
      const row = arr[i];
      if (!row || row.length === 0) continue;
      const obj = parser.parseRow(row, i);
      if (obj) records.push(obj);
    }
    
    if (records.length > 0) {
      result[key] = { 
        records, 
        sourceFile: sourceFileName, 
        sheetName,
        label: parser.label
      };
    }
  }
  return result;
}

// 主入口:接收多個 Excel 檔
async function importFillingBase(event) {
  const files = Array.from(event.target.files || []);
  if (files.length === 0) return;
  event.target.value = '';  // 清掉,讓同檔可以重選
  
  const merged = {
    imported_at: new Date().toISOString(),
    source_files: [],
    solar_addendum: [],
    hydro_tender: [],
    hydro_test: [],
    hydro_potential: [],
    hydro_inquiry: []
  };
  
  const summaries = [];
  
  for (const file of files) {
    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: 'array', cellDates: false });
      const parsed = _parseFillingWorkbook(wb, file.name);
      
      merged.source_files.push({ name: file.name, sheets_found: Object.keys(parsed) });
      
      // 把每個 key 的 records 合併進 merged
      // 規則:同類 sheet 在多個檔出現時,後匯入取代前面(因為通常最新檔放後面)
      for (const [key, info] of Object.entries(parsed)) {
        if (merged[key].length > 0) {
          summaries.push(`✓ ${file.name} → ${info.label}: ${info.records.length} 筆(取代了前面匯入的 ${merged[key].length} 筆)`);
        } else {
          summaries.push(`✓ ${file.name} → ${info.label}: ${info.records.length} 筆`);
        }
        merged[key] = info.records;
      }
    } catch(err) {
      console.error('讀檔失敗:', file.name, err);
      summaries.push(`✗ ${file.name} 讀取失敗:${err.message}`);
    }
  }
  
  const totalCount = merged.solar_addendum.length + merged.hydro_tender.length + 
    merged.hydro_test.length + merged.hydro_potential.length + merged.hydro_inquiry.length;
  
  if (totalCount === 0) {
    alert('⚠️ 未抽出任何資料\n\n' + summaries.join('\n') + 
      '\n\n請確認 Excel 內含下列任一 sheet:\n' +
      '· 附件一(太陽光電)\n· 招標案\n· 測試案\n· 潛力案場\n· 洽詢紀錄表');
    return;
  }
  
  // 確認是否要覆蓋
  if (DATA_FILLING && (DATA_FILLING.solar_addendum.length + DATA_FILLING.hydro_tender.length > 0)) {
    if (!confirm('已有舊的填報基底資料,確定要覆蓋?\n\n新匯入:\n' + 
      '· 太陽光電(附件一):' + merged.solar_addendum.length + ' 筆\n' +
      '· 小水力-招標案:' + merged.hydro_tender.length + ' 筆\n' +
      '· 小水力-測試案:' + merged.hydro_test.length + ' 筆\n' +
      '· 小水力-潛力案場:' + merged.hydro_potential.length + ' 筆\n' +
      '· 小水力-洽詢紀錄:' + merged.hydro_inquiry.length + ' 筆')) {
      return;
    }
  }
  
  // 寫入 localStorage + 全域變數
  DATA_FILLING = merged;
  try {
    localStorage.setItem(FILLING_BASE_KEY, JSON.stringify(merged));
  } catch(err) {
    alert('寫入 localStorage 失敗(可能容量超出):' + err.message);
    return;
  }
  
  // 統計各管理處分布
  const mgmtStats = {};
  ['solar_addendum', 'hydro_tender', 'hydro_test', 'hydro_potential', 'hydro_inquiry'].forEach(key => {
    merged[key].forEach(r => {
      const m = r.mgmt || '(未填)';
      if (!mgmtStats[m]) mgmtStats[m] = { solar: 0, tender: 0, test: 0, potential: 0, inquiry: 0 };
      const shortKey = { solar_addendum:'solar', hydro_tender:'tender', hydro_test:'test', 
                         hydro_potential:'potential', hydro_inquiry:'inquiry' }[key];
      mgmtStats[m][shortKey]++;
    });
  });
  
  let mgmtBreakdown = '\n各管理處分布(光電/招標/測試/潛力/洽詢):\n';
  Object.entries(mgmtStats).sort().forEach(([m, s]) => {
    const total = s.solar + s.tender + s.test + s.potential + s.inquiry;
    mgmtBreakdown += `  ${m}: ${s.solar}/${s.tender}/${s.test}/${s.potential}/${s.inquiry} (共 ${total})\n`;
  });
  
  render();
  
  alert('✅ 填報基底匯入成功!\n\n' +
    summaries.join('\n') + '\n\n' +
    '─────────────────\n總計:\n' +
    '· 太陽光電(附件一):' + merged.solar_addendum.length + ' 案\n' +
    '· 小水力-招標案:' + merged.hydro_tender.length + ' 案\n' +
    '· 小水力-測試案:' + merged.hydro_test.length + ' 案\n' +
    '· 小水力-潛力案場:' + merged.hydro_potential.length + ' 案\n' +
    '· 小水力-洽詢紀錄:' + merged.hydro_inquiry.length + ' 案\n' +
    mgmtBreakdown);
}

// 5 個資料 sheet 對應到 MONTH_PROJECTS 的 5 個 key
const SUBMISSION_SHEET_MAP = {
  '太陽光電': { key: 'solar_addendum', label: '太陽光電(附件一)' },
  '招標案': { key: 'hydro_tender', label: '小水力-招標案' },
  '測試案': { key: 'hydro_test', label: '小水力-測試案' },
  '潛力案場': { key: 'hydro_potential', label: '小水力-潛力案場' },
  '洽詢紀錄': { key: 'hydro_inquiry', label: '小水力-洽詢紀錄' }
};

// 從填報 Excel 的 Metadata sheet 抽 metadata
function _parseSubmissionMetadata(wb) {
  const ws = wb.Sheets['Metadata'];
  if (!ws) return null;
  const arr = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', blankrows: false });
  const meta = {};
  arr.forEach(row => {
    const k = _str(row[0]); const v = _str(row[1]);
    if (k === '期別') meta.period = v;
    else if (k === '管理處') meta.mgmt = v;
    else if (k === '填報人姓名') meta.filler_name = v;
    else if (k === '聯絡電話') meta.filler_phone = v;
    else if (k === '填報時間') meta.submitted_at = v;
    else if (k === '快照日期') meta.snapshot_date = v;
    else if (k === '快照來源') meta.snapshot_source = v;
  });
  return meta;
}

// 從某個 sheet 抽資料(用標題列當欄位 mapper)
function _parseSubmissionSheet(ws) {
  const arr = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', blankrows: false });
  if (arr.length < 2) return [];
  const headers = arr[0].map(h => _str(h));
  const records = [];
  for (let i = 1; i < arr.length; i++) {
    const row = arr[i];
    if (!row || row.length === 0) continue;
    const obj = {};
    headers.forEach((h, j) => { if (h) obj[h] = row[j] != null ? row[j] : ''; });
    // 至少要有「狀態」或「管理處」其中之一非空才當有效資料
    if (_str(obj['狀態']) || _str(obj['管理處']) || _str(obj['案場名稱']) || _str(obj['案名']) || _str(obj['圳路名稱']) || _str(obj['洽詢單位'])) {
      records.push(obj);
    }
  }
  return records;
}

// 主入口:接收多個填報 Excel
async function importMonthlySubmissions(event) {
  const files = Array.from(event.target.files || []);
  if (files.length === 0) return;
  event.target.value = '';
  
  const results = [];   // { file, status, msg, period, mgmt }
  const periodSet = new Set();
  
  for (const file of files) {
    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: 'array', cellDates: false });
      
      // 抽 Metadata
      const meta = _parseSubmissionMetadata(wb);
      if (!meta || !meta.period || !meta.mgmt) {
        results.push({ file: file.name, status: 'error', msg: '無法解析 Metadata(請確認 Excel 是用 filling.html 產出的)' });
        continue;
      }
      
      periodSet.add(meta.period);
      
      // 抽 5 個資料 sheet
      const sheets = {};
      for (const [sheetName, conf] of Object.entries(SUBMISSION_SHEET_MAP)) {
        if (wb.Sheets[sheetName]) {
          sheets[conf.key] = _parseSubmissionSheet(wb.Sheets[sheetName]);
        } else {
          sheets[conf.key] = [];
        }
      }
      
      const totalRecords = Object.values(sheets).reduce((a, arr) => a + arr.length, 0);
      
      // 確保 MONTH_PROJECTS[period] 存在
      if (!MONTH_PROJECTS[meta.period]) {
        MONTH_PROJECTS[meta.period] = {
          period: meta.period,
          created_at: new Date().toISOString(),
          submissions: {}
        };
      }
      
      // 寫入 submission
      MONTH_PROJECTS[meta.period].submissions[meta.mgmt] = {
        filler_name: meta.filler_name || '',
        filler_phone: meta.filler_phone || '',
        submitted_at: meta.submitted_at || '',
        source_file: file.name,
        imported_at: new Date().toISOString(),
        snapshot_date: meta.snapshot_date || '',
        snapshot_source: meta.snapshot_source || '',
        sheets: sheets,
        total_records: totalRecords
      };
      
      results.push({ 
        file: file.name, status: 'ok', period: meta.period, mgmt: meta.mgmt,
        msg: meta.mgmt + ' (' + meta.filler_name + ') · 共 ' + totalRecords + ' 筆'
      });
    } catch(err) {
      console.error('讀檔失敗:', file.name, err);
      results.push({ file: file.name, status: 'error', msg: '讀取失敗:' + err.message });
    }
  }
  
  // 寫回 localStorage
  try {
    localStorage.setItem(MONTH_PROJECTS_KEY, JSON.stringify(MONTH_PROJECTS));
  } catch(err) {
    alert('⚠️ localStorage 寫入失敗(容量超出):' + err.message + '\n\n請先清除舊期報資料。');
    return;
  }
  
  render();
  
  // 顯示結果摘要
  const okCount = results.filter(r => r.status === 'ok').length;
  const errCount = results.filter(r => r.status === 'error').length;
  let msg = '✅ 月報填報匯入完成\n\n';
  msg += '成功:' + okCount + ' 處\n';
  if (errCount > 0) msg += '失敗:' + errCount + ' 處\n';
  msg += '\n──────────────\n';
  results.forEach(r => {
    msg += (r.status === 'ok' ? '✓ ' : '✗ ') + r.file + '\n   ' + r.msg + '\n';
  });
  
  if (periodSet.size > 0) {
    msg += '\n📋 涉及期別:' + Array.from(periodSet).join('、');
    msg += '\n\n捲動到頁面下方「月報收件狀態」可看完整收件清單';
  }
  
  alert(msg);
}

// 移除某管理處的填報(誤匯入或要重收時用)
function removeSubmission(period, mgmt) {
  if (!confirm('確定要移除「' + period + ' · ' + mgmt + '」的填報資料嗎?\n\n移除後,該管理處狀態會變回「未收到」,需要重新匯入。')) return;
  if (MONTH_PROJECTS[period] && MONTH_PROJECTS[period].submissions[mgmt]) {
    delete MONTH_PROJECTS[period].submissions[mgmt];
    // 若該期沒有任何 submission,整個移除
    if (Object.keys(MONTH_PROJECTS[period].submissions).length === 0) {
      delete MONTH_PROJECTS[period];
    }
    localStorage.setItem(MONTH_PROJECTS_KEY, JSON.stringify(MONTH_PROJECTS));
    render();
  }
}

function removeMonthProject(period) {

  delete MONTH_PROJECTS[period];
  localStorage.setItem(MONTH_PROJECTS_KEY, JSON.stringify(MONTH_PROJECTS));
  render();

// 依「辦理情形」文字關鍵字重新判定小水力異常(與 Python 端建構資料時邏輯一致)
const HYDRO_ANOMALY_MAP = [
  ['機組已拆除', '機組已拆除', 'yellow'],
  ['機組待拆除', '機組待拆除', 'yellow'],
  ['機組調整中', '機組調整中', 'yellow'],
  ['已終止契約', '已終止契約', 'red'],
  ['已撤案', '已撤案', 'red'],
  ['暫緩辦理', '暫緩辦理', 'red'],
  ['籌辦招標', '暫緩辦理', 'red']
];
function deriveHydroAnomaly(operation) {
  const op = String(operation || '');
  for (const [kw, type, level] of HYDRO_ANOMALY_MAP) {
    if (op.includes(kw)) return { is_anomaly: true, anomaly_type: type, anomaly_level: level };
  }
  return { is_anomaly: false, anomaly_type: '', anomaly_level: '' };
}

// 太陽光電「目前階段」(SOLAR_STAGE_OPTIONS) → 案場清單「階段」(7階段)對應
// 填報端選項: 土地容許/施工階段/併聯審查/已解約/尚未送件/已併網/併聯審查(未送)/電業籌設
const SOLAR_STAGE_FILLING_MAP = {
  '已併網': '已完工',
  '施工階段': '施工中',
  '已解約': '解約',
  '土地容許': '申設中',
  '電業籌設': '申設中',
  '併聯審查': '申設中',
  '併聯審查(未送)': '規劃中',
  '尚未送件': '規劃中'
};

// 把單筆 solar 案場物件依填報資料更新(直接 mutate)
function _applySolarUpdate(site, row, period) {
  let changed = false;
  const noteParts = [];

  // 裝置容量(MW):填報有填且非空非0則覆蓋
  const mw = row['裝置容量(MW)'];
  if (mw !== '' && mw != null && !isNaN(parseFloat(mw)) && parseFloat(mw) !== 0) {
    if (site.capacity_mw !== parseFloat(mw)) {
      noteParts.push('容量 ' + site.capacity_mw + '→' + parseFloat(mw) + ' MW');
      site.capacity_mw = parseFloat(mw);
      changed = true;
    }
  }

  // 目前階段 → 階段
  const stageRaw = String(row['目前階段'] || '').trim();
  if (stageRaw && SOLAR_STAGE_FILLING_MAP[stageRaw]) {
    const newStage = SOLAR_STAGE_FILLING_MAP[stageRaw];
    if (site.stage !== newStage) {
      noteParts.push('階段 ' + site.stage + '→' + newStage);
      site.stage = newStage;
      changed = true;
    }
  }

  // 目前辦理情況/困難點說明/專案團隊處理建議/備註 → 附加到 note
  const extraNotes = [];
  ['目前辦理情況', '困難點說明', '專案團隊處理建議', '備註'].forEach(k => {
    const v = String(row[k] || '').trim();
    if (v) extraNotes.push(v);
  });
  if (extraNotes.length > 0) {
    const tag = '[' + period + ']更新:' + extraNotes.join('；');
    site.note = (site.note ? site.note + '\n' : '') + tag;
    changed = true;
  }

  if (changed && noteParts.length > 0) {
    site.note = (site.note ? site.note + '\n' : '') + '[' + period + ']' + noteParts.join('、');
  }

  return changed;
}

// 把單筆 hydro 案場物件依填報資料更新(直接 mutate)
function _applyHydroUpdate(site, row, period, isTender) {
  let changed = false;

  // 裝置容量(kW):填報有填且非空非0則覆蓋
  const kw = row['裝置容量(kW)'];
  if (kw !== '' && kw != null && !isNaN(parseFloat(kw)) && parseFloat(kw) !== 0) {
    if (site.capacity_kw !== parseFloat(kw)) {
      site.capacity_kw = parseFloat(kw);
      changed = true;
    }
  }

  // 辦理情形 → 附加到 operation,並重新判定異常
  const opRaw = String(row['辦理情形'] || '').trim();
  if (opRaw) {
    site.operation = (site.operation ? site.operation + '\n' : '') + '[' + period + ']更新:' + opRaw;
    const anomaly = deriveHydroAnomaly(opRaw);
    site.is_anomaly = anomaly.is_anomaly;
    site.anomaly_type = anomaly.anomaly_type;
    site.anomaly_level = anomaly.anomaly_level;
    changed = true;
  }

  // 廠商:若原本空白且填報有填,補上
  const vendor = String(row['廠商'] || '').trim();
  if (vendor && !site.vendor) {
    site.vendor = vendor;
    changed = true;
  }

  // 遭遇困難事項/近期預計規劃辦理事項/備註 → 附加到 note
  const extraNotes = [];
  const noteFields = isTender
    ? ['遭遇困難事項', '近期預計規劃辦理事項', '備註']
    : ['近期預計規劃辦理事項', '備註'];
  noteFields.forEach(k => {
    const v = String(row[k] || '').trim();
    if (v) extraNotes.push(v);
  });
  if (extraNotes.length > 0) {
    const tag = '[' + period + ']更新:' + extraNotes.join('；');
    site.note = (site.note ? site.note + '\n' : '') + tag;
    changed = true;
  }

  return changed;
}

// 主入口:依指定期別的全部填報,更新 DATA.solar.*_sites 與 DATA.hydro.sites
// 回傳 { updated: [...], unmatched: [...] } 供畫面顯示
function applyMonthlySubmissions(period) {
  const proj = MONTH_PROJECTS[period];
  if (!proj) {
    alert('找不到期別 ' + period + ' 的月報專案');
    return null;
  }

  const updated = [];   // { category, name, mgmt, fields }
  const unmatched = []; // { category, name, mgmt, sheet }

  // 太陽光電:合併 5 個陣列以便用名稱搜尋
  const allSolarSections = ['completed_sites','construction_sites','admin_sites','planning_sites','cancelled_sites'];

  Object.entries(proj.submissions).forEach(([mgmt, sub]) => {
    const sheets = sub.sheets || {};

    // --- 太陽光電 ---
    (sheets.solar_addendum || []).forEach(row => {
      const name = String(row['案場名稱'] || '').trim();
      if (!name) return;
      let found = null;
      for (const sec of allSolarSections) {
        const arr = DATA.solar[sec];
        const idx = arr.findIndex(s => s.name === name);
        if (idx >= 0) { found = arr[idx]; break; }
      }
      if (!found) {
        unmatched.push({ category: 'solar', name, mgmt, sheet: '太陽光電' });
        return;
      }
      const changed = _applySolarUpdate(found, row, period);
      if (changed) updated.push({ category: 'solar', name, mgmt });
    });

    // --- 小水力:招標案 ---
    (sheets.hydro_tender || []).forEach(row => {
      const name = String(row['案名'] || '').trim();
      if (!name) return;
      const site = DATA.hydro.sites.find(s => s.name === name);
      if (!site) {
        unmatched.push({ category: 'hydro', name, mgmt, sheet: '招標案' });
        return;
      }
      const changed = _applyHydroUpdate(site, row, period, true);
      if (changed) updated.push({ category: 'hydro', name, mgmt });
    });

    // --- 小水力:測試案 ---
    (sheets.hydro_test || []).forEach(row => {
      const name = String(row['圳路名稱'] || '').trim();
      if (!name) return;
      const site = DATA.hydro.sites.find(s => s.name === name);
      if (!site) {
        unmatched.push({ category: 'hydro', name, mgmt, sheet: '測試案' });
        return;
      }
      const changed = _applyHydroUpdate(site, row, period, false);
      if (changed) updated.push({ category: 'hydro', name, mgmt });
    });

    // 潛力案場 / 洽詢紀錄:不更新 405/92 案清單
  });

  // 重算 summary / mgmt 統計
  recomputeSummaries();

  // 寫回 localStorage
  saveData();

  return { updated, unmatched };
}

        </div>

        <div class="rounded-lg p-3 mb-4" style="background:#f5f3ff;border:1px solid #ddd6fe">
          <div class="flex items-baseline justify-between mb-2">
            <span class="text-sm font-semibold" style="color:#6d28d9">收件進度</span>

          </div>
          <div style="height:8px;background:white;border-radius:4px;overflow:hidden">
            <div style="height:100%;width:${(collected/totalMgmts*100).toFixed(1)}%;background:linear-gradient(to right,#7c3aed,#a78bfa);transition:width 0.3s"></div>
          </div>
          <p class="text-xs mt-2" style="color:#6d28d9">${(collected/totalMgmts*100).toFixed(0)}% 完成 · 尚缺 ${totalMgmts - collected} 處</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
          ${rows}
        </div>
      </div>
    </section>
  `;
}

// 取得預設期別:用今天的民國年月,例如 2026/06 → 11506
function defaultPeriodCode() {
  const now = new Date();
  const yyyMm = (now.getFullYear() - 1911) * 100 + (now.getMonth() + 1);
  return String(yyyMm);
}

// 主要工作:產生 filling_XXXXX.html 並下載
function generateFillingHtml() {
  const periodInput = document.getElementById('np-period');
  if (!periodInput) { alert('找不到期別欄位'); return; }
  const period = periodInput.value.trim();
  
  // 驗證:期別應為 5 碼民國年月,例如 11506
  if (!/^\d{5}$/.test(period)) {
    alert('期別格式錯誤,請輸入 5 碼民國年月(例:11506 表示民國 115 年 6 月)');
    return;
  }
  
  // 用 DATA_FILLING(填報基底資料)當快照
  if (!DATA_FILLING) {
    alert('⚠️ 尚未匯入填報基底資料\n\n請先點工具列「📥 匯入填報基底」按鈕,選擇 3 個基底 Excel(小水力盤點 + 太陽光電進度 + 太陽光電盤點)。');
    return;
  }
  const snapshot = JSON.parse(JSON.stringify(DATA_FILLING));
  const metadata = {
    period: period,
    created_at: new Date().toISOString(),
    snapshot_date: DATA_FILLING.imported_at ? DATA_FILLING.imported_at.split('T')[0] : (new Date().toISOString().split('T')[0]),
    snapshot_source: (DATA_FILLING.source_files || []).map(f => f.name).join(' + ') || '(未填)'
  };
  
  // 生出 filling HTML 內容(階段 A:placeholder,階段 B 會放真實填報表單)
  const html = buildFillingHtml(period, snapshot, metadata);
  
  // 觸發下載
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'filling_' + period + '.html';
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  
  // 顯示後續步驟提示
  const totalSolar = (snapshot.solar_addendum||[]).length;
  const totalTender = (snapshot.hydro_tender||[]).length;
  const totalTest = (snapshot.hydro_test||[]).length;
  const totalPot = (snapshot.hydro_potential||[]).length;
  const totalInq = (snapshot.hydro_inquiry||[]).length;
  const totalHydro = totalTender + totalTest + totalPot + totalInq;
  
  alert('✅ 已下載 filling_' + period + '.html\n\n' +
    '📊 內含資料快照:\n' +
    '  · 太陽光電(附件一):' + totalSolar + ' 案\n' +
    '  · 小水力-招標案:' + totalTender + ' 案\n' +
    '  · 小水力-測試案:' + totalTest + ' 案\n' +
    '  · 小水力-潛力案場:' + totalPot + ' 案\n' +
    '  · 小水力-洽詢紀錄:' + totalInq + ' 案\n' +
    '  · 資料日期:' + metadata.snapshot_date + '\n\n' +
    '📋 後續步驟:\n' +
    '1. 把 filling_' + period + '.html 上傳到 GitHub repo(跟 index.html 同目錄)\n' +
    '2. 等 GitHub Pages 部署完成(約 1 分鐘)\n' +
    '3. 把以下連結 mail 給 14 個管理處窗口:\n' +
    '   https://william-858.github.io/green-energy-dashboard_histroy_PCM/filling_' + period + '.html\n\n' +
    '⚠️ 目前是階段 A,filling 頁面是 placeholder。\n' +
    '   完整填報功能將在階段 B 完成。');
  
  // 關閉 modal
  setState({ newProjectModal: false });
}

// 建立 filling.html 完整內容 — 階段 B:完整填報表單
function buildFillingHtml(period, snapshot, metadata) {
  // 民國年月轉中文
  const yyy = Math.floor(parseInt(period) / 100);
  const mm = parseInt(period) % 100;
  const periodLabel = '民國 ' + yyy + ' 年 ' + mm + ' 月';
  
  // 解碼 template(用 TextDecoder 正確處理 UTF-8)
  const bytes = Uint8Array.from(atob(FILLING_TEMPLATE_B64), c => c.charCodeAt(0));
  let template = new TextDecoder('utf-8').decode(bytes);
  
  // 準備 placeholder 值
  const replacements = {
    '__PERIOD__': period,
    '__PERIOD_LABEL__': periodLabel,
    '__SNAPSHOT_DATE__': metadata.snapshot_date || '(未填)',
    '__SNAPSHOT_SOURCE__': metadata.snapshot_source || '(未填)',
    '__CREATED_AT__': metadata.created_at || '',
    '__SNAPSHOT_JSON__': JSON.stringify(snapshot),
    '__METADATA_JSON__': JSON.stringify(metadata),
    // script tag 拆開,避免 dashboard 內的 HTML parser 把 main script 提早結束
    '__SNAPSHOT_SCRIPT_TAG_OPEN__': '<' + 'script ',
    '__SNAPSHOT_SCRIPT_TAG_CLOSE__': '<' + '/script>'
  };
  
  // 套用 placeholder
  for (const [key, val] of Object.entries(replacements)) {
    template = template.split(key).join(val);
  }
  
  return template;
}

// 匯出輿情 JSON 給使用者下載(供上傳到 GitHub)
// 自動把 PDF base64 抽掉(太大、隱私問題),只保留結構性資料
function exportOpinionsJson() {
  const all = loadAllOpinions();
  const exported = { solar: [], hydro: [] };
  
  let pdfCount = 0;
  ['solar','hydro'].forEach(tab => {
    (all[tab] || []).forEach(op => {
      // 深拷貝
      const copy = JSON.parse(JSON.stringify(op));
      ['negative','clarification'].forEach(side => {
        (copy[side] || []).forEach(src => {
          if (src.type === 'pdf' && src.base64) {
            delete src.base64;     // 移除 base64,避免 JSON 過大
            src._pdf_local_only = true;
            pdfCount++;
          }
        });
      });
      exported[tab].push(copy);
    });
  });
  
  const json = JSON.stringify(exported, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'opinions.json';
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  
  // 提示
  const totalCount = (exported.solar.length + exported.hydro.length);
  let msg = '✅ 已匯出 opinions.json(共 ' + totalCount + ' 個輿情事件)\n\n';
  msg += '📋 後續步驟:\n';
  msg += '1. 把 opinions.json 上傳到你的 GitHub repo(跟 index.html 同目錄)\n';
  msg += '2. Commit & Push(或網頁版直接拖檔覆蓋)\n';
  msg += '3. GitHub Pages 約 1 分鐘後生效,其他人重整就會看到\n';
  if (pdfCount > 0) {
    msg += '\n⚠️ 注意:有 ' + pdfCount + ' 個 PDF 因檔案過大未匯出。\n';
    msg += '   其他人會看到 PDF 標題與摘要,但無法開啟檔案。\n';
    msg += '   建議:把重要 PDF 上傳到 Google Drive,改用「URL 來源」放連結。';
  }
  alert(msg);
}

// ===== case_ref 選項清單生成 =====
// 回傳格式: [{ group: '群組名', options: [{value, label, meta}] }]
function getCaseRefOptions(tab) {
  const groups = [];
  if (tab === 'solar') {
    const stages = [
      { key: 'completed_sites', label: '已完工案場' },
      { key: 'construction_sites', label: '施工/待施工/停工中' },
      { key: 'admin_sites', label: '行政程序中' },
      { key: 'planning_sites', label: '規劃推動/招商中' },
      { key: 'cancelled_sites', label: '解約/撤案' }
    ];
    stages.forEach(s => {
      const rows = DATA.solar[s.key] || [];
      if (rows.length === 0) return;
      groups.push({
        group: '太陽光電 - ' + s.label,
        options: rows.map((r, idx) => ({
          value: 'solar:' + s.key + ':' + idx,
          label: r.name || '(無名稱)',
          meta: { mgmt: r.mgmt, capacity: r.capacity_mw }
        }))
      });
    });
    // 管理處(去重)
    const mgmts = [...new Set((DATA.solar.completed_sites || [])
      .concat(DATA.solar.construction_sites || [])
      .concat(DATA.solar.admin_sites || [])
      .concat(DATA.solar.planning_sites || [])
      .map(r => r.mgmt).filter(Boolean))];
    if (mgmts.length) {
      groups.push({
        group: '太陽光電 - 管理處',
        options: mgmts.sort().map(m => ({
          value: 'solar:mgmt:' + m,
          label: m + '管理處',
          meta: {}
        }))
      });
    }
  } else {
    // 小水力
    const sites = DATA.hydro.sites || [];
    if (sites.length) {
      groups.push({
        group: '小水力 - 案場',
        options: sites.map((r, idx) => ({
          value: 'hydro:sites:' + idx,
          label: r.name || '(無名稱)',
          meta: { mgmt: r.mgmt, capacity: r.capacity_kw }
        }))
      });
    }
    const mgmts = [...new Set(sites.map(r => r.mgmt).filter(Boolean))];
    if (mgmts.length) {
      groups.push({
        group: '小水力 - 管理處',
        options: mgmts.sort().map(m => ({
          value: 'hydro:mgmt:' + m,
          label: m + '管理處',
          meta: {}
        }))
      });
    }
  }
  return groups;
}

// ===== 從 case_ref 解析回完整案場資訊 =====
// case_ref 格式: 'solar:completed_sites:5' 或 'solar:mgmt:嘉南'
function resolveCaseRef(caseRef) {
  if (!caseRef || typeof caseRef !== 'string') return null;
  const parts = caseRef.split(':');
  if (parts.length < 3) return null;
  const [category, kind, key] = parts;
  
  if (kind === 'mgmt') {
    // 管理處關聯:回傳該管理處的彙整資訊
    if (category === 'solar') {
      const m = (DATA.solar.mgmt || []).find(x => x.name === key);
      if (!m) return { type: 'mgmt', category, name: key + '管理處', notFound: true };
      return {
        type: 'mgmt', category, name: key + '管理處',
        target_mw: m.target_mw,
        completed_mw: m.completed_mw,
        achievement_pct: m.achievement_pct,
        total_potential_mw: m.total_potential_mw
      };
    } else {
      const m = (DATA.hydro.mgmt || []).find(x => x.name === key);
      if (!m) return { type: 'mgmt', category, name: key + '管理處', notFound: true };
      return {
        type: 'mgmt', category, name: key + '管理處',
        cases: m.cases,
        capacity_kw: m.capacity_kw,
        completed_cases: m.completed_cases,
        in_progress_cases: m.in_progress_cases,
        anomaly_cases: m.anomaly_cases
      };
    }
  }
  
  // 案場關聯
  const idx = parseInt(key);
  let row;
  if (category === 'solar') {
    row = (DATA.solar[kind] || [])[idx];
  } else if (category === 'hydro') {
    row = (DATA.hydro[kind] || [])[idx];
  }
  if (!row) return { type: 'site', category, kind, idx, notFound: true };
  
  return { type: 'site', category, kind, idx, row };
}

// 從 URL 自動識別來源(100% 可靠,只解析 URL 字串,不發網路請求)
function detectSourceFromUrl(url) {
  if (!url || typeof url !== 'string') return '';
  // 取出 hostname
  let host = '';
  try {
    const u = new URL(url);
    host = u.hostname.toLowerCase().replace(/^www\./, '');
  } catch(e) {
    // URL 不合法,嘗試 regex 抓
    const m = url.match(/^(?:https?:\/\/)?(?:www\.)?([^/?#]+)/i);
    host = (m && m[1] || '').toLowerCase();
  }
  if (!host) return '';
  // hostname 必須含 . 才算合理(避免「not a url」這類非網址字串被誤判)
  if (!host.includes('.')) return '';
  
  // 對應表:hostname → 中文來源名
  const map = {
    // 社群
    'facebook.com': 'Facebook',
    'm.facebook.com': 'Facebook',
    'fb.com': 'Facebook',
    'fb.watch': 'Facebook',
    'instagram.com': 'Instagram',
    'twitter.com': 'Twitter / X',
    'x.com': 'Twitter / X',
    'threads.net': 'Threads',
    'youtube.com': 'YouTube',
    'youtu.be': 'YouTube',
    'tiktok.com': 'TikTok',
    'linkedin.com': 'LinkedIn',
    // 論壇/部落格
    'ptt.cc': 'PTT',
    'dcard.tw': 'Dcard',
    'mobile01.com': 'Mobile01',
    'medium.com': 'Medium',
    // 國內主流新聞
    'udn.com': '聯合新聞網',
    'cna.com.tw': '中央社',
    'ltn.com.tw': '自由時報',
    'chinatimes.com': '中國時報',
    'ettoday.net': 'ETtoday',
    'setn.com': '三立新聞網',
    'tvbs.com.tw': 'TVBS',
    'ftvnews.com.tw': '民視新聞',
    'ct.org.tw': '基督教今日報',
    'storm.mg': '風傳媒',
    'newtalk.tw': 'Newtalk 新頭殼',
    'rti.org.tw': '中央廣播電臺',
    'cw.com.tw': '天下雜誌',
    'businessweekly.com.tw': '商業周刊',
    'thenewslens.com': '關鍵評論網',
    'mirrormedia.mg': '鏡週刊',
    'taipeitimes.com': 'Taipei Times',
    'pts.org.tw': '公視',
    'cts.com.tw': '華視',
    'ttv.com.tw': '台視',
    'nownews.com': 'NOWnews',
    'pchome.com.tw': 'PChome 新聞',
    // Yahoo 系列
    'tw.news.yahoo.com': 'Yahoo 新聞',
    'yahoo.com': 'Yahoo',
    'news.yahoo.com.tw': 'Yahoo 新聞',
    // Google
    'news.google.com': 'Google 新聞',
    'google.com': 'Google',
    // 政府
    'iaa.gov.tw': '農田水利署',
    'moa.gov.tw': '農業部',
    'ey.gov.tw': '行政院',
    'moeaea.gov.tw': '經濟部能源署',
    'epa.gov.tw': '環境部',
    'moea.gov.tw': '經濟部',
    // 其他
    'reddit.com': 'Reddit',
    'wikipedia.org': '維基百科'
  };
  
  if (map[host]) return map[host];
  
  // 部分匹配(處理子網域,例:news.cnyes.com → 鉅亨網)
  if (host.endsWith('.cnyes.com')) return '鉅亨網';
  if (host.endsWith('.appledaily.com')) return '蘋果新聞網';
  if (host.endsWith('.ltn.com.tw')) return '自由時報';
  if (host.endsWith('.udn.com')) return '聯合新聞網';
  if (host.endsWith('.chinatimes.com')) return '中國時報';
  if (host.endsWith('.ettoday.net')) return 'ETtoday';
  if (host.endsWith('.setn.com')) return '三立新聞網';
  if (host.endsWith('.tvbs.com.tw')) return 'TVBS';
  if (host.endsWith('.cna.com.tw')) return '中央社';
  if (host.endsWith('.gov.tw')) return '政府機關 (' + host + ')';
  
  // 都不匹配 → 用 hostname 當預設
  return host;
}

// 當使用者在 URL 欄位輸入/貼上時觸發 — 自動填「來源」欄(若該欄為空才填,避免覆蓋人工輸入)
function autoFillSourceFromUrl(url) {
  const srcInput = document.getElementById('src-source');
  if (!srcInput) return;
  // 只在來源欄為空時自動填,不覆蓋使用者已填內容
  if (srcInput.value && srcInput.value.trim().length > 0) return;
  const detected = detectSourceFromUrl(url);
  if (detected) srcInput.value = detected;
}

// 上傳 PDF -> base64
function pdfToBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result); // data:application/pdf;base64,...
    r.onerror = () => reject(new Error('讀取失敗'));
    r.readAsDataURL(file);
  });
}

// 開啟 PDF (base64)
function openPdfBase64(base64Data, filename) {
  // base64 -> Blob -> URL
  const arr = base64Data.split(',');
  const mime = arr[0].match(/:(.*?);/)[1];
  const bstr = atob(arr[1]);
  const u8 = new Uint8Array(bstr.length);
  for (let i = 0; i < bstr.length; i++) u8[i] = bstr.charCodeAt(i);
  const blob = new Blob([u8], { type: mime });
  const url = URL.createObjectURL(blob);
  const w = window.open(url, '_blank');
  if (!w) {
    // 彈出視窗被擋,改用下載
    const a = document.createElement('a');
    a.href = url;
    a.download = filename || 'document.pdf';
    a.click();
  }
  setTimeout(() => URL.revokeObjectURL(url), 60000);
}

const PREV_KEY = 'dashboard_prev_v1';      // 上一版快照
const DIFF_KEY = 'dashboard_diff_v1';      // 最近一次匯入的 diff 摘要

// 取出/儲存上一版快照

}

// 為單筆案場產生穩定識別 key (用案場名稱,因為「name」欄是唯一且穩定的)
function siteKey(s) { return String(s.name || '').trim(); }

// 比對單一區塊的差異
function diffSection(prevRows, curRows, fieldsToCompare) {
  prevRows = prevRows || [];
  curRows = curRows || [];
  const prevMap = new Map();
  prevRows.forEach(r => { const k = siteKey(r); if (k) prevMap.set(k, r); });
  const curMap = new Map();
  curRows.forEach(r => { const k = siteKey(r); if (k) curMap.set(k, r); });
  
  const added = [];      // 新版有、舊版沒有
  const removed = [];    // 舊版有、新版沒有
  const modified = [];   // 兩版都有,但欄位有變
  
  curMap.forEach((row, k) => {
    if (!prevMap.has(k)) {
      added.push(row);
    } else {
      const oldRow = prevMap.get(k);
      const changes = [];
      fieldsToCompare.forEach(f => {
        const ov = oldRow[f] == null ? '' : oldRow[f];
        const nv = row[f] == null ? '' : row[f];
        // 數字比較:容差 0.0001 以避免浮點誤差
        if (typeof ov === 'number' && typeof nv === 'number') {
          if (Math.abs(ov - nv) > 0.0001) changes.push({ field: f, from: ov, to: nv });
        } else if (String(ov) !== String(nv)) {
          changes.push({ field: f, from: String(ov), to: String(nv) });
        }
      });
      if (changes.length > 0) modified.push({ name: k, changes, row });
    }
  });
  prevMap.forEach((row, k) => {
    if (!curMap.has(k)) removed.push(row);
  });
  
  return { added, removed, modified };
}

// 完整 diff 計算
function computeDiff(prev, cur) {
  if (!prev || !cur) return null;
  
  const sections = {
    'solar.completed_sites': { label: '已完工案場', fields: ['mgmt','type','county','capacity_mw','grid_date','vendor'] },
    'solar.construction_sites': { label: '施工中/待施工/停工中', fields: ['mgmt','type','county','capacity_mw','expected_date','progress','vendor','stage'] },
    'solar.admin_sites': { label: '申設中', fields: ['mgmt','type','county','capacity_mw','stage','vendor','note'] },
    'solar.planning_sites': { label: '規劃中', fields: ['mgmt','type','county','capacity_mw','stage','vendor','note'] },
    'solar.cancelled_sites': { label: '解約/撤案', fields: ['mgmt','type','county','capacity_mw','vendor','stage','note'] },
    'hydro.sites': { label: '小水力案場', fields: ['mgmt','county','capacity_kw','substage','vendor','operation'] }
  };
  
  const sectionDiffs = {};
  Object.keys(sections).forEach(key => {
    const [a, b] = key.split('.');
    const prevRows = (prev[a] && prev[a][b]) || [];
    const curRows = (cur[a] && cur[a][b]) || [];
    const d = diffSection(prevRows, curRows, sections[key].fields);
    sectionDiffs[key] = { ...d, label: sections[key].label, fieldLabels: sections[key].fields };
  });
  
  // 總量變化
  const totals = {
    solar_completed_mw: { from: prev.solar.summary.total_completed_mw, to: cur.solar.summary.total_completed_mw },
    solar_completed_cases: { from: prev.solar.summary.total_completed_cases, to: cur.solar.summary.total_completed_cases },
    hydro_total_cases: { from: prev.hydro.summary.total_cases, to: cur.hydro.summary.total_cases },
    hydro_total_kw: { from: prev.hydro.summary.total_capacity_kw, to: cur.hydro.summary.total_capacity_kw },
    hydro_completed_cases: { from: prev.hydro.summary.completed_cases, to: cur.hydro.summary.completed_cases }
  };
  
  // 各 stage 案數變化
  const stages = {};
  ['completed','construction','admin','tender','planning'].forEach(skey => {
    const ps = prev.solar.stages.find(x=>x.key===skey);
    const cs = cur.solar.stages.find(x=>x.key===skey);
    if (ps && cs) {
      stages[skey] = {
        label: ps.name || cs.name || skey,
        cases_from: ps.cases, cases_to: cs.cases,
        mw_from: ps.mw, mw_to: cs.mw
      };
    }
  });
  
  // 各管理處達成率變化
  const mgmtChanges = [];
  cur.solar.mgmt.forEach(cm => {
    const pm = prev.solar.mgmt.find(x => x.name === cm.name);
    if (!pm) return;
    if (Math.abs(pm.completed_mw - cm.completed_mw) > 0.0001 || Math.abs(pm.achievement_pct - cm.achievement_pct) > 0.1) {
      mgmtChanges.push({
        name: cm.name,
        completed_from: pm.completed_mw, completed_to: cm.completed_mw,
        pct_from: pm.achievement_pct, pct_to: cm.achievement_pct
      });
    }
  });
  
  return {
    timestamp: new Date().toISOString(),
    prev_updated_at: prev.updated_at,
    cur_updated_at: cur.updated_at,
    prev_source: (prev.meta && prev.meta.source) || '',
    cur_source: (cur.meta && cur.meta.source) || '',
    sections: sectionDiffs,
    totals: totals,
    stages: stages,
    mgmtChanges: mgmtChanges
  };
}

// 統一匯入入口:根據副檔名分流
function importFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const name = file.name.toLowerCase();
  if (name.endsWith('.json')) {
    return importJSON(event);
  }
  if (name.endsWith('.xlsx') || name.endsWith('.xls')) {
    return importExcel(event);
  }
  alert('不支援的檔案格式:' + file.name + '\n目前支援 .xlsx, .xls, .json');
  event.target.value = '';
}

// 從檔名抽出民國日期(7 碼):民國 110~139 年 + 01~12 月 + 01~31 日
// 掃過所有 7 碼數字,挑第一個落在合理日期範圍的
function extractROCDate(filename) {
  const re = /(\d{7})/g;
  let m;
  while ((m = re.exec(filename)) !== null) {
    const s = m[1];
    const yr = parseInt(s.substring(0, 3));
    const mo = parseInt(s.substring(3, 5));
    const dy = parseInt(s.substring(5, 7));
    if (yr >= 110 && yr <= 139 && mo >= 1 && mo <= 12 && dy >= 1 && dy <= 31) {
      return s;
    }
  }
  return null;
}

// Excel 匯入
function importExcel(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (typeof XLSX === 'undefined') {
    alert('Excel 解析函式庫尚未載入,請檢查網路連線後重試');
    event.target.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: 'array', cellDates: false });
      const parsed = parseExcelWorkbook(wb);
      // 從檔名抽出民國日期 (例如 1150428):3 碼民國年(110-139) + 2 碼月 + 2 碼日
      // 用合理範圍避開檔名前綴的雜湊 hex
      parsed.fileName = file.name;
      parsed.fileDate = extractROCDate(file.name);
      // 開啟預覽 modal,讓使用者選擇要匯入哪些區塊
      state.importPreview = parsed;
      state.importPreviewSelections = {};
      Object.keys(parsed.sections).forEach(k => {
        // 預設只勾選有資料的區塊
        state.importPreviewSelections[k] = parsed.sections[k].rows.length > 0;
      });
      render();
    } catch (err) {
      console.error(err);
      alert('Excel 解析失敗:' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
  event.target.value = '';
}

// 解析 Excel workbook → 結構化資料
// === RiChi 格式解析 helper ===
function _parseRiChiSolar(wb, result) {
  const ws = wb.Sheets['太陽光電案場清單'];
  if (!ws) return false;
  const aoa = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, blankrows: false });
  if (aoa.length < 2) return false;
  const STAGE_MAP = {
    '已完工': 'solar.completed_sites', '施工中': 'solar.construction_sites',
    '案場施工中下修': 'solar.construction_sites', '申設中': 'solar.admin_sites',
    '規劃中': 'solar.planning_sites', '解約': 'solar.cancelled_sites', '撤案': 'solar.cancelled_sites'
  };
  const NUM_FIELDS = new Set(['cadastral_area_ha','usable_area_ha','capacity_mw','capacity_per_area',
    'case_year','days_since_contract','canal_length_m','est_annual_gen_kwh','days_generating',
    'est_cumulative_gen_kwh','provide_hh','carbon_reduction_est','canal_width_m','pv_height_m',
    'water_level_area_m2','pv_panel_count','coverage_pct','cadastral_area_m2','usable_area_m2']);
  const COLS = ['no','county','type','mgmt','renewable_type','land_no','case_year','name_old','name',
    'cadastral_area_ha','usable_area_ha','area_ratio_check','capacity_mw','capacity_per_area',
    'capacity_per_area_check','stage','completion_year','grid_date','facility_name','note',
    'vendor','contract_start_date','days_since_contract','install_type','canal_length_m',
    'related_villages','taipower_review_no','approval_no','taipower_trial_date','taipower_trial_no',
    'equipment_reg_date','equipment_reg_no','est_annual_gen_kwh','grid_date_earliest',
    'days_generating','est_cumulative_gen_kwh','work_zone_name','work_zone_short','sys_stage',
    'project_name','usable_area_note','provide_hh','carbon_reduction_est','canal_width_m',
    'pv_height_m','water_level_area_m2','pv_panel_count','coverage_pct','cadastral_area_m2','usable_area_m2'];
  let count = 0;
  for (let i = 1; i < aoa.length; i++) {
    const r = aoa[i];
    if (!r) continue;
    const no = r[0];
    if (!(typeof no === 'number' && Number.isInteger(no) && no > 0 && no < 10000)) continue;
    const name = String(r[8] || '').trim();
    if (!name) continue;
    const stage = String(r[15] || '').trim();
    const sec = STAGE_MAP[stage] || 'solar.planning_sites';
    const obj = {};
    COLS.forEach((k, ci) => {
      let v = (ci < r.length && r[ci] != null) ? r[ci] : null;
      if (v !== null && String(v).trim() === 'NULL') v = null;
      if (v !== null && NUM_FIELDS.has(k)) { v = parseFloat(v) || 0; }
      else if (v !== null && typeof v === 'string') v = v.trim();
      obj[k] = v;
    });
    if (obj.mgmt) obj.mgmt = String(obj.mgmt).replace('管理處','').trim();
    result.sections[sec].rows.push(obj);
    count++;
  }
  return count > 0;
}

function _parseRiChiHydro(wb, result) {
  const ws = wb.Sheets['小水力案場清單'];
  if (!ws) return false;
  const aoa = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, blankrows: false });
  if (aoa.length < 2) return false;
  const SYSSTAGE_MAP = {
    '營運中小水力案場': { substage: '營運中', stage: '已完工/已完成' },
    '推動中案場': { substage: '推動中', stage: '推動中' },
    '專案計畫示範案場': { substage: '專案示範', stage: '推動中' },
    '測試案場': { substage: '測試', stage: '已完工/已完成' },
    '潛力案場': { substage: '潛力', stage: '推動中' }
  };
  const COLS = ['no','mgmt','county','township','land_no','case_type','contract','name','capacity_kw',
    'year','operation','vendor','operation2','note','sys_stage','p2p_stage',
    'cadastral_area_m2','usable_area_m2','canal_width_m','water_head_m','flow_cms',
    'water_facility','gen_method','turbine_type','unit_count','provide_hh'];
  const ANOMALY_MAP = [
    ['機組已拆除','機組已拆除','yellow'],['機組待拆除','機組待拆除','yellow'],
    ['機組調整中','機組調整中','yellow'],['已終止契約','已終止契約','red'],
    ['已撤案','已撤案','red'],['暫緩辦理','暫緩辦理','red'],['籌辦招標','暫緩辦理','red']
  ];
  const detectAnomaly = op => {
    for (const [kw,type,level] of ANOMALY_MAP)
      if (String(op||'').includes(kw)) return {is_anomaly:true,anomaly_type:type,anomaly_level:level};
    return {is_anomaly:false,anomaly_type:'',anomaly_level:''};
  };
  let count = 0;
  for (let i = 1; i < aoa.length; i++) {
    const r = aoa[i];
    if (!r) continue;
    const no = r[0];
    if (!(typeof no === 'number' && Number.isInteger(no) && no > 0 && no < 10000)) continue;
    const name = String(r[7] || '').trim();
    if (!name) continue;
    const obj = {};
    COLS.forEach((k, ci) => {
      let v = (ci < r.length && r[ci] != null) ? r[ci] : null;
      if (v !== null && typeof v === 'string') v = v.trim();
      obj[k] = v;
    });
    if (obj.mgmt) obj.mgmt = String(obj.mgmt).replace('管理處','').trim();
    obj.capacity_kw = parseFloat(obj.capacity_kw) || 0;
    const meta = SYSSTAGE_MAP[obj.sys_stage] || {substage:'潛力',stage:'推動中'};
    obj.substage = meta.substage;
    obj.stage = meta.stage;
    Object.assign(obj, detectAnomaly(obj.operation));
    result.sections['hydro.sites'].rows.push(obj);
    count++;
  }
  return count > 0;
}

function parseExcelWorkbook(wb) {
  const result = {
    sheetNames: wb.SheetNames,
    sections: {
      'solar.completed_sites': { label: '太陽光電 - 已完工案場', rows: [], warnings: [] },
      'solar.construction_sites': { label: '太陽光電 - 施工中/案場施工中下修', rows: [], warnings: [] },
      'solar.admin_sites': { label: '太陽光電 - 申設中', rows: [], warnings: [] },
      'solar.planning_sites': { label: '太陽光電 - 規劃中', rows: [], warnings: [] },
      'solar.cancelled_sites': { label: '太陽光電 - 解約/撤案', rows: [], warnings: [] },
      'hydro.sites': { label: '小水力 - 全部案場(92案)', rows: [], warnings: [] }
    }
  };

  // === 格式自動偵測:RiChi 51欄/26欄 格式 ===
  const isRiChiSolar = wb.SheetNames.includes('太陽光電案場清單');
  const isRiChiHydro = wb.SheetNames.includes('小水力案場清單');
  if (isRiChiSolar || isRiChiHydro) {
    if (isRiChiSolar) _parseRiChiSolar(wb, result);
    if (isRiChiHydro) _parseRiChiHydro(wb, result);
    return result;
  }
  // === 舊版雙週報格式(以下為原有邏輯) ===
  
  // 尋找符合條件的分頁名
  const findSheet = (patterns) => {
    for (const sn of wb.SheetNames) {
      for (const p of patterns) {
        if (sn.includes(p)) return sn;
      }
    }
    return null;
  };
  
  // 將 sheet 轉成二維陣列
  const sheetToArr = (sn) => {
    if (!sn || !wb.Sheets[sn]) return [];
    return XLSX.utils.sheet_to_json(wb.Sheets[sn], { header: 1, defval: null, blankrows: false });
  };
  
  // 找標題列(內含「項次」或「縣市」+ 「案場名稱」)
  const findHeaderRow = (rows) => {
    for (let i = 0; i < Math.min(rows.length, 8); i++) {
      const r = rows[i] || [];
      const joined = r.map(c => (c == null ? '' : String(c))).join('|');
      if (joined.includes('項次') && joined.includes('案場名稱')) return i;
    }
    return -1;
  };
  
  // 找欄位索引(模糊匹配)
  const findCol = (header, patterns) => {
    for (let i = 0; i < header.length; i++) {
      const cell = String(header[i] || '').replace(/\s+/g, '');
      for (const p of patterns) {
        if (cell.includes(p)) return i;
      }
    }
    return -1;
  };
  
  // 判斷一筆 row 是不是「資料列」:編號為正整數,且案場名稱有內容、不是小計/合計
  const isDataRow = (r, noIdx, nameIdx) => {
    const v = r[noIdx];
    if (!(typeof v === 'number' && Number.isInteger(v) && v > 0 && v < 10000)) return false;
    if (nameIdx >= 0) {
      const name = String(r[nameIdx] || '').trim();
      if (!name) return false;
      if (name.includes('小計') || name.includes('合計') || name.startsWith('-')) return false;
    }
    return true;
  };

  // ===== 1. 已完工案場 =====
  const sn1 = findSheet(['已完工併聯案場(依管理處)', '已完工併聯案場', '依管理處)', '內表3-1']);
  if (sn1) {
    const arr = sheetToArr(sn1);
    const hi = findHeaderRow(arr);
    if (hi >= 0) {
      const h = arr[hi];
      const col = {
        no: findCol(h, ['項次']),
        county: findCol(h, ['縣市']),
        type: findCol(h, ['類型']),
        mgmt: findCol(h, ['管理處']),
        name: findCol(h, ['案場名稱']),
        capacity_mw: findCol(h, ['裝置容量']),
        grid_date: findCol(h, ['併網日期','併聯日期']),
        vendor: findCol(h, ['廠商'])
      };
      let noCounter = 0;
      for (let i = hi + 1; i < arr.length; i++) {
        const r = arr[i];
        if (!r || !isDataRow(r, col.no, col.name)) continue;
        noCounter++;
        result.sections['solar.completed_sites'].rows.push({
          no: noCounter,
          county: r[col.county] || '',
          type: r[col.type] || '',
          mgmt: r[col.mgmt] || '',
          name: r[col.name] || '',
          capacity_mw: parseFloat(r[col.capacity_mw]) || 0,
          completion_year: '',  // 從併網日期推算
          grid_date: r[col.grid_date] != null ? String(r[col.grid_date]) : '',
          vendor: r[col.vendor] || '',
          stage: '已完工'
        });
      }
      // 從 grid_date 推 completion_year (民國年)
      result.sections['solar.completed_sites'].rows.forEach(s => {
        const m = (s.grid_date || '').match(/^(\d{3})\//);
        if (m) s.completion_year = m[1] + '年';
      });
    } else {
      result.sections['solar.completed_sites'].warnings.push('找不到標題列(項次/案場名稱)');
    }
  } else {
    result.sections['solar.completed_sites'].warnings.push('找不到「已完工併聯案場」分頁');
  }

  // ===== 2. 施工中/待施工/停工中 =====
  const sn2 = findSheet(['施工中 停工中 待施工案件', '施工中 停工中 待施工', '施工中/停工中/待施工', '內表3-2']);
  if (sn2) {
    const arr = sheetToArr(sn2);
    const hi = findHeaderRow(arr);
    if (hi >= 0) {
      const h = arr[hi];
      const col = {
        no: findCol(h, ['項次']),
        county: findCol(h, ['縣市']),
        type: findCol(h, ['類型']),
        mgmt: findCol(h, ['管理處']),
        name: findCol(h, ['案場名稱']),
        capacity_mw: findCol(h, ['裝置容量']),
        expected_date: findCol(h, ['預計完工','預計併網','預計完工併網']),
        note: findCol(h, ['備註']),
        progress: findCol(h, ['辦理進度']),
        vendor: findCol(h, ['廠商'])
      };
      // 還需追蹤目前讀到「施工中/待施工/停工中」哪一段
      let currentStage = '施工中';
      let noCounter = 0;
      for (let i = hi + 1; i < arr.length; i++) {
        const r = arr[i];
        if (!r) continue;
        const firstCell = String(r[0] || '');
        // 區段標題
        if (firstCell.match(/^\d+\.?\s*施工中案件/)) { currentStage = '施工中'; noCounter = 0; continue; }
        if (firstCell.match(/^\d+\.?\s*待施工案件/)) { currentStage = '待施工'; noCounter = 0; continue; }
        if (firstCell.match(/^\d+\.?\s*停工中案件/)) { currentStage = '停工中'; noCounter = 0; continue; }
        if (!isDataRow(r, col.no, col.name)) continue;
        noCounter++;
        result.sections['solar.construction_sites'].rows.push({
          no: noCounter,
          county: r[col.county] || '',
          type: r[col.type] || '',
          mgmt: r[col.mgmt] || '',
          name: r[col.name] || '',
          capacity_mw: parseFloat(r[col.capacity_mw]) || 0,
          expected_date: r[col.expected_date] != null ? String(r[col.expected_date]) : '',
          note: r[col.note] || '',
          progress: r[col.progress] || currentStage,
          vendor: r[col.vendor] || '',
          stage: currentStage
        });
      }
    }
  } else {
    result.sections['solar.construction_sites'].warnings.push('找不到「施工中/停工中/待施工」分頁');
  }

  // ===== 3. 行政程序中 =====
  const sn3 = findSheet(['行政程序中案件', '行政程序中', '內表3-3']);
  if (sn3) {
    const arr = sheetToArr(sn3);
    const hi = findHeaderRow(arr);
    if (hi >= 0) {
      const h = arr[hi];
      const col = {
        no: findCol(h, ['項次']),
        county: findCol(h, ['縣市']),
        type: findCol(h, ['類型']),
        mgmt: findCol(h, ['管理處']),
        name: findCol(h, ['案場名稱']),
        capacity_mw: findCol(h, ['裝置容量']),
        progress: findCol(h, ['辦理進度']),
        vendor: findCol(h, ['廠商'])
      };
      let noCounter = 0;
      for (let i = hi + 1; i < arr.length; i++) {
        const r = arr[i];
        if (!r || !isDataRow(r, col.no, col.name)) continue;
        noCounter++;
        result.sections['solar.admin_sites'].rows.push({
          no: noCounter,
          county: r[col.county] || '',
          type: r[col.type] || '',
          mgmt: r[col.mgmt] || '',
          name: r[col.name] || '',
          capacity_mw: parseFloat(r[col.capacity_mw]) || 0,
          progress: r[col.progress] || '',
          vendor: r[col.vendor] || '',
          stage: '行政程序中'
        });
      }
    }
  } else {
    result.sections['solar.admin_sites'].warnings.push('找不到「行政程序中」分頁');
  }

  // ===== 4. 規劃推動 =====
  const sn4 = findSheet(['規劃推動案件', '規劃推動', '內表3-4']);
  if (sn4) {
    const arr = sheetToArr(sn4);
    // 規劃推動可能有多個標題列(招商中、招商中案件兩段),逐次掃描
    const headerRowIdxs = [];
    for (let i = 0; i < arr.length; i++) {
      const r = arr[i] || [];
      const joined = r.map(c => (c == null ? '' : String(c))).join('|');
      if (joined.includes('項次') && joined.includes('案場名稱')) headerRowIdxs.push(i);
    }
    const ranges = headerRowIdxs.map((hi, k) => ({ hi, end: k + 1 < headerRowIdxs.length ? headerRowIdxs[k+1] : arr.length }));
    let noCounter = 0;
    ranges.forEach(rg => {
      const h = arr[rg.hi];
      const col = {
        no: findCol(h, ['項次']),
        county: findCol(h, ['縣市']),
        type: findCol(h, ['類型']),
        mgmt: findCol(h, ['管理處']),
        name: findCol(h, ['案場名稱']),
        capacity_mw: findCol(h, ['裝置容量']),
        progress: findCol(h, ['辦理進度']),
        vendor: findCol(h, ['廠商'])
      };
      for (let i = rg.hi + 1; i < rg.end; i++) {
        const r = arr[i];
        if (!r || !isDataRow(r, col.no, col.name)) continue;
        noCounter++;
        result.sections['solar.planning_sites'].rows.push({
          no: noCounter,
          county: r[col.county] || '',
          type: r[col.type] || '',
          mgmt: r[col.mgmt] || '',
          name: r[col.name] || '',
          capacity_mw: parseFloat(r[col.capacity_mw]) || 0,
          progress: r[col.progress] || '',
          vendor: r[col.vendor] || '',
          stage: '規劃推動-招商中'
        });
      }
    });
  } else {
    result.sections['solar.planning_sites'].warnings.push('找不到「規劃推動案件」分頁');
  }

  // ===== 5. 解約/撤案 (合併三個年度分頁) =====
  for (const sn of wb.SheetNames) {
    const m = sn.match(/^(\d{3})年解約/);
    if (!m) continue;
    const year = parseInt(m[1]);
    const arr = sheetToArr(sn);
    let hi = -1;
    for (let i = 0; i < Math.min(arr.length, 5); i++) {
      const r = arr[i] || [];
      const joined = r.map(c => (c == null ? '' : String(c))).join('|');
      if (joined.includes('項次') && joined.includes('案場名稱')) { hi = i; break; }
    }
    if (hi < 0) continue;
    const h = arr[hi];
    const col = {
      no: findCol(h, ['項次']),
      county: findCol(h, ['縣市']),
      type: findCol(h, ['類型']),
      mgmt: findCol(h, ['管理處']),
      name: findCol(h, ['案場名稱']),
      capacity_mw: findCol(h, ['裝置容量']),
      contract: findCol(h, ['原契約','契約名稱']),
      vendor: findCol(h, ['原廠商','廠商']),
      date: findCol(h, ['解約日期','日期']),
      reason: findCol(h, ['原因']),
      handling: findCol(h, ['處理方式'])
    };
    let subcategory = '全案解約';
    for (let i = hi + 1; i < arr.length; i++) {
      const r = arr[i];
      if (!r) continue;
      const firstCell = String(r[0] || '');
      if (firstCell.match(/^\d+\.?\s*全案解約/)) { subcategory = '全案解約'; continue; }
      if (firstCell.match(/^\d+\.?\s*案場撤案/)) { subcategory = '案場撤案'; continue; }
      if (firstCell.match(/^\d+\.?\s*施工中下修/)) { subcategory = '施工中下修'; continue; }
      if (!isDataRow(r, col.no, col.name)) continue;
      result.sections['solar.cancelled_sites'].rows.push({
        year: year,
        subcategory: subcategory,
        county: r[col.county] || '',
        type: r[col.type] || '',
        mgmt: r[col.mgmt] || '',
        name: r[col.name] || '',
        capacity_mw: parseFloat(r[col.capacity_mw]) || 0,
        contract: r[col.contract] || '',
        vendor: r[col.vendor] || '',
        date: r[col.date] != null ? String(r[col.date]) : '',
        reason: r[col.reason] || '',
        handling: r[col.handling] || ''
      });
    }
  }
  
  // ===== 6. 小水力案場 =====
  // 找含「已完工」+「推動中」字樣的分頁,或含「清冊」
  const hydroSheetName = (function(){
    for (const sn of wb.SheetNames) {
      if (sn.includes('已完工') && sn.includes('推動中')) return sn;
      if (sn.includes('清冊')) return sn;
    }
    return null;
  })();
  
  if (hydroSheetName) {
    const arr = sheetToArr(hydroSheetName);
    
    // 找標題列:含「管理處」「案場名稱」「設置容量」
    let hi = -1;
    for (let i = 0; i < Math.min(arr.length, 10); i++) {
      const r = arr[i] || [];
      const joined = r.map(c => (c == null ? '' : String(c))).join('|');
      if (joined.includes('管理處') && joined.includes('案場名稱') && joined.includes('設置容量')) {
        hi = i;
        break;
      }
    }
    
    if (hi >= 0) {
      const h = arr[hi];
      const col = {
        no: findCol(h, ['項次']),
        mgmt: findCol(h, ['管理處']),
        county: findCol(h, ['縣市']),
        township: findCol(h, ['鄉鎮']),
        contract: findCol(h, ['契約名稱']),
        name: findCol(h, ['案場名稱']),
        capacity_kw: findCol(h, ['設置容量','容量']),
        year: findCol(h, ['完工年度','年度']),
        operation: findCol(h, ['辦理情形','營運狀態']),
        vendor: findCol(h, ['廠商']),
        note: findCol(h, ['備註'])
      };
      
      // 區段識別:(A)~(E) 在第 1 欄或第 2 欄
      // 對應到 substage / stage
      const subMapping = {
        '(A)': { substage: '營運中', stage: '已完工/已完成' },
        '(B)': { substage: '測試', stage: '已完工/已完成' },
        '(C)': { substage: '專案示範', stage: '已完工/已完成' },
        '(D)': { substage: '推動中', stage: '推動中' },
        '(E)': { substage: '推動中', stage: '推動中' }
      };
      
      // 判斷異常:辦理情形含特定關鍵字
      const detectAnomaly = (op, note) => {
        const t = String(op || '') + ' ' + String(note || '');
        // 紅色等級:拆除、停機、停運、終止
        if (/拆除|停機|停運|終止|解約/.test(t)) {
          const m = t.match(/(機組已拆除|已拆除|停機|停運|終止|解約)/);
          return { is_anomaly: true, anomaly_type: (m ? m[1] : '異常'), anomaly_level: 'red' };
        }
        // 黃色等級:調整中、施工中、待併網、暫停
        if (/機組調整|另列項次|暫停|測試中|施工中|待併網|未營運/.test(t)) {
          const m = t.match(/(機組調整中|另列項次|暫停|測試中|施工中|待併網|未營運)/);
          return { is_anomaly: true, anomaly_type: (m ? m[1] : '需追蹤'), anomaly_level: 'yellow' };
        }
        return { is_anomaly: false, anomaly_type: '', anomaly_level: '' };
      };
      
      // 是否為「資料列」: 項次必須是正整數 + 管理處有值 + 案場名稱有值
      // (跟官方計數規則一致:沒項次的列視為補充說明/重複列出/未正式納入,不計)
      const isHydroDataRow = (r) => {
        if (!r) return false;
        const noVal = col.no >= 0 ? r[col.no] : null;
        if (!(typeof noVal === 'number' && Number.isInteger(noVal) && noVal > 0 && noVal < 10000)) return false;
        const mgmt = String((col.mgmt >= 0 ? r[col.mgmt] : '') || '').trim();
        const name = String((col.name >= 0 ? r[col.name] : '') || '').trim();
        if (!mgmt || !name) return false;
        // 排除小計、合計、總計(雖然這些通常項次也不是數字,但雙重保險)
        if (name.includes('小計') || name.includes('合計') || name.includes('總計')) return false;
        if (mgmt.includes('小計') || mgmt.includes('合計') || mgmt.includes('總計')) return false;
        return true;
      };
      
      // 判斷是否為區段標題列(col1 或 col2 含 (A)~(E))
      const detectSection = (r) => {
        if (!r) return null;
        for (let ci = 0; ci < Math.min(3, r.length); ci++) {
          const v = String(r[ci] || '').replace(/\s+/g, '');
          if (v.length > 30) continue; // 太長不是標題
          for (const k of ['(A)','(B)','(C)','(D)','(E)']) {
            if (v.startsWith(k) || v.indexOf(k) === 0) {
              return subMapping[k];
            }
          }
        }
        return null;
      };
      
      let curSub = null;
      let hydroCount = 0;
      
      for (let i = hi + 1; i < arr.length; i++) {
        const r = arr[i];
        if (!r) continue;
        
        // 區段標題?
        const sec = detectSection(r);
        if (sec) {
          curSub = sec;
          continue;
        }
        
        // 不是資料列?
        if (!isHydroDataRow(r)) continue;
        
        // 還沒讀到任何區段標題,略過
        if (!curSub) continue;
        
        const operation = String((col.operation >= 0 ? r[col.operation] : '') || '').trim();
        const noteVal = String((col.note >= 0 ? r[col.note] : '') || '').trim();
        const anomaly = detectAnomaly(operation, noteVal);
        const capacityRaw = col.capacity_kw >= 0 ? r[col.capacity_kw] : null;
        
        hydroCount++;
        result.sections['hydro.sites'].rows.push({
          mgmt: String((col.mgmt >= 0 ? r[col.mgmt] : '') || '').trim(),
          county: String((col.county >= 0 ? r[col.county] : '') || '').trim(),
          township: String((col.township >= 0 ? r[col.township] : '') || '').replace(/\s+/g, ''),
          contract: String((col.contract >= 0 ? r[col.contract] : '') || '').trim(),
          name: String((col.name >= 0 ? r[col.name] : '') || '').trim(),
          capacity_kw: capacityRaw != null && capacityRaw !== '' ? (parseFloat(capacityRaw) || 0) : 0,
          year: String((col.year >= 0 ? r[col.year] : '') || '').trim(),
          operation: operation,
          vendor: String((col.vendor >= 0 ? r[col.vendor] : '') || '').trim(),
          note: noteVal,
          stage: curSub.stage,
          substage: curSub.substage,
          is_anomaly: anomaly.is_anomaly,
          anomaly_type: anomaly.anomaly_type,
          anomaly_level: anomaly.anomaly_level
        });
      }
      
      if (hydroCount === 0) {
        result.sections['hydro.sites'].warnings.push('找到小水力分頁但解析出 0 筆,請檢查欄位格式');
      }
    } else {
      result.sections['hydro.sites'].warnings.push('找到分頁「' + hydroSheetName + '」但找不到標題列(需含「管理處」「案場名稱」「設置容量」)');
    }
  } else {
    result.sections['hydro.sites'].warnings.push('找不到小水力分頁(關鍵字:已完工 + 推動中,或清冊)');
  }
  
  // ===== 7. 小水力潛力案場(獨立sheet) =====
  // 雙週報管考格式：潛力案場放在獨立的「潛力案場」sheet
  // 欄位：col0=序號, col1=管理處, col2=縣市, col3=鄉鎮, col4=地段,
  //        col5=地號, col6=圳路名稱(即案場名稱), col7=樁號,
  //        col8=預估容量kW, col9=備註/進度, col10=版本類型
  const potentialSheet = wb.Sheets['潛力案場'];
  if (potentialSheet) {
    const arr = XLSX.utils.sheet_to_json(potentialSheet, { header: 1, defval: null, blankrows: false });
    let potCount = 0;
    for (let i = 0; i < arr.length; i++) {
      const r = arr[i];
      if (!r) continue;
      const no = r[0];
      // 序號為正整數才是資料列
      if (!(typeof no === 'number' && Number.isInteger(no) && no > 0 && no < 10000)) continue;
      const name = String(r[6] || '').trim(); // 圳路名稱
      if (!name) continue;
      let mgmt = String(r[1] || '').trim().replace('管理處', '');
      if (!mgmt) continue;
      potCount++;
      result.sections['hydro.sites'].rows.push({
        mgmt: mgmt,
        county: String(r[2] || '').trim(),
        township: String(r[3] || '').trim(),
        contract: '',
        name: name,
        capacity_kw: parseFloat(r[8]) || 0,
        year: '',
        operation: String(r[9] || '').trim(),
        vendor: '',
        note: String(r[9] || '').trim(),
        stage: '推動中',
        substage: '潛力',
        is_anomaly: false,
        anomaly_type: '',
        anomaly_level: ''
      });
    }
  }

  return result;
}

// 套用匯入:把選定的 sections 寫回 DATA
function applyImport() {
  const preview = state.importPreview;
  const sel = state.importPreviewSelections;
  if (!preview || !sel) return;

  // 套用前先複製當前 DATA 作為「上一版」快照 (深拷貝)
  const snapshot = JSON.parse(JSON.stringify(DATA));

  // 技術欄位「訂死」清單 — 從 RiChi 基底匯入後,後續匯入不覆蓋這些欄位
  const PROTECTED_FIELDS = [
    'taipower_review_no','approval_no','taipower_trial_date','taipower_trial_no',
    'equipment_reg_date','equipment_reg_no','est_annual_gen_kwh','grid_date_earliest',
    'days_generating','est_cumulative_gen_kwh','grid_date',
    'cadastral_area_ha','usable_area_ha','canal_length_m','canal_width_m',
    'pv_height_m','water_level_area_m2','pv_panel_count','coverage_pct',
    'cadastral_area_m2','usable_area_m2','provide_hh','carbon_reduction_est',
    'related_villages','land_no','install_type','work_zone_name','work_zone_short',
    'sys_stage','project_name','usable_area_note','renewable_type','facility_name',
    'contract_start_date','days_since_contract','capacity_per_area','capacity_per_area_check',
    'name_old','case_year'
  ];
  const PROTECTED_SECTIONS = new Set([
    'solar.completed_sites','solar.construction_sites','solar.admin_sites',
    'solar.planning_sites','solar.cancelled_sites'
  ]);

  const applied = [];
  Object.keys(sel).forEach(key => {
    if (!sel[key]) return;
    const rows = preview.sections[key].rows;
    const [a, b] = key.split('.');

    if (PROTECTED_SECTIONS.has(key)) {
      // 依「案場名稱」合併,保留技術欄位舊值
      const existing = DATA[a][b];
      const existingByName = {};
      existing.forEach(s => { if (s.name) existingByName[s.name] = s; });
      const merged = rows.map(newRow => {
        const old = existingByName[newRow.name];
        if (!old) return newRow;
        const result = Object.assign({}, newRow);
        PROTECTED_FIELDS.forEach(f => {
          if (old[f] !== null && old[f] !== undefined && old[f] !== 0 && old[f] !== '') {
            result[f] = old[f];
          }
        });
        return result;
      });
      DATA[a][b] = merged;
    } else {
      DATA[a][b] = rows;
    }
    applied.push(preview.sections[key].label + '(' + rows.length + ' 筆)');
  });
  if (applied.length === 0) {
    alert('沒有選擇任何要匯入的區塊');
    return;
  }
  
  // 同步更新「資料來源」footer
  if (preview.fileDate) {
    if (!DATA.meta) DATA.meta = {};
    const before = DATA.meta.source || '1150116 小水力盤點 + 1150102 太陽光電盤點彙整版';
    let after = before;
    
    const importedSolar = !!(sel['solar.completed_sites'] || sel['solar.construction_sites'] || sel['solar.admin_sites'] || sel['solar.planning_sites'] || sel['solar.cancelled_sites']);
    const importedHydro = !!sel['hydro.sites'];
    
    // 更新太陽光電段
    if (importedSolar) {
      after = after.replace(/(\+\s*)\d{7}(\s*太陽光電)/, '$1' + preview.fileDate + '$2');
      if (!/\d{7}\s*太陽光電/.test(after)) {
        // 找不到「XXXXXXX 太陽光電」段,自己接上
        after = after + ' + ' + preview.fileDate + ' 太陽光電盤點彙整版';
      }
    }
    // 更新小水力段
    if (importedHydro) {
      after = after.replace(/^(\d{7})(\s*小水力)/, preview.fileDate + '$2');
      if (!/^\d{7}\s*小水力/.test(after)) {
        after = preview.fileDate + ' 小水力盤點 + ' + after;
      }
    }
    
    DATA.meta.source = after;
    
    // 同步 updated_at
    const fd = preview.fileDate;
    const yr = parseInt(fd.substring(0, 3)) + 1911;
    const mo = fd.substring(3, 5);
    const dy = fd.substring(5, 7);
    DATA.updated_at = yr + '-' + mo + '-' + dy;
  }
  
  recomputeSummaries();
  
  // 計算 diff 並儲存
  const diff = computeDiff(snapshot, DATA);
  if (diff) {
    saveDiff(diff);
    savePrevSnapshot(snapshot);
  }
  
  saveData();
  state.importPreview = null;
  state.importPreviewSelections = null;
  render();
  
  // 自動展開更新記錄區塊讓使用者看見變動
  state.changelogOpen = true;
  setTimeout(() => {
    const el = document.getElementById('sec-changelog');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 300);
  
  alert('匯入成功!已更新:' + applied.join('、') + (preview.fileDate ? '\n資料日期:' + preview.fileDate : '') + (diff ? '\n\n更新記錄已產生,可在頁面下方「📋 更新記錄」區塊查看' : ''));
}

function cancelImport() {
  state.importPreview = null;
  state.importPreviewSelections = null;
  render();
}

// 單一輿情事件卡片

function tplOpinionCard(op) {
  const status = OPINION_STATUSES[op.status] || OPINION_STATUSES.unhandled;
  const severity = OPINION_SEVERITIES[op.severity] || OPINION_SEVERITIES.medium;
  const isOpen = state.opinionCollapsed[op.id] !== true;  // 預設展開
  
  // 解析 case_ref 取得顯示用 label
  let caseRefLabel = '';
  let caseRefInfo = null;
  if (op.case_ref) {
    // 新格式:結構化 id 字串(含 ':')
    if (typeof op.case_ref === 'string' && op.case_ref.includes(':')) {
      caseRefInfo = resolveCaseRef(op.case_ref);
      if (caseRefInfo && !caseRefInfo.notFound) {
        if (caseRefInfo.type === 'mgmt') {
          caseRefLabel = caseRefInfo.name;
        } else {
          caseRefLabel = caseRefInfo.row.name || '(無名稱)';
        }
      } else {
        caseRefLabel = '(資料已不存在)';
      }
    } else {
      // 舊格式:純文字(向後相容)
      caseRefLabel = op.case_ref;
    }
  }
  
  return `
    <div class="rounded-xl mb-3 overflow-hidden" style="background:white; border:1px solid #fbbf24">
      <!-- 標頭 -->
      <div class="px-4 py-3" style="background:#fef3c7; border-bottom:1px solid #fbbf24">
        <div class="flex items-start justify-between flex-wrap gap-2">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 flex-wrap">
              <span class="text-sm font-bold" style="color:${severity.color}">${severity.label}</span>
              <span class="text-xs px-2 py-0.5 rounded-full" style="background:${status.bg};color:${status.color};border:1px solid ${status.color}">${status.label}</span>
              ${caseRefLabel ? `<span class="text-xs px-2 py-0.5 rounded-full" style="background:#e0e7ff;color:#3730a3">📍 ${caseRefLabel}</span>` : ''}
            </div>
            <h3 class="text-base font-bold mt-1" style="color:#78350f">${op.title}</h3>
            ${op.summary ? `<p class="text-xs mt-1" style="color:#92400e;line-height:1.4">${op.summary}</p>` : ''}
            <p class="text-xs mt-1" style="color:#a16207">

// ==================== 輿情操作函式 ====================
// 篩選下拉選單的選項(根據關鍵字)
function filterCaseRefDropdown(keyword) {
  const select = document.getElementById('op-case-ref');
  if (!select) return;
  const kw = (keyword || '').trim().toLowerCase();
  const optgroups = select.querySelectorAll('optgroup');
  optgroups.forEach(og => {
    let hasVisible = false;
    og.querySelectorAll('option').forEach(opt => {
      const matched = !kw || opt.textContent.toLowerCase().includes(kw);
      opt.style.display = matched ? '' : 'none';
      if (matched) hasVisible = true;
    });
    og.style.display = hasVisible ? '' : 'none';
  });
}

function saveOpinionFromModal(oid, mode) {
  const title = document.getElementById('op-title').value.trim();
  if (!title) { alert('請填寫事件標題'); return; }
  
  const data = {
    title,
    case_ref: document.getElementById('op-case-ref').value.trim(),
    severity: document.getElementById('op-severity').value,
    status: document.getElementById('op-status').value,
    summary: document.getElementById('op-summary').value.trim(),
    created_at: document.getElementById('op-created').value,
    updated_at: document.getElementById('op-updated').value
  };
  
  const opinions = loadOpinions();
  if (mode === 'create') {
    opinions.unshift({ id: oid, ...data, negative: [], clarification: [] });
  } else {
    const idx = opinions.findIndex(x => x.id === oid);
    if (idx >= 0) opinions[idx] = { ...opinions[idx], ...data, updated_at: data.updated_at || new Date().toISOString().substring(0,10) };
  }
  if (saveOpinions(opinions)) {
    state.opinionEditor = null;
    render();
  }
}

async function saveOpinionSourceFromModal(sid, mode, defaultType) {
  const e = state.opinionSourceEditor;
  if (!e) return;
  
  // 判斷實際 type:看哪個欄位區塊是顯示的
  const urlFields = document.getElementById('src-url-fields');
  const isUrl = urlFields && urlFields.style.display !== 'none';
  const type = isUrl ? 'url' : 'pdf';
  
  const title = document.getElementById('src-title').value.trim();
  const excerpt = document.getElementById('src-excerpt').value.trim();
  const source = document.getElementById('src-source').value.trim();
  const date = document.getElementById('src-date').value;
  
  if (!title) { alert('請填寫標題'); return; }
  
  const newSrc = { id: sid, type, title, excerpt, source, date };
  
  if (type === 'url') {
    const url = document.getElementById('src-url').value.trim();
    if (!url) { alert('請填寫網址'); return; }
    newSrc.url = url;
  } else {
    // PDF 處理
    const fileInput = document.getElementById('src-pdf-file');
    const file = fileInput && fileInput.files && fileInput.files[0];
    if (file) {
      if (file.size > 2 * 1024 * 1024) {
        if (!confirm('PDF 大於 2MB,可能造成儲存失敗。仍要繼續嗎?')) return;
      }
      try {
        newSrc.base64 = await pdfToBase64(file);
        newSrc.filename = file.name;
        newSrc.filesize = file.size;
      } catch(err) { alert('PDF 讀取失敗:' + err.message); return; }
    } else if (mode === 'edit') {
      // 編輯模式且沒重傳檔案 -> 保留原 base64
      const opinions = loadOpinions();
      const op = opinions.find(x => x.id === e.oid);
      const list = e.side === 'negative' ? op.negative : op.clarification;
      const old = list.find(s => s.id === sid);
      if (old && old.base64) {
        newSrc.base64 = old.base64;
        newSrc.filename = old.filename;
        newSrc.filesize = old.filesize;
      } else {
        alert('請上傳 PDF 檔案'); return;
      }
    } else {
      alert('請上傳 PDF 檔案'); return;
    }
  }
  
  // 寫入
  const opinions = loadOpinions();
  const op = opinions.find(x => x.id === e.oid);
  if (!op) return;
  const list = e.side === 'negative' ? (op.negative = op.negative || []) : (op.clarification = op.clarification || []);
  if (mode === 'add') {
    list.push(newSrc);
  } else {
    const idx = list.findIndex(s => s.id === sid);
    if (idx >= 0) list[idx] = newSrc;
  }
  op.updated_at = new Date().toISOString().substring(0,10);
  if (saveOpinions(opinions)) {
    state.opinionSourceEditor = null;
    render();
  }
}

function deleteOpinion(oid) {
  const opinions = loadOpinions();
  const op = opinions.find(x => x.id === oid);
  if (!op) return;
  if (!confirm('確定刪除「' + op.title + '」?所有相關來源與 PDF 也會一併刪除,無法復原。')) return;
  const filtered = opinions.filter(x => x.id !== oid);
  if (saveOpinions(filtered)) render();
}

function deleteOpinionSource(oid, side, sid) {
  if (!confirm('確定刪除此來源?')) return;
  const opinions = loadOpinions();
  const op = opinions.find(x => x.id === oid);
  if (!op) return;
  const key = side === 'negative' ? 'negative' : 'clarification';
  op[key] = (op[key] || []).filter(s => s.id !== sid);
  op.updated_at = new Date().toISOString().substring(0,10);
  if (saveOpinions(opinions)) render();
}

function openOpinionPdf(oid, side, sid) {
  const opinions = loadOpinions();
  const op = opinions.find(x => x.id === oid);
  if (!op) return;
  const list = side === 'negative' ? op.negative : op.clarification;
  const src = list.find(s => s.id === sid);
  if (!src) { alert('PDF 來源已遺失'); return; }
  if (!src.base64) {
    if (src._pdf_local_only) {
      alert('這個 PDF 檔案僅存在於原上傳者的電腦上,未隨網頁部署。\n\n建議:聯絡計畫團隊取得 PDF,或檢視標題與摘要即可。');
    } else {
      alert('PDF 資料遺失');
    }
    return;
  }
  openPdfBase64(src.base64, src.filename);
}

function recomputeSummaries() {
  // 太陽光電 summary
  const s = DATA.solar;
  s.summary.total_completed_cases = s.completed_sites.length;
  s.summary.total_completed_mw = parseFloat(s.completed_sites.reduce((a,c)=>a+(parseFloat(c.capacity_mw)||0),0).toFixed(2));
  s.summary.channel_completed = s.completed_sites.filter(x=>x.type==='圳路').length;
  s.summary.channel_mw = parseFloat(s.completed_sites.filter(x=>x.type==='圳路').reduce((a,c)=>a+(parseFloat(c.capacity_mw)||0),0).toFixed(2));
  s.summary.pond_completed = s.completed_sites.filter(x=>x.type==='埤塘').length;
  s.summary.pond_mw = parseFloat(s.completed_sites.filter(x=>x.type==='埤塘').reduce((a,c)=>a+(parseFloat(c.capacity_mw)||0),0).toFixed(2));
  s.summary.reservoir_completed = s.completed_sites.filter(x=>x.type==='農業水庫').length;
  s.summary.reservoir_mw = parseFloat(s.completed_sites.filter(x=>x.type==='農業水庫').reduce((a,c)=>a+(parseFloat(c.capacity_mw)||0),0).toFixed(2));
  // stages 更新案數與容量
  const stageMap = {
    completed: s.completed_sites,
    construction: s.construction_sites,
    admin: s.admin_sites,
    planning: s.planning_sites
  };
  s.stages.forEach(st => {
    if (stageMap[st.key]) {
      st.cases = stageMap[st.key].length;
      st.mw = parseFloat(stageMap[st.key].reduce((a,c)=>a+(parseFloat(c.capacity_mw)||0),0).toFixed(2));
    }
  });
  // 各管理處 completed/construction/admin/planning_mw 重算
  s.mgmt.forEach(m => {
    m.completed_mw = parseFloat(s.completed_sites.filter(x=>x.mgmt===m.name).reduce((a,c)=>a+(parseFloat(c.capacity_mw)||0),0).toFixed(4));
    m.construction_mw = parseFloat(s.construction_sites.filter(x=>x.mgmt===m.name).reduce((a,c)=>a+(parseFloat(c.capacity_mw)||0),0).toFixed(4));
    m.admin_mw = parseFloat(s.admin_sites.filter(x=>x.mgmt===m.name).reduce((a,c)=>a+(parseFloat(c.capacity_mw)||0),0).toFixed(4));
    m.planning_mw = parseFloat(s.planning_sites.filter(x=>x.mgmt===m.name).reduce((a,c)=>a+(parseFloat(c.capacity_mw)||0),0).toFixed(4));
    m.remaining_mw = parseFloat((m.construction_mw + m.admin_mw + m.planning_mw).toFixed(4));
    m.total_potential_mw = parseFloat((m.completed_mw + m.remaining_mw).toFixed(4));
    m.achievement_pct = m.target_mw > 0 ? parseFloat((m.completed_mw / m.target_mw * 100).toFixed(1)) : 0;
  });
  // 小水力 summary
  const h = DATA.hydro;
  h.summary.total_cases = h.sites.length;
  h.summary.total_capacity_kw = parseFloat(h.sites.reduce((a,c)=>a+(parseFloat(c.capacity_kw)||0),0).toFixed(2));
  const completedHydro = h.sites.filter(x=>x.substage === '營運中');
  h.summary.completed_cases = completedHydro.length;
  h.summary.completed_capacity_kw = parseFloat(completedHydro.reduce((a,c)=>a+(parseFloat(c.capacity_kw)||0),0).toFixed(2));
  const inProgressHydro = h.sites.filter(x=>x.substage !== '營運中');
  h.summary.in_progress_cases = inProgressHydro.length;
  h.summary.in_progress_capacity_kw = parseFloat(inProgressHydro.reduce((a,c)=>a+(parseFloat(c.capacity_kw)||0),0).toFixed(2));
  // 小水力各管理處 - 確保 14 處全列出(與太陽光電一致)
  // STANDARD_MGMTS 已提升為全域常數
  const existingNames = new Set(h.mgmt.map(m=>m.name));
  // 先補上 sites 中出現但 mgmt 沒收錄的管理處(以及缺漏的標準管理處)
  const allMgmtNames = new Set([...existingNames, ...STANDARD_MGMTS]);
  h.sites.forEach(s => { if (s.mgmt) allMgmtNames.add(s.mgmt); });
  allMgmtNames.forEach(name => {
    if (!existingNames.has(name)) {
      h.mgmt.push({ name, cases:0, capacity_kw:0, completed_cases:0, completed_kw:0, in_progress_cases:0, in_progress_kw:0, anomaly_cases:0 });
      existingNames.add(name);
    }
  });
  
  h.mgmt.forEach(m => {
    const mSites = h.sites.filter(x=>x.mgmt===m.name);
    m.cases = mSites.length;
    m.capacity_kw = parseFloat(mSites.reduce((a,c)=>a+(parseFloat(c.capacity_kw)||0),0).toFixed(2));
    const mDone = mSites.filter(x=>x.substage === '營運中');
    m.completed_cases = mDone.length;
    m.completed_kw = parseFloat(mDone.reduce((a,c)=>a+(parseFloat(c.capacity_kw)||0),0).toFixed(2));
    const mProg = mSites.filter(x=>x.substage !== '營運中');
    m.in_progress_cases = mProg.length;
    m.in_progress_kw = parseFloat(mProg.reduce((a,c)=>a+(parseFloat(c.capacity_kw)||0),0).toFixed(2));
    m.anomaly_cases = mSites.filter(x=>isRealAnomaly(x)).length;
  });
}
