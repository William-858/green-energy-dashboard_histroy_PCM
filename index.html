const STORAGE_KEY = 'dashboard_data_v1';
const OPINION_KEY = 'dashboard_opinion_v1';   // 輿情監控資料

// ==================== 輿情監控功能 ====================
// loadOpinions / saveOpinions 支援 tab 分流 (solar/hydro)
// 為向後相容:若舊資料是 array,自動遷移到 solar
function loadAllOpinions() {
  try {
    const s = localStorage.getItem(OPINION_KEY);
    if (!s) return { solar: [], hydro: [] };
    const parsed = JSON.parse(s);
    // 舊版資料(array)→ 遷移成 solar
    if (Array.isArray(parsed)) {
      const migrated = { solar: parsed, hydro: [] };
      localStorage.setItem(OPINION_KEY, JSON.stringify(migrated));
      return migrated;
    }
    return { solar: parsed.solar || [], hydro: parsed.hydro || [] };
  } catch(e) { return { solar: [], hydro: [] }; }
}

function loadOpinions(tab) {
  const tabKey = tab || state.tab || 'solar';
  return loadAllOpinions()[tabKey] || [];
}

// 從同目錄抓 opinions.json(若有,代表這是「公開部署版」)
// 抓到後寫進 localStorage 作為主要資料來源
async function fetchOpinionsFromServer() {
  // 加上 cache buster 避免瀏覽器/CDN 快取舊版
  const url = 'opinions.json?t=' + Date.now();
  try {
    const resp = await fetch(url, { cache: 'no-store' });
    if (!resp.ok) return null;
    const data = await resp.json();
    // 驗證結構
    if (!data || typeof data !== 'object') return null;
    const normalized = {
      solar: Array.isArray(data.solar) ? data.solar : [],
      hydro: Array.isArray(data.hydro) ? data.hydro : []
    };
    // 寫進 localStorage(覆蓋本機;PDF 等大型內容仍會保留在本機,因為 server 端 JSON 不含 base64)
    // 為了不損失本機已上傳的 PDF base64,做合併:server 是基底,但本機已存在的 base64 留著
    try {
      const local = loadAllOpinions();
      ['solar','hydro'].forEach(tab => {
        normalized[tab].forEach(serverOp => {
          const localOp = (local[tab] || []).find(x => x.id === serverOp.id);
          if (!localOp) return;
          // 合併 negative/clarification 的 PDF base64(若 server 沒有但本機有,把 base64 補回去)
          ['negative','clarification'].forEach(side => {
            (serverOp[side] || []).forEach(srvSrc => {
              if (srvSrc.type === 'pdf' && !srvSrc.base64) {
                const localSrc = (localOp[side] || []).find(s => s.id === srvSrc.id);
                if (localSrc && localSrc.base64) {
                  srvSrc.base64 = localSrc.base64;
                  srvSrc.filename = srvSrc.filename || localSrc.filename;
                  srvSrc.filesize = srvSrc.filesize || localSrc.filesize;
                }
              }
            });
          });
        });
      });
    } catch(e) { /* 合併失敗也沒關係,server 版仍可用 */ }
    
    localStorage.setItem(OPINION_KEY, JSON.stringify(normalized));
    return normalized;
  } catch(e) {
    // 沒有 opinions.json 是正常的(本機開發/未發布雲端版),靜默
    return null;
  }
}

// 匯出輿情 JSON 給使用者下載(供上傳到 GitHub)
// 自動把 PDF base64 抽掉(太大、隱私問題),只保留結構性資料
function exportOpinionsJson() {
  const all = loadAllOpinions();
  const exported = { solar: [], hydro: [] };
  
  let pdfCount = 0;
  ['solar','hydro'].forEach(tab => {
    (all[tab] || []).forEach(op => {
      // 深拷貝
      const copy = JSON.parse(JSON.stringify(op));
      ['negative','clarification'].forEach(side => {
        (copy[side] || []).forEach(src => {
          if (src.type === 'pdf' && src.base64) {
            delete src.base64;     // 移除 base64,避免 JSON 過大
            src._pdf_local_only = true;
            pdfCount++;
          }
        });
      });
      exported[tab].push(copy);
    });
  });
  
  const json = JSON.stringify(exported, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'opinions.json';
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  
  // 提示
  const totalCount = (exported.solar.length + exported.hydro.length);
  let msg = '✅ 已匯出 opinions.json(共 ' + totalCount + ' 個輿情事件)\n\n';
  msg += '📋 後續步驟:\n';
  msg += '1. 把 opinions.json 上傳到你的 GitHub repo(跟 index.html 同目錄)\n';
  msg += '2. Commit & Push(或網頁版直接拖檔覆蓋)\n';
  msg += '3. GitHub Pages 約 1 分鐘後生效,其他人重整就會看到\n';
  if (pdfCount > 0) {
    msg += '\n⚠️ 注意:有 ' + pdfCount + ' 個 PDF 因檔案過大未匯出。\n';
    msg += '   其他人會看到 PDF 標題與摘要,但無法開啟檔案。\n';
    msg += '   建議:把重要 PDF 上傳到 Google Drive,改用「URL 來源」放連結。';
  }
  alert(msg);
}


function saveOpinions(arr, tab) {
  const tabKey = tab || state.tab || 'solar';
  const all = loadAllOpinions();
  all[tabKey] = arr;
  try {
    localStorage.setItem(OPINION_KEY, JSON.stringify(all));
    return true;
  } catch(e) {
    alert('儲存失敗:可能超過 localStorage 容量(5MB)。請刪除部分 PDF 後重試。');
    return false;
  }
}

// ===== case_ref 選項清單生成 =====
// 回傳格式: [{ group: '群組名', options: [{value, label, meta}] }]
function getCaseRefOptions(tab) {
  const groups = [];
  if (tab === 'solar') {
    const stages = [
      { key: 'completed_sites', label: '已完工案場' },
      { key: 'construction_sites', label: '施工/待施工/停工中' },
      { key: 'admin_sites', label: '行政程序中' },
      { key: 'planning_sites', label: '規劃推動/招商中' },
      { key: 'cancelled_sites', label: '解約/撤案' }
    ];
    stages.forEach(s => {
      const rows = DATA.solar[s.key] || [];
      if (rows.length === 0) return;
      groups.push({
        group: '太陽光電 - ' + s.label,
        options: rows.map((r, idx) => ({
          value: 'solar:' + s.key + ':' + idx,
          label: r.name || '(無名稱)',
          meta: { mgmt: r.mgmt, capacity: r.capacity_mw }
        }))
      });
    });
    // 管理處(去重)
    const mgmts = [...new Set((DATA.solar.completed_sites || [])
      .concat(DATA.solar.construction_sites || [])
      .concat(DATA.solar.admin_sites || [])
      .concat(DATA.solar.planning_sites || [])
      .map(r => r.mgmt).filter(Boolean))];
    if (mgmts.length) {
      groups.push({
        group: '太陽光電 - 管理處',
        options: mgmts.sort().map(m => ({
          value: 'solar:mgmt:' + m,
          label: m + '管理處',
          meta: {}
        }))
      });
    }
  } else {
    // 小水力
    const sites = DATA.hydro.sites || [];
    if (sites.length) {
      groups.push({
        group: '小水力 - 案場',
        options: sites.map((r, idx) => ({
          value: 'hydro:sites:' + idx,
          label: r.name || '(無名稱)',
          meta: { mgmt: r.mgmt, capacity: r.capacity_kw }
        }))
      });
    }
    const mgmts = [...new Set(sites.map(r => r.mgmt).filter(Boolean))];
    if (mgmts.length) {
      groups.push({
        group: '小水力 - 管理處',
        options: mgmts.sort().map(m => ({
          value: 'hydro:mgmt:' + m,
          label: m + '管理處',
          meta: {}
        }))
      });
    }
  }
  return groups;
}

// ===== 從 case_ref 解析回完整案場資訊 =====
// case_ref 格式: 'solar:completed_sites:5' 或 'solar:mgmt:嘉南'
function resolveCaseRef(caseRef) {
  if (!caseRef || typeof caseRef !== 'string') return null;
  const parts = caseRef.split(':');
  if (parts.length < 3) return null;
  const [category, kind, key] = parts;
  
  if (kind === 'mgmt') {
    // 管理處關聯:回傳該管理處的彙整資訊
    if (category === 'solar') {
      const m = (DATA.solar.mgmt || []).find(x => x.name === key);
      if (!m) return { type: 'mgmt', category, name: key + '管理處', notFound: true };
      return {
        type: 'mgmt', category, name: key + '管理處',
        target_mw: m.target_mw,
        completed_mw: m.completed_mw,
        achievement_pct: m.achievement_pct,
        total_potential_mw: m.total_potential_mw
      };
    } else {
      const m = (DATA.hydro.mgmt || []).find(x => x.name === key);
      if (!m) return { type: 'mgmt', category, name: key + '管理處', notFound: true };
      return {
        type: 'mgmt', category, name: key + '管理處',
        cases: m.cases,
        capacity_kw: m.capacity_kw,
        completed_cases: m.completed_cases,
        in_progress_cases: m.in_progress_cases,
        anomaly_cases: m.anomaly_cases
      };
    }
  }
  
  // 案場關聯
  const idx = parseInt(key);
  let row;
  if (category === 'solar') {
    row = (DATA.solar[kind] || [])[idx];
  } else if (category === 'hydro') {
    row = (DATA.hydro[kind] || [])[idx];
  }
  if (!row) return { type: 'site', category, kind, idx, notFound: true };
  
  return { type: 'site', category, kind, idx, row };
}

// 取 stage 中文標籤(從 site 推算)
function getSiteStageLabel(kind) {
  return ({
    completed_sites: '已完工',
    construction_sites: '施工中/待施工',
    admin_sites: '行政程序中',
    planning_sites: '規劃推動/招商中',
    cancelled_sites: '解約/撤案',
    sites: '小水力案場'
  })[kind] || kind;
}

// 從 URL 自動識別來源(100% 可靠,只解析 URL 字串,不發網路請求)
function detectSourceFromUrl(url) {
  if (!url || typeof url !== 'string') return '';
  // 取出 hostname
  let host = '';
  try {
    const u = new URL(url);
    host = u.hostname.toLowerCase().replace(/^www\./, '');
  } catch(e) {
    // URL 不合法,嘗試 regex 抓
    const m = url.match(/^(?:https?:\/\/)?(?:www\.)?([^/?#]+)/i);
    host = (m && m[1] || '').toLowerCase();
  }
  if (!host) return '';
  // hostname 必須含 . 才算合理(避免「not a url」這類非網址字串被誤判)
  if (!host.includes('.')) return '';
  
  // 對應表:hostname → 中文來源名
  const map = {
    // 社群
    'facebook.com': 'Facebook',
    'm.facebook.com': 'Facebook',

    'moea.gov.tw': '經濟部',
    // 其他
    'reddit.com': 'Reddit',
    'wikipedia.org': '維基百科'
  };
  
  if (map[host]) return map[host];
  
  // 部分匹配(處理子網域,例:news.cnyes.com → 鉅亨網)
  if (host.endsWith('.cnyes.com')) return '鉅亨網';

  if (host.endsWith('.ltn.com.tw')) return '自由時報';

function autoFillSourceFromUrl(url) {

// 上傳 PDF -> base64
function pdfToBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result); // data:application/pdf;base64,...
    r.onerror = () => reject(new Error('讀取失敗'));
    r.readAsDataURL(file);
  });
}

// 開啟 PDF (base64)
function openPdfBase64(base64Data, filename) {
  // base64 -> Blob -> URL
  const arr = base64Data.split(',');
  const mime = arr[0].match(/:(.*?);/)[1];
  const bstr = atob(arr[1]);
  const u8 = new Uint8Array(bstr.length);
  for (let i = 0; i < bstr.length; i++) u8[i] = bstr.charCodeAt(i);
  const blob = new Blob([u8], { type: mime });
  const url = URL.createObjectURL(blob);
  const w = window.open(url, '_blank');
  if (!w) {
    // 彈出視窗被擋,改用下載
    const a = document.createElement('a');
    a.href = url;
    a.download = filename || 'document.pdf';
    a.click();
  }
  setTimeout(() => URL.revokeObjectURL(url), 60000);
}

// 為單筆案場產生穩定識別 key (用案場名稱,因為「name」欄是唯一且穩定的)
function siteKey(s) { return String(s.name || '').trim(); }

// 比對單一區塊的差異
function diffSection(prevRows, curRows, fieldsToCompare) {
  prevRows = prevRows || [];
  curRows = curRows || [];
  const prevMap = new Map();
  prevRows.forEach(r => { const k = siteKey(r); if (k) prevMap.set(k, r); });
  const curMap = new Map();
  curRows.forEach(r => { const k = siteKey(r); if (k) curMap.set(k, r); });
  
  const added = [];      // 新版有、舊版沒有
  const removed = [];    // 舊版有、新版沒有
  const modified = [];   // 兩版都有,但欄位有變
  
  curMap.forEach((row, k) => {
    if (!prevMap.has(k)) {
      added.push(row);
    } else {
      const oldRow = prevMap.get(k);
      const changes = [];
      fieldsToCompare.forEach(f => {
        const ov = oldRow[f] == null ? '' : oldRow[f];
        const nv = row[f] == null ? '' : row[f];
        // 數字比較:容差 0.0001 以避免浮點誤差
        if (typeof ov === 'number' && typeof nv === 'number') {
          if (Math.abs(ov - nv) > 0.0001) changes.push({ field: f, from: ov, to: nv });
        } else if (String(ov) !== String(nv)) {
          changes.push({ field: f, from: String(ov), to: String(nv) });
        }
      });
      if (changes.length > 0) modified.push({ name: k, changes, row });
    }
  });
  prevMap.forEach((row, k) => {
    if (!curMap.has(k)) removed.push(row);
  });
  
  return { added, removed, modified };
}

// 完整 diff 計算
function computeDiff(prev, cur) {
  if (!prev || !cur) return null;
  
  const sections = {
    'solar.completed_sites': { label: '已完工案場', fields: ['mgmt','type','county','capacity_mw','grid_date','vendor'] },
    'solar.construction_sites': { label: '施工中/待施工/停工中', fields: ['mgmt','type','county','capacity_mw','expected_date','progress','vendor','stage'] },
    'solar.admin_sites': { label: '行政程序中', fields: ['mgmt','type','county','capacity_mw','progress','vendor'] },
    'solar.planning_sites': { label: '規劃推動/招商中', fields: ['mgmt','type','county','capacity_mw','progress','vendor'] },
    'solar.cancelled_sites': { label: '解約/撤案', fields: ['mgmt','type','county','capacity_mw','vendor','date','reason'] },
    'hydro.sites': { label: '小水力案場', fields: ['mgmt','county','capacity_kw','stage','substage','vendor','operation'] }
  };
  
  const sectionDiffs = {};
  Object.keys(sections).forEach(key => {
    const [a, b] = key.split('.');
    const prevRows = (prev[a] && prev[a][b]) || [];
    const curRows = (cur[a] && cur[a][b]) || [];
    const d = diffSection(prevRows, curRows, sections[key].fields);
    sectionDiffs[key] = { ...d, label: sections[key].label, fieldLabels: sections[key].fields };
  });
  
  // 總量變化
  const totals = {
    solar_completed_mw: { from: prev.solar.summary.total_completed_mw, to: cur.solar.summary.total_completed_mw },
    solar_completed_cases: { from: prev.solar.summary.total_completed_cases, to: cur.solar.summary.total_completed_cases },
    hydro_total_cases: { from: prev.hydro.summary.total_cases, to: cur.hydro.summary.total_cases },
    hydro_total_kw: { from: prev.hydro.summary.total_capacity_kw, to: cur.hydro.summary.total_capacity_kw },
    hydro_completed_cases: { from: prev.hydro.summary.completed_cases, to: cur.hydro.summary.completed_cases }
  };
  
  // 各 stage 案數變化
  const stages = {};
  ['completed','construction','admin','tender','planning'].forEach(skey => {
    const ps = prev.solar.stages.find(x=>x.key===skey);
    const cs = cur.solar.stages.find(x=>x.key===skey);
    if (ps && cs) {
      stages[skey] = {
        label: ps.name || cs.name || skey,
        cases_from: ps.cases, cases_to: cs.cases,
        mw_from: ps.mw, mw_to: cs.mw
      };
    }
  });
  
  // 各管理處達成率變化
  const mgmtChanges = [];
  cur.solar.mgmt.forEach(cm => {
    const pm = prev.solar.mgmt.find(x => x.name === cm.name);
    if (!pm) return;
    if (Math.abs(pm.completed_mw - cm.completed_mw) > 0.0001 || Math.abs(pm.achievement_pct - cm.achievement_pct) > 0.1) {
      mgmtChanges.push({
        name: cm.name,
        completed_from: pm.completed_mw, completed_to: cm.completed_mw,
        pct_from: pm.achievement_pct, pct_to: cm.achievement_pct
      });
    }
  });
  
  return {
    timestamp: new Date().toISOString(),
    prev_updated_at: prev.updated_at,
    cur_updated_at: cur.updated_at,
    prev_source: (prev.meta && prev.meta.source) || '',
    cur_source: (cur.meta && cur.meta.source) || '',
    sections: sectionDiffs,
    totals: totals,
    stages: stages,
    mgmtChanges: mgmtChanges
  };
}

// 從檔名抽出民國日期(7 碼):民國 110~139 年 + 01~12 月 + 01~31 日
// 掃過所有 7 碼數字,挑第一個落在合理日期範圍的
function extractROCDate(filename) {
  const re = /(\d{7})/g;
  let m;
  while ((m = re.exec(filename)) !== null) {
    const s = m[1];
    const yr = parseInt(s.substring(0, 3));
    const mo = parseInt(s.substring(3, 5));
    const dy = parseInt(s.substring(5, 7));
    if (yr >= 110 && yr <= 139 && mo >= 1 && mo <= 12 && dy >= 1 && dy <= 31) {
      return s;
    }
  }
  return null;
}

// Excel 匯入
function importExcel(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (typeof XLSX === 'undefined') {
    alert('Excel 解析函式庫尚未載入,請檢查網路連線後重試');
    event.target.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: 'array', cellDates: false });
      const parsed = parseExcelWorkbook(wb);
      // 從檔名抽出民國日期 (例如 1150428):3 碼民國年(110-139) + 2 碼月 + 2 碼日
      // 用合理範圍避開檔名前綴的雜湊 hex
      parsed.fileName = file.name;
      parsed.fileDate = extractROCDate(file.name);
      // 開啟預覽 modal,讓使用者選擇要匯入哪些區塊
      state.importPreview = parsed;
      state.importPreviewSelections = {};
      Object.keys(parsed.sections).forEach(k => {
        // 預設只勾選有資料的區塊
        state.importPreviewSelections[k] = parsed.sections[k].rows.length > 0;
      });
      render();
    } catch (err) {
      console.error(err);
      alert('Excel 解析失敗:' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
  event.target.value = '';
}

// 解析 Excel workbook → 結構化資料
function parseExcelWorkbook(wb) {
  const result = {
    sheetNames: wb.SheetNames,
    sections: {
      'solar.completed_sites': { label: '太陽光電 - 已完工案場', rows: [], warnings: [] },
      'solar.construction_sites': { label: '太陽光電 - 施工中/待施工/停工中', rows: [], warnings: [] },
      'solar.admin_sites': { label: '太陽光電 - 行政程序中', rows: [], warnings: [] },
      'solar.planning_sites': { label: '太陽光電 - 規劃推動/招商中', rows: [], warnings: [] },
      'solar.cancelled_sites': { label: '太陽光電 - 解約/撤案', rows: [], warnings: [] },
      'hydro.sites': { label: '小水力 - 案場(已完工 + 推動中)', rows: [], warnings: [] }
    }
  };
  
  // 尋找符合條件的分頁名
  const findSheet = (patterns) => {
    for (const sn of wb.SheetNames) {
      for (const p of patterns) {
        if (sn.includes(p)) return sn;
      }
    }
    return null;
  };
  
  // 將 sheet 轉成二維陣列
  const sheetToArr = (sn) => {
    if (!sn || !wb.Sheets[sn]) return [];
    return XLSX.utils.sheet_to_json(wb.Sheets[sn], { header: 1, defval: null, blankrows: false });
  };
  
  // 找標題列(內含「項次」或「縣市」+ 「案場名稱」)
  const findHeaderRow = (rows) => {
    for (let i = 0; i < Math.min(rows.length, 8); i++) {
      const r = rows[i] || [];
      const joined = r.map(c => (c == null ? '' : String(c))).join('|');
      if (joined.includes('項次') && joined.includes('案場名稱')) return i;
    }
    return -1;
  };
  
  // 找欄位索引(模糊匹配)
  const findCol = (header, patterns) => {
    for (let i = 0; i < header.length; i++) {
      const cell = String(header[i] || '').replace(/\s+/g, '');
      for (const p of patterns) {
        if (cell.includes(p)) return i;
      }
    }
    return -1;
  };
  
  // 判斷一筆 row 是不是「資料列」:編號為正整數,且案場名稱有內容、不是小計/合計
  const isDataRow = (r, noIdx, nameIdx) => {
    const v = r[noIdx];
    if (!(typeof v === 'number' && Number.isInteger(v) && v > 0 && v < 10000)) return false;
    if (nameIdx >= 0) {
      const name = String(r[nameIdx] || '').trim();
      if (!name) return false;
      if (name.includes('小計') || name.includes('合計') || name.startsWith('-')) return false;
    }
    return true;
  };

  // ===== 1. 已完工案場 =====
  const sn1 = findSheet(['已完工併聯案場(依管理處)', '已完工併聯案場']);
  if (sn1) {
    const arr = sheetToArr(sn1);
    const hi = findHeaderRow(arr);
    if (hi >= 0) {
      const h = arr[hi];
      const col = {
        no: findCol(h, ['項次']),
        county: findCol(h, ['縣市']),
        type: findCol(h, ['類型']),
        mgmt: findCol(h, ['管理處']),
        name: findCol(h, ['案場名稱']),
        capacity_mw: findCol(h, ['裝置容量']),
        grid_date: findCol(h, ['併網日期','併聯日期']),
        vendor: findCol(h, ['廠商'])
      };
      let noCounter = 0;
      for (let i = hi + 1; i < arr.length; i++) {
        const r = arr[i];
        if (!r || !isDataRow(r, col.no, col.name)) continue;
        noCounter++;
        result.sections['solar.completed_sites'].rows.push({
          no: noCounter,
          county: r[col.county] || '',
          type: r[col.type] || '',
          mgmt: r[col.mgmt] || '',
          name: r[col.name] || '',
          capacity_mw: parseFloat(r[col.capacity_mw]) || 0,
          completion_year: '',  // 從併網日期推算
          grid_date: r[col.grid_date] != null ? String(r[col.grid_date]) : '',
          vendor: r[col.vendor] || '',
          stage: '已完工'
        });
      }
      // 從 grid_date 推 completion_year (民國年)
      result.sections['solar.completed_sites'].rows.forEach(s => {
        const m = (s.grid_date || '').match(/^(\d{3})\//);
        if (m) s.completion_year = m[1] + '年';
      });
    } else {
      result.sections['solar.completed_sites'].warnings.push('找不到標題列(項次/案場名稱)');
    }
  } else {
    result.sections['solar.completed_sites'].warnings.push('找不到「已完工併聯案場」分頁');
  }

  // ===== 2. 施工中/待施工/停工中 =====
  const sn2 = findSheet(['施工中 停工中 待施工','施工中/停工中/待施工']);
  if (sn2) {
    const arr = sheetToArr(sn2);
    const hi = findHeaderRow(arr);
    if (hi >= 0) {
      const h = arr[hi];
      const col = {
        no: findCol(h, ['項次']),
        county: findCol(h, ['縣市']),
        type: findCol(h, ['類型']),
        mgmt: findCol(h, ['管理處']),
        name: findCol(h, ['案場名稱']),
        capacity_mw: findCol(h, ['裝置容量']),
        expected_date: findCol(h, ['預計完工','預計併網','預計完工併網']),
        note: findCol(h, ['備註']),
        progress: findCol(h, ['辦理進度']),
        vendor: findCol(h, ['廠商'])
      };
      // 還需追蹤目前讀到「施工中/待施工/停工中」哪一段
      let currentStage = '施工中';
      let noCounter = 0;
      for (let i = hi + 1; i < arr.length; i++) {
        const r = arr[i];
        if (!r) continue;
        const firstCell = String(r[0] || '');
        // 區段標題
        if (firstCell.match(/^\d+\.?\s*施工中案件/)) { currentStage = '施工中'; noCounter = 0; continue; }
        if (firstCell.match(/^\d+\.?\s*待施工案件/)) { currentStage = '待施工'; noCounter = 0; continue; }
        if (firstCell.match(/^\d+\.?\s*停工中案件/)) { currentStage = '停工中'; noCounter = 0; continue; }
        if (!isDataRow(r, col.no, col.name)) continue;
        noCounter++;
        result.sections['solar.construction_sites'].rows.push({
          no: noCounter,
          county: r[col.county] || '',
          type: r[col.type] || '',
          mgmt: r[col.mgmt] || '',
          name: r[col.name] || '',
          capacity_mw: parseFloat(r[col.capacity_mw]) || 0,
          expected_date: r[col.expected_date] != null ? String(r[col.expected_date]) : '',
          note: r[col.note] || '',
          progress: r[col.progress] || currentStage,
          vendor: r[col.vendor] || '',
          stage: currentStage
        });
      }
    }
  } else {
    result.sections['solar.construction_sites'].warnings.push('找不到「施工中/停工中/待施工」分頁');
  }

  // ===== 3. 行政程序中 =====
  const sn3 = findSheet(['行政程序中']);
  if (sn3) {
    const arr = sheetToArr(sn3);
    const hi = findHeaderRow(arr);
    if (hi >= 0) {
      const h = arr[hi];
      const col = {
        no: findCol(h, ['項次']),
        county: findCol(h, ['縣市']),
        type: findCol(h, ['類型']),
        mgmt: findCol(h, ['管理處']),
        name: findCol(h, ['案場名稱']),
        capacity_mw: findCol(h, ['裝置容量']),
        progress: findCol(h, ['辦理進度']),
        vendor: findCol(h, ['廠商'])
      };
      let noCounter = 0;
      for (let i = hi + 1; i < arr.length; i++) {
        const r = arr[i];
        if (!r || !isDataRow(r, col.no, col.name)) continue;
        noCounter++;
        result.sections['solar.admin_sites'].rows.push({
          no: noCounter,
          county: r[col.county] || '',
          type: r[col.type] || '',
          mgmt: r[col.mgmt] || '',
          name: r[col.name] || '',
          capacity_mw: parseFloat(r[col.capacity_mw]) || 0,
          progress: r[col.progress] || '',
          vendor: r[col.vendor] || '',
          stage: '行政程序中'
        });
      }
    }
  } else {
    result.sections['solar.admin_sites'].warnings.push('找不到「行政程序中」分頁');
  }

  // ===== 4. 規劃推動 =====
  const sn4 = findSheet(['規劃推動案件']);
  if (sn4) {
    const arr = sheetToArr(sn4);
    // 規劃推動可能有多個標題列(招商中、招商中案件兩段),逐次掃描
    const headerRowIdxs = [];
    for (let i = 0; i < arr.length; i++) {
      const r = arr[i] || [];
      const joined = r.map(c => (c == null ? '' : String(c))).join('|');
      if (joined.includes('項次') && joined.includes('案場名稱')) headerRowIdxs.push(i);
    }
    const ranges = headerRowIdxs.map((hi, k) => ({ hi, end: k + 1 < headerRowIdxs.length ? headerRowIdxs[k+1] : arr.length }));
    let noCounter = 0;
    ranges.forEach(rg => {
      const h = arr[rg.hi];
      const col = {
        no: findCol(h, ['項次']),
        county: findCol(h, ['縣市']),
        type: findCol(h, ['類型']),
        mgmt: findCol(h, ['管理處']),
        name: findCol(h, ['案場名稱']),
        capacity_mw: findCol(h, ['裝置容量']),
        progress: findCol(h, ['辦理進度']),
        vendor: findCol(h, ['廠商'])
      };
      for (let i = rg.hi + 1; i < rg.end; i++) {
        const r = arr[i];
        if (!r || !isDataRow(r, col.no, col.name)) continue;
        noCounter++;
        result.sections['solar.planning_sites'].rows.push({
          no: noCounter,
          county: r[col.county] || '',
          type: r[col.type] || '',
          mgmt: r[col.mgmt] || '',
          name: r[col.name] || '',
          capacity_mw: parseFloat(r[col.capacity_mw]) || 0,
          progress: r[col.progress] || '',
          vendor: r[col.vendor] || '',
          stage: '規劃推動-招商中'
        });
      }
    });
  } else {
    result.sections['solar.planning_sites'].warnings.push('找不到「規劃推動案件」分頁');
  }

  // ===== 5. 解約/撤案 (合併三個年度分頁) =====
  for (const sn of wb.SheetNames) {
    const m = sn.match(/^(\d{3})年解約/);
    if (!m) continue;
    const year = parseInt(m[1]);
    const arr = sheetToArr(sn);
    let hi = -1;
    for (let i = 0; i < Math.min(arr.length, 5); i++) {
      const r = arr[i] || [];
      const joined = r.map(c => (c == null ? '' : String(c))).join('|');
      if (joined.includes('項次') && joined.includes('案場名稱')) { hi = i; break; }
    }
    if (hi < 0) continue;
    const h = arr[hi];
    const col = {
      no: findCol(h, ['項次']),
      county: findCol(h, ['縣市']),
      type: findCol(h, ['類型']),
      mgmt: findCol(h, ['管理處']),
      name: findCol(h, ['案場名稱']),
      capacity_mw: findCol(h, ['裝置容量']),
      contract: findCol(h, ['原契約','契約名稱']),
      vendor: findCol(h, ['原廠商','廠商']),
      date: findCol(h, ['解約日期','日期']),
      reason: findCol(h, ['原因']),
      handling: findCol(h, ['處理方式'])
    };
    let subcategory = '全案解約';
    for (let i = hi + 1; i < arr.length; i++) {
      const r = arr[i];
      if (!r) continue;
      const firstCell = String(r[0] || '');
      if (firstCell.match(/^\d+\.?\s*全案解約/)) { subcategory = '全案解約'; continue; }
      if (firstCell.match(/^\d+\.?\s*案場撤案/)) { subcategory = '案場撤案'; continue; }
      if (firstCell.match(/^\d+\.?\s*施工中下修/)) { subcategory = '施工中下修'; continue; }
      if (!isDataRow(r, col.no, col.name)) continue;
      result.sections['solar.cancelled_sites'].rows.push({
        year: year,
        subcategory: subcategory,
        county: r[col.county] || '',
        type: r[col.type] || '',
        mgmt: r[col.mgmt] || '',
        name: r[col.name] || '',
        capacity_mw: parseFloat(r[col.capacity_mw]) || 0,
        contract: r[col.contract] || '',
        vendor: r[col.vendor] || '',
        date: r[col.date] != null ? String(r[col.date]) : '',
        reason: r[col.reason] || '',
        handling: r[col.handling] || ''
      });
    }
  }
  
  // ===== 6. 小水力案場 =====
  // 找含「已完工」+「推動中」字樣的分頁,或含「清冊」
  const hydroSheetName = (function(){
    for (const sn of wb.SheetNames) {
      if (sn.includes('已完工') && sn.includes('推動中')) return sn;
      if (sn.includes('清冊')) return sn;
    }
    return null;
  })();
  
  if (hydroSheetName) {
    const arr = sheetToArr(hydroSheetName);
    
    // 找標題列:含「管理處」「案場名稱」「設置容量」
    let hi = -1;
    for (let i = 0; i < Math.min(arr.length, 10); i++) {
      const r = arr[i] || [];
      const joined = r.map(c => (c == null ? '' : String(c))).join('|');
      if (joined.includes('管理處') && joined.includes('案場名稱') && joined.includes('設置容量')) {
        hi = i;
        break;
      }
    }
    
    if (hi >= 0) {
      const h = arr[hi];
      const col = {
        no: findCol(h, ['項次']),
        mgmt: findCol(h, ['管理處']),
        county: findCol(h, ['縣市']),
        township: findCol(h, ['鄉鎮']),
        contract: findCol(h, ['契約名稱']),
        name: findCol(h, ['案場名稱']),
        capacity_kw: findCol(h, ['設置容量','容量']),
        year: findCol(h, ['完工年度','年度']),
        operation: findCol(h, ['辦理情形','營運狀態']),
        vendor: findCol(h, ['廠商']),
        note: findCol(h, ['備註'])
      };
      
      // 區段識別:(A)~(E) 在第 1 欄或第 2 欄
      // 對應到 substage / stage
      const subMapping = {
        '(A)': { substage: '(A)小水力發電廠', stage: '已完工/已完成' },
        '(B)': { substage: '(B)測試案場-已完成', stage: '已完工/已完成' },
        '(C)': { substage: '(C)專案示範案場', stage: '已完工/已完成' },
        '(D)': { substage: '(D)招標案場', stage: '推動中' },
        '(E)': { substage: '(E)測試案場-推動中', stage: '推動中' }
      };
      
      // 判斷異常:辦理情形含特定關鍵字
      const detectAnomaly = (op, note) => {
        const t = String(op || '') + ' ' + String(note || '');
        // 紅色等級:拆除、停機、停運、終止
        if (/拆除|停機|停運|終止|解約/.test(t)) {
          const m = t.match(/(機組已拆除|已拆除|停機|停運|終止|解約)/);
          return { is_anomaly: true, anomaly_type: (m ? m[1] : '異常'), anomaly_level: 'red' };
        }
        // 黃色等級:調整中、施工中、待併網、暫停
        if (/機組調整|另列項次|暫停|測試中|施工中|待併網|未營運/.test(t)) {
          const m = t.match(/(機組調整中|另列項次|暫停|測試中|施工中|待併網|未營運)/);
          return { is_anomaly: true, anomaly_type: (m ? m[1] : '需追蹤'), anomaly_level: 'yellow' };
        }
        return { is_anomaly: false, anomaly_type: '', anomaly_level: '' };
      };
      
      // 是否為「資料列」: 項次必須是正整數 + 管理處有值 + 案場名稱有值
      // (跟官方計數規則一致:沒項次的列視為補充說明/重複列出/未正式納入,不計)
      const isHydroDataRow = (r) => {
        if (!r) return false;
        const noVal = col.no >= 0 ? r[col.no] : null;
        if (!(typeof noVal === 'number' && Number.isInteger(noVal) && noVal > 0 && noVal < 10000)) return false;
        const mgmt = String((col.mgmt >= 0 ? r[col.mgmt] : '') || '').trim();
        const name = String((col.name >= 0 ? r[col.name] : '') || '').trim();
        if (!mgmt || !name) return false;
        // 排除小計、合計、總計(雖然這些通常項次也不是數字,但雙重保險)
        if (name.includes('小計') || name.includes('合計') || name.includes('總計')) return false;
        if (mgmt.includes('小計') || mgmt.includes('合計') || mgmt.includes('總計')) return false;
        return true;
      };
      
      // 判斷是否為區段標題列(col1 或 col2 含 (A)~(E))
      const detectSection = (r) => {
        if (!r) return null;
        for (let ci = 0; ci < Math.min(3, r.length); ci++) {
          const v = String(r[ci] || '').replace(/\s+/g, '');
          if (v.length > 30) continue; // 太長不是標題
          for (const k of ['(A)','(B)','(C)','(D)','(E)']) {
            if (v.startsWith(k) || v.indexOf(k) === 0) {
              return subMapping[k];
            }
          }
        }
        return null;
      };
      
      let curSub = null;
      let hydroCount = 0;
      
      for (let i = hi + 1; i < arr.length; i++) {
        const r = arr[i];
        if (!r) continue;
        
        // 區段標題?
        const sec = detectSection(r);
        if (sec) {
          curSub = sec;
          continue;
        }
        
        // 不是資料列?
        if (!isHydroDataRow(r)) continue;
        
        // 還沒讀到任何區段標題,略過
        if (!curSub) continue;
        
        const operation = String((col.operation >= 0 ? r[col.operation] : '') || '').trim();
        const noteVal = String((col.note >= 0 ? r[col.note] : '') || '').trim();
        const anomaly = detectAnomaly(operation, noteVal);
        const capacityRaw = col.capacity_kw >= 0 ? r[col.capacity_kw] : null;
        
        hydroCount++;
        result.sections['hydro.sites'].rows.push({
          mgmt: String((col.mgmt >= 0 ? r[col.mgmt] : '') || '').trim(),
          county: String((col.county >= 0 ? r[col.county] : '') || '').trim(),
          township: String((col.township >= 0 ? r[col.township] : '') || '').replace(/\s+/g, ''),
          contract: String((col.contract >= 0 ? r[col.contract] : '') || '').trim(),
          name: String((col.name >= 0 ? r[col.name] : '') || '').trim(),
          capacity_kw: capacityRaw != null && capacityRaw !== '' ? (parseFloat(capacityRaw) || 0) : 0,
          year: String((col.year >= 0 ? r[col.year] : '') || '').trim(),
          operation: operation,
          vendor: String((col.vendor >= 0 ? r[col.vendor] : '') || '').trim(),
          note: noteVal,
          stage: curSub.stage,
          substage: curSub.substage,
          is_anomaly: anomaly.is_anomaly,
          anomaly_type: anomaly.anomaly_type,
          anomaly_level: anomaly.anomaly_level
        });
      }
      
      if (hydroCount === 0) {
        result.sections['hydro.sites'].warnings.push('找到小水力分頁但解析出 0 筆,請檢查欄位格式');
      }
    } else {
      result.sections['hydro.sites'].warnings.push('找到分頁「' + hydroSheetName + '」但找不到標題列(需含「管理處」「案場名稱」「設置容量」)');
    }
  } else {
    result.sections['hydro.sites'].warnings.push('找不到小水力分頁(關鍵字:已完工 + 推動中,或清冊)');
  }
  
  return result;
}

// 套用匯入:把選定的 sections 寫回 DATA
function applyImport() {
  const preview = state.importPreview;
  const sel = state.importPreviewSelections;
  if (!preview || !sel) return;
  
  // 套用前先複製當前 DATA 作為「上一版」快照 (深拷貝)
  const snapshot = JSON.parse(JSON.stringify(DATA));
  
  const applied = [];
  Object.keys(sel).forEach(key => {
    if (!sel[key]) return;
    const rows = preview.sections[key].rows;
    const [a, b] = key.split('.');
    DATA[a][b] = rows;
    applied.push(preview.sections[key].label + '(' + rows.length + ' 筆)');
  });
  
  if (applied.length === 0) {
    alert('沒有選擇任何要匯入的區塊');
    return;
  }
  
  // 同步更新「資料來源」footer
  if (preview.fileDate) {
    if (!DATA.meta) DATA.meta = {};
    const before = DATA.meta.source || '1150116 小水力盤點 + 1150102 太陽光電盤點彙整版';
    let after = before;
    
    const importedSolar = !!(sel['solar.completed_sites'] || sel['solar.construction_sites'] || sel['solar.admin_sites'] || sel['solar.planning_sites'] || sel['solar.cancelled_sites']);
    const importedHydro = !!sel['hydro.sites'];
    
    // 更新太陽光電段
    if (importedSolar) {
      after = after.replace(/(\+\s*)\d{7}(\s*太陽光電)/, '$1' + preview.fileDate + '$2');
      if (!/\d{7}\s*太陽光電/.test(after)) {
        // 找不到「XXXXXXX 太陽光電」段,自己接上
        after = after + ' + ' + preview.fileDate + ' 太陽光電盤點彙整版';
      }
    }
    // 更新小水力段
    if (importedHydro) {
      after = after.replace(/^(\d{7})(\s*小水力)/, preview.fileDate + '$2');
      if (!/^\d{7}\s*小水力/.test(after)) {
        after = preview.fileDate + ' 小水力盤點 + ' + after;
      }
    }
    
    DATA.meta.source = after;
    
    // 同步 updated_at
    const fd = preview.fileDate;
    const yr = parseInt(fd.substring(0, 3)) + 1911;
    const mo = fd.substring(3, 5);
    const dy = fd.substring(5, 7);
    DATA.updated_at = yr + '-' + mo + '-' + dy;
  }
  
  recomputeSummaries();
  
  // 計算 diff 並儲存
  const diff = computeDiff(snapshot, DATA);
  if (diff) {
    saveDiff(diff);
    savePrevSnapshot(snapshot);
  }
  
  saveData();
  state.importPreview = null;
  state.importPreviewSelections = null;
  render();
  
  // 自動展開更新記錄區塊讓使用者看見變動
  state.changelogOpen = true;
  setTimeout(() => {
    const el = document.getElementById('sec-changelog');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 300);
  
  alert('匯入成功!已更新:' + applied.join('、') + (preview.fileDate ? '\n資料日期:' + preview.fileDate : '') + (diff ? '\n\n更新記錄已產生,可在頁面下方「📋 更新記錄」區塊查看' : ''));
}

function cancelImport() {
  state.importPreview = null;
  state.importPreviewSelections = null;
  render();
}

  return `
    <section id="sec-opinion" class="section-card" style="border: 2px solid #f59e0b; background: linear-gradient(to right, #fffbeb, #fff7ed);">
      <div class="px-6 py-4">
        <div class="flex items-center justify-between flex-wrap gap-2 mb-3">
          <div>
            <p class="text-xs font-medium uppercase mb-1" style="color:#92400e;letter-spacing:0.1em">PUBLIC OPINION MONITOR · ${state.tab.toUpperCase()}</p>

// 單一輿情事件卡片
function tplOpinionCard(op) {
  const status = OPINION_STATUSES[op.status] || OPINION_STATUSES.unhandled;
  const severity = OPINION_SEVERITIES[op.severity] || OPINION_SEVERITIES.medium;
  const isOpen = state.opinionCollapsed[op.id] !== true;  // 預設展開
  
  // 解析 case_ref 取得顯示用 label
  let caseRefLabel = '';
  let caseRefInfo = null;
  if (op.case_ref) {
    // 新格式:結構化 id 字串(含 ':')
    if (typeof op.case_ref === 'string' && op.case_ref.includes(':')) {
      caseRefInfo = resolveCaseRef(op.case_ref);
      if (caseRefInfo && !caseRefInfo.notFound) {
        if (caseRefInfo.type === 'mgmt') {
          caseRefLabel = caseRefInfo.name;
        } else {
          caseRefLabel = caseRefInfo.row.name || '(無名稱)';
        }
      } else {
        caseRefLabel = '(資料已不存在)';
      }
    } else {
      // 舊格式:純文字(向後相容)
      caseRefLabel = op.case_ref;
    }
  }
  
  return `
    <div class="rounded-xl mb-3 overflow-hidden" style="background:white; border:1px solid #fbbf24">
      <!-- 標頭 -->
      <div class="px-4 py-3" style="background:#fef3c7; border-bottom:1px solid #fbbf24">
        <div class="flex items-start justify-between flex-wrap gap-2">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 flex-wrap">
              <span class="text-sm font-bold" style="color:${severity.color}">${severity.label}</span>
              <span class="text-xs px-2 py-0.5 rounded-full" style="background:${status.bg};color:${status.color};border:1px solid ${status.color}">${status.label}</span>
              ${caseRefLabel ? `<span class="text-xs px-2 py-0.5 rounded-full" style="background:#e0e7ff;color:#3730a3">📍 ${caseRefLabel}</span>` : ''}
            </div>
            <h3 class="text-base font-bold mt-1" style="color:#78350f">${op.title}</h3>
            ${op.summary ? `<p class="text-xs mt-1" style="color:#92400e;line-height:1.4">${op.summary}</p>` : ''}
            <p class="text-xs mt-1" style="color:#a16207">
              建立:${op.created_at || '-'}${op.updated_at && op.updated_at !== op.created_at ? ' ・ 更新:' + op.updated_at : ''}
              ・ 負面 ${(op.negative||[]).length} 筆 / 澄清 ${(op.clarification||[]).length} 筆
            </p>
          </div>
          <div class="flex gap-1 no-print">
            <button class="icon-btn" style="padding:3px 8px;font-size:11px"
                    onclick="state.opinionCollapsed['${op.id}'] = ${isOpen}; render();">
              ${isOpen ? '收合 ▲' : '展開 ▼'}
            </button>
            <button class="icon-btn" style="padding:3px 8px;font-size:11px"
                    onclick="state.opinionEditor = { mode:'edit', oid: '${op.id}' }; render();">
              ✏️ 編輯
            </button>
            <button class="icon-btn" style="padding:3px 8px;font-size:11px;background:#fee2e2;color:#991b1b;border-color:#dc2626"
                    onclick="deleteOpinion('${op.id}')">
              🗑️ 刪除
            </button>
          </div>
        </div>
      </div>
      
      ${isOpen ? `
        <!-- 案場/管理處資訊內嵌(若有關聯) -->
        ${op.case_ref ? `<div class="px-4 pt-3">${tplCaseRefEmbed(op.case_ref)}</div>` : ''}
        
        <!-- 雙欄並排:負面 vs 澄清 -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-3 p-4">
          <!-- 負面 -->
          <div class="rounded-lg" style="background:#fef2f2;border:1px solid #ef4444">
            <div class="px-3 py-2 flex items-center justify-between" style="background:#fee2e2;border-bottom:1px solid #ef4444">
              <div class="font-bold text-sm" style="color:#991b1b">⚠️ 負面輿論 / 攻擊言論</div>
              <button class="icon-btn no-print" style="padding:2px 8px;font-size:10px;background:white;color:#991b1b;border-color:#ef4444"
                      onclick="state.opinionSourceEditor = { oid:'${op.id}', side:'negative', mode:'add' }; render();">
                ➕ 新增
              </button>
            </div>
            <div class="p-3 space-y-2">
              ${(op.negative || []).length === 0 ? `<p class="text-xs text-center py-3" style="color:#dc2626">尚未新增負面來源</p>` :
                op.negative.map(src => tplOpinionSourceItem(op.id, 'negative', src)).join('')}
            </div>
          </div>
          
          <!-- 澄清 -->
          <div class="rounded-lg" style="background:#ecfdf5;border:1px solid #10b981">
            <div class="px-3 py-2 flex items-center justify-between" style="background:#d1fae5;border-bottom:1px solid #10b981">
              <div class="font-bold text-sm" style="color:#065f46">✅ 我方澄清 / 事實依據</div>
              <button class="icon-btn no-print" style="padding:2px 8px;font-size:10px;background:white;color:#065f46;border-color:#10b981"
                      onclick="state.opinionSourceEditor = { oid:'${op.id}', side:'clarification', mode:'add' }; render();">
                ➕ 新增
              </button>
            </div>
            <div class="p-3 space-y-2">
              ${(op.clarification || []).length === 0 ? `<p class="text-xs text-center py-3" style="color:#059669">尚未新增澄清資料</p>` :
                op.clarification.map(src => tplOpinionSourceItem(op.id, 'clarification', src)).join('')}
            </div>
          </div>
        </div>
      ` : ''}
    </div>
  `;
}

// 單一來源項目(URL 或 PDF)
function tplOpinionSourceItem(oid, side, src) {
  const sideColor = side === 'negative' ? '#dc2626' : '#059669';
  const sideBg = side === 'negative' ? 'white' : 'white';
  
  if (src.type === 'url') {
    return `
      <div class="rounded p-2" style="background:${sideBg};border:1px solid #e5e7eb">
        <div class="flex items-start justify-between gap-2">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-1.5 flex-wrap">
              <span class="text-xs px-1.5 py-0.5 rounded" style="background:#dbeafe;color:#1e40af">🔗 URL</span>
              ${src.source ? `<span class="text-xs" style="color:#6b7280">${src.source}</span>` : ''}
              ${src.date ? `<span class="text-xs" style="color:#6b7280">・${src.date}</span>` : ''}
            </div>
            <a href="${src.url}" target="_blank" rel="noopener noreferrer" 
               class="block text-sm font-medium mt-1 hover:underline" 
               style="color:${sideColor};word-break:break-word">
              ${src.title || src.url}
            </a>
            ${src.excerpt ? `<p class="text-xs mt-1" style="color:#4b5563;line-height:1.4">${src.excerpt}</p>` : ''}
          </div>
          <div class="flex flex-col gap-1 no-print">
            <button class="icon-btn" style="padding:2px 6px;font-size:10px"
                    onclick="state.opinionSourceEditor = { oid:'${oid}', side:'${side}', sid:'${src.id}', mode:'edit' }; render();">✏️</button>
            <button class="icon-btn" style="padding:2px 6px;font-size:10px;color:#991b1b"
                    onclick="deleteOpinionSource('${oid}', '${side}', '${src.id}')">🗑️</button>
          </div>
        </div>
      </div>
    `;
  } else {
    // PDF
    return `
      <div class="rounded p-2" style="background:${sideBg};border:1px solid #e5e7eb">
        <div class="flex items-start justify-between gap-2">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-1.5 flex-wrap">
              <span class="text-xs px-1.5 py-0.5 rounded" style="background:#fce7f3;color:#9f1239">📎 PDF</span>
              ${src.filename ? `<span class="text-xs" style="color:#6b7280">${src.filename}</span>` : ''}
              ${src.date ? `<span class="text-xs" style="color:#6b7280">・${src.date}</span>` : ''}
            </div>
            <div class="text-sm font-medium mt-1" style="color:${sideColor}">${src.title || '(未命名)'}</div>
            ${src.excerpt ? `<p class="text-xs mt-1" style="color:#4b5563;line-height:1.4">${src.excerpt}</p>` : ''}
            <button class="text-xs underline mt-1 no-print" style="color:${sideColor}"
                    onclick="openOpinionPdf('${oid}','${side}','${src.id}')">📖 開啟 PDF</button>
            ${src._pdf_local_only && !src.base64 ? `<span class="text-xs ml-2 px-1.5 py-0.5 rounded" style="background:#fef3c7;color:#92400e">⚠️ 僅原機可閱</span>` : ''}
          </div>
          <div class="flex flex-col gap-1 no-print">
            <button class="icon-btn" style="padding:2px 6px;font-size:10px"
                    onclick="state.opinionSourceEditor = { oid:'${oid}', side:'${side}', sid:'${src.id}', mode:'edit' }; render();">✏️</button>
            <button class="icon-btn" style="padding:2px 6px;font-size:10px;color:#991b1b"
                    onclick="deleteOpinionSource('${oid}', '${side}', '${src.id}')">🗑️</button>
          </div>
        </div>
      </div>
    `;
  }
}

// ==================== 輿情事件 Modal ====================
function tplOpinionEditorModal() {
  const e = state.opinionEditor;
  if (!e) return '';
  const opinions = loadOpinions();
  const op = e.mode === 'edit' ? opinions.find(x => x.id === e.oid) : {
    id: 'po_' + Date.now(),
    title: '', case_ref: '', severity: 'medium', status: 'unhandled',
    summary: '',
    created_at: new Date().toISOString().substring(0,10),
    updated_at: new Date().toISOString().substring(0,10),
    negative: [], clarification: []
  };
  if (!op) return '';
  
  return `
    <div class="modal-backdrop" onclick="if(event.target===this){state.opinionEditor=null;render();}">
      <div class="modal-content" style="max-width:600px;max-height:85vh;overflow:auto">
        <div class="sticky top-0 bg-white border-b px-6 py-4 flex items-center justify-between" style="border-color:var(--border);z-index:1">
          <h3 class="text-lg font-bold">${e.mode === 'create' ? '➕ 新增輿情事件' : '✏️ 編輯輿情事件'}</h3>
          <button class="icon-btn" onclick="state.opinionEditor=null;render();">✕</button>
        </div>
        <div class="p-6 space-y-4">
          <div>
            <label class="text-xs font-medium block mb-1" style="color:var(--ink-soft)">事件標題 *</label>
            <input type="text" id="op-title" value="${op.title.replace(/"/g,'&quot;')}" placeholder="例:嘉南-烏山頭水庫太陽能板觸底事件" style="width:100%">
          </div>
          <div>
            <label class="text-xs font-medium block mb-1" style="color:var(--ink-soft)">關聯案場 / 管理處(選填)</label>
            <div class="flex gap-2 items-start">
              <input type="text" id="op-case-ref-search" placeholder="🔍 輸入關鍵字篩選(案場名/管理處)..." style="flex:1" 
                     oninput="filterCaseRefDropdown(this.value)">
            </div>
            <select id="op-case-ref" style="width:100%;margin-top:6px;max-height:200px">
              <option value="">— 不關聯 —</option>
              ${(()=>{
                const tab = state.tab || 'solar';
                const groups = getCaseRefOptions(tab);
                const currentVal = (op.case_ref && typeof op.case_ref === 'string' && op.case_ref.includes(':')) ? op.case_ref : '';
                let html = '';
                groups.forEach(g => {
                  html += `<optgroup label="${g.group}">`;
                  g.options.forEach(o => {
                    const sel = (o.value === currentVal) ? ' selected' : '';
                    const metaStr = o.meta && (o.meta.mgmt || o.meta.capacity != null) 
                      ? ` (${[o.meta.mgmt, o.meta.capacity != null ? o.meta.capacity + (tab==='solar'?'MW':'kW') : ''].filter(Boolean).join(', ')})` 
                      : '';
                    html += `<option value="${o.value}"${sel}>${o.label}${metaStr}</option>`;
                  });
                  html += '</optgroup>';
                });
                return html;
              })()}
            </select>
            ${op.case_ref && typeof op.case_ref === 'string' && !op.case_ref.includes(':') ? `
              <p class="text-xs mt-2 px-2 py-1 rounded" style="background:#fef3c7;color:#92400e">
                ⚠️ 現有關聯為舊版文字格式:「${op.case_ref}」<br>
                請從上方下拉選單重新選擇(以便顯示完整案場資訊)
              </p>
            ` : ''}
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-xs font-medium block mb-1" style="color:var(--ink-soft)">嚴重程度</label>
              <select id="op-severity" style="width:100%">
                <option value="high" ${op.severity==='high'?'selected':''}>🔴 高度關注</option>
                <option value="medium" ${op.severity==='medium'?'selected':''}>🟡 中度關注</option>
                <option value="low" ${op.severity==='low'?'selected':''}>🔵 一般關注</option>
              </select>
            </div>
            <div>
              <label class="text-xs font-medium block mb-1" style="color:var(--ink-soft)">處理狀態</label>
              <select id="op-status" style="width:100%">
                <option value="unhandled" ${op.status==='unhandled'?'selected':''}>未處理</option>
                <option value="in_progress" ${op.status==='in_progress'?'selected':''}>結果追蹤中</option>
                <option value="clarified" ${op.status==='clarified'?'selected':''}>已澄清</option>
                <option value="closed" ${op.status==='closed'?'selected':''}>已關閉</option>
              </select>
            </div>
          </div>
          <div>
            <label class="text-xs font-medium block mb-1" style="color:var(--ink-soft)">事件摘要</label>
            <textarea id="op-summary" rows="3" placeholder="簡述事件背景與關鍵爭點..." style="width:100%;resize:vertical">${op.summary || ''}</textarea>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-xs font-medium block mb-1" style="color:var(--ink-soft)">建立日期</label>
              <input type="date" id="op-created" value="${op.created_at || ''}" style="width:100%">
            </div>
            <div>
              <label class="text-xs font-medium block mb-1" style="color:var(--ink-soft)">最後更新</label>
              <input type="date" id="op-updated" value="${op.updated_at || ''}" style="width:100%">
            </div>
          </div>
        </div>
        <div class="sticky bottom-0 bg-white border-t px-6 py-3 flex justify-end gap-2" style="border-color:var(--border)">
          <button class="icon-btn" onclick="state.opinionEditor=null;render();">取消</button>
          <button class="icon-btn" style="background:#f59e0b;color:white;border-color:#d97706" onclick="saveOpinionFromModal('${op.id}', '${e.mode}')">${e.mode==='create'?'建立':'儲存'}</button>
        </div>
      </div>
    </div>
  `;
}

        </div>
      </div>
    </div>
  `;
}

// 篩選下拉選單的選項(根據關鍵字)
function filterCaseRefDropdown(keyword) {
  const select = document.getElementById('op-case-ref');
  if (!select) return;
  const kw = (keyword || '').trim().toLowerCase();
  const optgroups = select.querySelectorAll('optgroup');
  optgroups.forEach(og => {
    let hasVisible = false;
    og.querySelectorAll('option').forEach(opt => {
      const matched = !kw || opt.textContent.toLowerCase().includes(kw);
      opt.style.display = matched ? '' : 'none';
      if (matched) hasVisible = true;
    });
    og.style.display = hasVisible ? '' : 'none';
  });
}

function saveOpinionFromModal(oid, mode) {
  const title = document.getElementById('op-title').value.trim();
  if (!title) { alert('請填寫事件標題'); return; }
  
  const data = {
    title,
    case_ref: document.getElementById('op-case-ref').value.trim(),
    severity: document.getElementById('op-severity').value,
    status: document.getElementById('op-status').value,
    summary: document.getElementById('op-summary').value.trim(),
    created_at: document.getElementById('op-created').value,
    updated_at: document.getElementById('op-updated').value
  };
  
  const opinions = loadOpinions();
  if (mode === 'create') {
    opinions.unshift({ id: oid, ...data, negative: [], clarification: [] });
  } else {
    const idx = opinions.findIndex(x => x.id === oid);
    if (idx >= 0) opinions[idx] = { ...opinions[idx], ...data, updated_at: data.updated_at || new Date().toISOString().substring(0,10) };
  }
  if (saveOpinions(opinions)) {
    state.opinionEditor = null;
    render();
  }
}

async function saveOpinionSourceFromModal(sid, mode, defaultType) {
  const e = state.opinionSourceEditor;
  if (!e) return;
  
  // 判斷實際 type:看哪個欄位區塊是顯示的
  const urlFields = document.getElementById('src-url-fields');
  const isUrl = urlFields && urlFields.style.display !== 'none';
  const type = isUrl ? 'url' : 'pdf';
  
  const title = document.getElementById('src-title').value.trim();
  const excerpt = document.getElementById('src-excerpt').value.trim();
  const source = document.getElementById('src-source').value.trim();
  const date = document.getElementById('src-date').value;
  
  if (!title) { alert('請填寫標題'); return; }
  
  const newSrc = { id: sid, type, title, excerpt, source, date };
  
  if (type === 'url') {
    const url = document.getElementById('src-url').value.trim();
    if (!url) { alert('請填寫網址'); return; }
    newSrc.url = url;
  } else {
    // PDF 處理
    const fileInput = document.getElementById('src-pdf-file');
    const file = fileInput && fileInput.files && fileInput.files[0];
    if (file) {
      if (file.size > 2 * 1024 * 1024) {
        if (!confirm('PDF 大於 2MB,可能造成儲存失敗。仍要繼續嗎?')) return;
      }
      try {
        newSrc.base64 = await pdfToBase64(file);
        newSrc.filename = file.name;
        newSrc.filesize = file.size;
      } catch(err) { alert('PDF 讀取失敗:' + err.message); return; }
    } else if (mode === 'edit') {
      // 編輯模式且沒重傳檔案 -> 保留原 base64
      const opinions = loadOpinions();
      const op = opinions.find(x => x.id === e.oid);
      const list = e.side === 'negative' ? op.negative : op.clarification;
      const old = list.find(s => s.id === sid);
      if (old && old.base64) {
        newSrc.base64 = old.base64;
        newSrc.filename = old.filename;
        newSrc.filesize = old.filesize;
      } else {
        alert('請上傳 PDF 檔案'); return;
      }
    } else {
      alert('請上傳 PDF 檔案'); return;
    }
  }
  
  // 寫入
  const opinions = loadOpinions();
  const op = opinions.find(x => x.id === e.oid);
  if (!op) return;
  const list = e.side === 'negative' ? (op.negative = op.negative || []) : (op.clarification = op.clarification || []);
  if (mode === 'add') {
    list.push(newSrc);
  } else {
    const idx = list.findIndex(s => s.id === sid);
    if (idx >= 0) list[idx] = newSrc;
  }
  op.updated_at = new Date().toISOString().substring(0,10);
  if (saveOpinions(opinions)) {
    state.opinionSourceEditor = null;
    render();
  }
}

function deleteOpinion(oid) {
  const opinions = loadOpinions();
  const op = opinions.find(x => x.id === oid);
  if (!op) return;
  if (!confirm('確定刪除「' + op.title + '」?所有相關來源與 PDF 也會一併刪除,無法復原。')) return;
  const filtered = opinions.filter(x => x.id !== oid);
  if (saveOpinions(filtered)) render();
}

function deleteOpinionSource(oid, side, sid) {
  if (!confirm('確定刪除此來源?')) return;
  const opinions = loadOpinions();
  const op = opinions.find(x => x.id === oid);
  if (!op) return;
  const key = side === 'negative' ? 'negative' : 'clarification';
  op[key] = (op[key] || []).filter(s => s.id !== sid);
  op.updated_at = new Date().toISOString().substring(0,10);
  if (saveOpinions(opinions)) render();
}

function openOpinionPdf(oid, side, sid) {
  const opinions = loadOpinions();
  const op = opinions.find(x => x.id === oid);
  if (!op) return;
  const list = side === 'negative' ? op.negative : op.clarification;
  const src = list.find(s => s.id === sid);
  if (!src) { alert('PDF 來源已遺失'); return; }
  if (!src.base64) {
    if (src._pdf_local_only) {
      alert('這個 PDF 檔案僅存在於原上傳者的電腦上,未隨網頁部署。\n\n建議:聯絡計畫團隊取得 PDF,或檢視標題與摘要即可。');
    } else {
      alert('PDF 資料遺失');
    }
    return;
  }
  openPdfBase64(src.base64, src.filename);
}

// 重算彙總(增刪案場後呼叫)
function recomputeSummaries() {
  // 太陽光電 summary
  const s = DATA.solar;
  s.summary.total_completed_cases = s.completed_sites.length;
  s.summary.total_completed_mw = parseFloat(s.completed_sites.reduce((a,c)=>a+(parseFloat(c.capacity_mw)||0),0).toFixed(2));
  s.summary.channel_completed = s.completed_sites.filter(x=>x.type==='圳路').length;
  s.summary.channel_mw = parseFloat(s.completed_sites.filter(x=>x.type==='圳路').reduce((a,c)=>a+(parseFloat(c.capacity_mw)||0),0).toFixed(2));
  s.summary.pond_completed = s.completed_sites.filter(x=>x.type==='埤塘').length;
  s.summary.pond_mw = parseFloat(s.completed_sites.filter(x=>x.type==='埤塘').reduce((a,c)=>a+(parseFloat(c.capacity_mw)||0),0).toFixed(2));
  s.summary.reservoir_completed = s.completed_sites.filter(x=>x.type==='農業水庫').length;
  s.summary.reservoir_mw = parseFloat(s.completed_sites.filter(x=>x.type==='農業水庫').reduce((a,c)=>a+(parseFloat(c.capacity_mw)||0),0).toFixed(2));
  // stages 更新案數與容量
  const stageMap = {
    completed: s.completed_sites,
    construction: s.construction_sites,
    admin: s.admin_sites,
    planning: s.planning_sites
  };
  s.stages.forEach(st => {
    if (stageMap[st.key]) {
      st.cases = stageMap[st.key].length;
      st.mw = parseFloat(stageMap[st.key].reduce((a,c)=>a+(parseFloat(c.capacity_mw)||0),0).toFixed(2));
    }
  });
  // 各管理處 completed/construction/admin/planning_mw 重算
  s.mgmt.forEach(m => {
    m.completed_mw = parseFloat(s.completed_sites.filter(x=>x.mgmt===m.name).reduce((a,c)=>a+(parseFloat(c.capacity_mw)||0),0).toFixed(4));
    m.construction_mw = parseFloat(s.construction_sites.filter(x=>x.mgmt===m.name).reduce((a,c)=>a+(parseFloat(c.capacity_mw)||0),0).toFixed(4));
    m.admin_mw = parseFloat(s.admin_sites.filter(x=>x.mgmt===m.name).reduce((a,c)=>a+(parseFloat(c.capacity_mw)||0),0).toFixed(4));
    m.planning_mw = parseFloat(s.planning_sites.filter(x=>x.mgmt===m.name).reduce((a,c)=>a+(parseFloat(c.capacity_mw)||0),0).toFixed(4));
    m.remaining_mw = parseFloat((m.construction_mw + m.admin_mw + m.planning_mw).toFixed(4));
    m.total_potential_mw = parseFloat((m.completed_mw + m.remaining_mw).toFixed(4));
    m.achievement_pct = m.target_mw > 0 ? parseFloat((m.completed_mw / m.target_mw * 100).toFixed(1)) : 0;
  });
  // 小水力 summary
  const h = DATA.hydro;
  h.summary.total_cases = h.sites.length;
  h.summary.total_capacity_kw = parseFloat(h.sites.reduce((a,c)=>a+(parseFloat(c.capacity_kw)||0),0).toFixed(2));
  const completedHydro = h.sites.filter(x=>x.stage && x.stage.includes('已完工'));
  h.summary.completed_cases = completedHydro.length;
  h.summary.completed_capacity_kw = parseFloat(completedHydro.reduce((a,c)=>a+(parseFloat(c.capacity_kw)||0),0).toFixed(2));
  const inProgressHydro = h.sites.filter(x=>x.stage === '推動中');
  h.summary.in_progress_cases = inProgressHydro.length;
  h.summary.in_progress_capacity_kw = parseFloat(inProgressHydro.reduce((a,c)=>a+(parseFloat(c.capacity_kw)||0),0).toFixed(2));
  // 小水力各管理處 - 確保 14 處全列出(與太陽光電一致)
  const STANDARD_MGMTS = ['桃園','石門','新竹','苗栗','臺中','南投','彰化','雲林','嘉南','高雄','屏東','宜蘭','花蓮','臺東'];
  const existingNames = new Set(h.mgmt.map(m=>m.name));
  // 先補上 sites 中出現但 mgmt 沒收錄的管理處(以及缺漏的標準管理處)
  const allMgmtNames = new Set([...existingNames, ...STANDARD_MGMTS]);
  h.sites.forEach(s => { if (s.mgmt) allMgmtNames.add(s.mgmt); });
  allMgmtNames.forEach(name => {
    if (!existingNames.has(name)) {
      h.mgmt.push({ name, cases:0, capacity_kw:0, completed_cases:0, completed_kw:0, in_progress_cases:0, in_progress_kw:0, anomaly_cases:0 });
      existingNames.add(name);
    }
  });
  
  h.mgmt.forEach(m => {
    const mSites = h.sites.filter(x=>x.mgmt===m.name);
    m.cases = mSites.length;
    m.capacity_kw = parseFloat(mSites.reduce((a,c)=>a+(parseFloat(c.capacity_kw)||0),0).toFixed(2));
    const mDone = mSites.filter(x=>x.stage && x.stage.includes('已完工'));
    m.completed_cases = mDone.length;
    m.completed_kw = parseFloat(mDone.reduce((a,c)=>a+(parseFloat(c.capacity_kw)||0),0).toFixed(2));
    const mProg = mSites.filter(x=>x.stage === '推動中');
    m.in_progress_cases = mProg.length;
    m.in_progress_kw = parseFloat(mProg.reduce((a,c)=>a+(parseFloat(c.capacity_kw)||0),0).toFixed(2));
    m.anomaly_cases = mSites.filter(x=>x.is_anomaly).length;
  });
}

function categorizeReason(r) {
  if (!r) return '其他';
  if (r.includes('民眾') || r.includes('陳抗') || r.includes('陳情')) return '民眾反對/陳抗';
  if (r.includes('土地') || r.includes('容許') || r.includes('縣府不同意')) return '土地容許問題';
  if (r.includes('契約')) return '契約失效';
  if (r.includes('廠商') || r.includes('履保') || r.includes('放棄')) return '廠商主動撤案';
  if (r.includes('施設') || r.includes('饋線') || r.includes('台電')) return '台電/施工技術';
  return '其他';
}

function getSolarAnomalies() {
  const arr = [];
  // 1. 施工中區塊: 停工中(紅) + 待施工(黃)
  DATA.solar.construction_sites.filter(s => s.stage === '停工中').forEach((s, i) => {
    arr.push({ ...s, _level: 'red', _reason: '停工中', _key: 'c'+i });
  });
  DATA.solar.construction_sites.filter(s => s.stage === '待施工').forEach((s, i) => {
    arr.push({ ...s, _level: 'yellow', _reason: '待施工', _key: 'w'+i });
  });
  // 2. 行政程序中: 撤案(紅)
  DATA.solar.admin_sites.filter(s => s.progress && s.progress.includes('撤案')).forEach((s, i) => {
    arr.push({ ...s, _level: 'red', _reason: s.progress, _key: 'a'+i });
  });
  return arr;
}

function getMgmtSolarSites(mgmt) {
  return [
    ...DATA.solar.completed_sites.filter(s => s.mgmt === mgmt).map(s => ({...s, _stage: '已完工'})),
    ...DATA.solar.construction_sites.filter(s => s.mgmt === mgmt).map(s => ({...s, _stage: s.stage})),
    ...DATA.solar.admin_sites.filter(s => s.mgmt === mgmt).map(s => ({...s, _stage: '行政程序中'})),
    ...DATA.solar.planning_sites.filter(s => s.mgmt === mgmt).map(s => ({...s, _stage: '規劃推動'}))
  ];
}

function getVendorAnalysis() {
  const map = {};
  DATA.solar.cancelled_sites.forEach(c => {
    const v = c.vendor || '未填';
    if (!map[v]) map[v] = { name: v, count: 0, mw: 0, reasons: {}, mgmts: new Set(), years: new Set(), cases: [] };
    map[v].count += 1;
    map[v].mw += c.capacity_mw;
    const cat = categorizeReason(c.reason);
    map[v].reasons[cat] = (map[v].reasons[cat] || 0) + 1;
    map[v].mgmts.add(c.mgmt);
    map[v].years.add(c.year);
    map[v].cases.push(c);
  });
  return Object.values(map)
    .map(v => ({ ...v, mgmts: Array.from(v.mgmts), years: Array.from(v.years).sort() }))
    .sort((a, b) => b.mw - a.mw);
}

function tplKpi({ label, value, unit, sublabel, accent, danger, source }) {
  const color = danger ? 'var(--alert)' : (accent || 'var(--ink)');
  // source: 字串說明此 KPI 完全從匯入資料計算(可信)
  // 有 source 時:卡片底色淡黃 + 左側黃色側條 + label 旁有 ✓ 標記 + 滑鼠移上去顯示溯源
  const trustedStyle = source ? 'background:#fffbeb;border-left:3px solid #f59e0b' : '';
  const trustedBadge = source ? `<span class="ml-1 text-xs" style="color:#d97706;font-weight:normal" title="${source}">✓</span>` : '';
  return `
    <div class="kpi-card" style="${trustedStyle}" ${source ? `title="${source}"` : ''}>
      <div class="text-xs font-medium uppercase mb-2" style="color:var(--ink-soft);letter-spacing:0.08em">${label}${trustedBadge}</div>

      ${source ? `<p class="text-xs mt-1" style="color:#92400e;font-style:italic">↳ ${source}</p>` : ''}

}

    ...DATA.solar.completed_sites.map((s,i) => ({...s, _stage: '已完工', _kind: 'completed_sites', _idx: i})),
    ...DATA.solar.construction_sites.map((s,i) => ({...s, _stage: s.stage, _kind: 'construction_sites', _idx: i})),
    ...DATA.solar.admin_sites.map((s,i) => ({...s, _stage: '行政程序中', _kind: 'admin_sites', _idx: i})),
    ...DATA.solar.planning_sites.map((s,i) => ({...s, _stage: '規劃推動', _kind: 'planning_sites', _idx: i}))
  ];
  const f = state.solar;
  const filtered = all.filter(s => {
    if (f.mgmt !== 'all' && s.mgmt !== f.mgmt) return false;
    if (f.type !== 'all' && s.type !== f.type) return false;
    if (f.stage !== 'all' && s._stage !== f.stage) return false;
    if (f.search && !(s.name||'').toLowerCase().includes(f.search.toLowerCase()) && !(s.vendor||'').toLowerCase().includes(f.search.toLowerCase())) return false;
    return true;
  });
  const display = filtered.slice(0, 60);
  return `
    <p id="solar-filter-count" class="text-xs mb-3" style="color:var(--ink-soft)">目前篩選顯示 <strong>${filtered.length}</strong> / ${all.length} 案${filtered.length > 60 ? '，效能考量先顯示前 60 筆，請使用篩選器縮小範圍' : ''}</p>

      ${display.length > 0 ? display.map(tplSolarCard).join('') : '<p class="col-span-3 text-center py-8 text-sm" style="color:var(--ink-muted)">無符合條件的案場</p>'}
    </div>`;
}

  const typeMap = {};
  anomalies.forEach(a => { typeMap[a.anomaly_type] = (typeMap[a.anomaly_type] || 0) + 1; });
  
  const substageMap = {};
  DATA.hydro.sites.forEach(s => {
    if (!substageMap[s.substage]) substageMap[s.substage] = { name: s.substage, cases: 0, kw: 0 };
    substageMap[s.substage].cases += 1;
    substageMap[s.substage].kw += s.capacity_kw;

          ${tplKpi({ label: '黃燈案件', value: yellow.length, unit: '案', accent: 'var(--warning)', sublabel: '累計 ' + yellow.reduce((a,c)=>a+c.capacity_kw,0).toFixed(0) + ' kW 進度延宕' })}

        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-5 gap-5 mb-6">

            <h3 class="text-sm font-bold mb-3">異常類型分布</h3>
            <div style="position:relative;height:220px"><canvas id="chart-hydro-type"></canvas></div>
          </div>
          <div class="lg:col-span-2 rounded-xl border p-5" style="border-color:var(--border);background:#fef2f2">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">

                </div>

            return `

                <div class="text-xs font-medium mb-1.5" style="color:${color}">${s.name}</div>

                  <span class="text-2xl font-bold tabular-nums font-serif-tc">${s.cases}</span>
                  <span class="text-xs" style="color:var(--ink-soft)">案</span>

      </div>
    </section>
    
    <section id="sec-hydro-mgmt" class="section-card mt-8">
      <div class="px-6 pt-6">
        ${tplSectionHeader({ icon: ICON.building, title: '各管理處推動概況', subtitle: '按容量排序，可點任一處深入查看', accent: 'var(--hydro)', sectionId: 'sec-hydro-mgmt', exportLabel: '小水力-管理處概況' })}
      </div>
      <div class="px-6 pb-6">

function tplHydroFilters() {
  const mgmts = [...new Set(DATA.hydro.sites.map(s => s.mgmt))].sort();
  return `
    <div class="rounded-xl p-4 mb-5 space-y-3" style="background:#f8fafc">
      <div class="flex items-center gap-2 flex-wrap">
        <div class="flex items-center gap-1.5">${ICON.search}<span class="text-xs font-medium" style="color:var(--ink-soft)">關鍵字</span></div>

          oninput="handleSearchInput(this, 'hydro.search')"
          oncompositionstart="handleCompositionStart(this)"
          oncompositionend="handleCompositionEnd(this, 'hydro.search')"
          style="flex:1;min-width:200px">
        <button class="icon-btn no-print" onclick="printFilteredView('hydro-sites')" style="background:#fef3c7;border-color:#f59e0b;color:#92400e" title="依目前篩選條件開啟列印頁">🖨️ 列印篩選結果</button>
      </div>
      <div class="flex items-start gap-4 flex-wrap">
        ${tplFilterGroup('管理處', state.hydro.mgmt, mgmts, 'hydro.mgmt')}
        ${tplFilterGroup('類別', state.hydro.substage, ['(A)小水力發電廠','(B)測試案場-已完成','(C)專案示範案場','(D)招標案場','(E)測試案場-推動中'], 'hydro.substage')}
        ${tplFilterGroup('異常', state.hydro.anomaly, ['red','yellow','none'], 'hydro.anomaly')}
      </div>
    </div>`;
}

function tplHydroCards() {
  const f = state.hydro;
  const withIdx = DATA.hydro.sites.map((s, i) => ({...s, _idx: i}));
  const filtered = withIdx.filter(s => {
    if (f.mgmt !== 'all' && s.mgmt !== f.mgmt) return false;
    if (f.substage !== 'all' && s.substage !== f.substage) return false;
    if (f.anomaly === 'red' && s.anomaly_level !== 'red') return false;
    if (f.anomaly === 'yellow' && s.anomaly_level !== 'yellow') return false;
    if (f.anomaly === 'none' && s.is_anomaly) return false;
    if (f.search && !s.name.toLowerCase().includes(f.search.toLowerCase()) && !(s.vendor||'').toLowerCase().includes(f.search.toLowerCase())) return false;
    return true;
  });
  return `
    <p id="hydro-filter-count" class="text-xs mb-3" style="color:var(--ink-soft)">目前篩選顯示 <strong>${filtered.length}</strong> / ${DATA.hydro.sites.length} 案場</p>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
      ${filtered.length > 0 ? filtered.map(tplHydroCard).join('') : '<p class="col-span-3 text-center py-8 text-sm" style="color:var(--ink-muted)">無符合條件的案場</p>'}
    </div>`;
}

// ==================== 圖表渲染 ====================
const chartInstances = {};
function destroyCharts() {
  Object.values(chartInstances).forEach(c => c && c.destroy && c.destroy());
  Object.keys(chartInstances).forEach(k => delete chartInstances[k]);
}

function renderCharts() {
  destroyCharts();
  const baseFont = { family: 'Noto Sans TC, sans-serif', size: 11 };
  
  if (state.tab === 'solar') {
    const cancelled = DATA.solar.cancelled_sites;
    const reasonMap = {};
    cancelled.forEach(c => { const cat = categorizeReason(c.reason); reasonMap[cat] = (reasonMap[cat] || 0) + 1; });
    const reasonData = Object.entries(reasonMap).sort((a,b)=>b[1]-a[1]);
    
    // 原因分類
    const c1 = document.getElementById('chart-reason');
    if (c1) chartInstances.reason = new Chart(c1, {
      type: 'bar',
      data: { labels: reasonData.map(r=>r[0]), datasets: [{ data: reasonData.map(r=>r[1]), backgroundColor: '#dc2626', borderRadius: 4 }] },
      options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { font: baseFont } }, y: { ticks: { font: baseFont } } } }
    });
    
    // 年度趨勢
    const yearMap = { 112: 0, 113: 0, 114: 0 };
    cancelled.forEach(c => { yearMap[c.year] += c.capacity_mw; });
    const c2 = document.getElementById('chart-year');
    if (c2) chartInstances.year = new Chart(c2, {
      type: 'bar',
      data: { labels: ['112年','113年','114年'], datasets: [{ label: '解約容量 (MW)', data: [yearMap[112], yearMap[113], yearMap[114]], backgroundColor: '#dc2626', borderRadius: 4 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { font: baseFont } }, y: { ticks: { font: baseFont } } } }
    });
    
    // 廠商
    const vendors = getVendorAnalysis().slice(0, 8);
    const c3 = document.getElementById('chart-vendor-mw');
    if (c3) chartInstances.vendor = new Chart(c3, {
      type: 'bar',
      data: { labels: vendors.map(v => v.name.length > 14 ? v.name.substring(0,14)+'…' : v.name), datasets: [{ label: '流失容量 (MW)', data: vendors.map(v => parseFloat(v.mw.toFixed(2))), backgroundColor: '#d97706', borderRadius: 4 }] },
      options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.parsed.x + ' MW (' + vendors[ctx.dataIndex].count + ' 案)' } } }, scales: { x: { ticks: { font: baseFont } }, y: { ticks: { font: { ...baseFont, size: 10 } } } } }
    });
    
    // 達成率 doughnut
    const totalCompleted = DATA.solar.summary.total_completed_mw;
    const target = DATA.solar.summary.target_mw;
    const c4 = document.getElementById('chart-achievement');
    if (c4) chartInstances.achievement = new Chart(c4, {
      type: 'doughnut',
      data: { datasets: [{ data: [totalCompleted, target - totalCompleted], backgroundColor: ['#b45309','#fde68a'], borderWidth: 0 }] },
      options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { display: false }, tooltip: { enabled: false } } }
    });
    
    // 管理處堆疊
    const c5 = document.getElementById('chart-mgmt-solar');
    if (c5) {
      const m = [...DATA.solar.mgmt].sort((a,b)=>b.total_potential_mw - a.total_potential_mw);
      chartInstances.mgmtSolar = new Chart(c5, {
        type: 'bar',
        data: { labels: m.map(x=>x.name), datasets: [
          { label: '已完工', data: m.map(x=>x.completed_mw), backgroundColor: '#059669' },
          { label: '施工中', data: m.map(x=>x.construction_mw), backgroundColor: '#0891b2' },
          { label: '行政程序', data: m.map(x=>x.admin_mw), backgroundColor: '#6366f1' },
          { label: '規劃推動', data: m.map(x=>x.planning_mw), backgroundColor: '#94a3b8' }
        ]},
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: baseFont, padding: 12, boxWidth: 12 } }, tooltip: { callbacks: { footer: items => { const total = items.reduce((a,b)=>a+b.parsed.y,0); return '合計 ' + total.toFixed(2) + ' MW'; } } } }, scales: { x: { stacked: true, ticks: { font: baseFont } }, y: { stacked: true, ticks: { font: baseFont, callback: v => v + ' MW' } } } }
      });
    }
  }
  
  if (state.tab === 'hydro') {
    const anomalies = DATA.hydro.sites.filter(s => s.is_anomaly);
    const typeMap = {};
    anomalies.forEach(a => { typeMap[a.anomaly_type] = (typeMap[a.anomaly_type] || 0) + 1; });
    const typeData = Object.entries(typeMap).sort((a,b)=>b[1]-a[1]);
    
    const c1 = document.getElementById('chart-hydro-type');
    if (c1) chartInstances.hydroType = new Chart(c1, {
      type: 'bar',
      data: { labels: typeData.map(t=>t[0]), datasets: [{ data: typeData.map(t=>t[1]), backgroundColor: '#dc2626', borderRadius: 4 }] },
      options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { font: baseFont } }, y: { ticks: { font: baseFont } } } }
    });
    
    const mgmtA = DATA.hydro.mgmt.filter(m=>m.anomaly_cases>0).sort((a,b)=>b.anomaly_cases-a.anomaly_cases);
    const c2 = document.getElementById('chart-hydro-mgmt-anomaly');
    if (c2) chartInstances.hydroMgmtAnomaly = new Chart(c2, {
      type: 'bar',
      data: { labels: mgmtA.map(m=>m.name), datasets: [{ data: mgmtA.map(m=>m.anomaly_cases), backgroundColor: '#dc2626', borderRadius: 4 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { font: baseFont } }, y: { ticks: { font: baseFont } } } }
    });
    
    const mgmt = [...DATA.hydro.mgmt].sort((a,b)=>b.capacity_kw-a.capacity_kw);
    const c3 = document.getElementById('chart-hydro-mgmt-cap');
    if (c3) chartInstances.hydroMgmtCap = new Chart(c3, {
      type: 'bar',
      data: { labels: mgmt.map(m=>m.name), datasets: [
        { label: '已完工', data: mgmt.map(m=>m.completed_kw), backgroundColor: '#059669' },
        { label: '推動中', data: mgmt.map(m=>m.in_progress_kw), backgroundColor: '#0f766e' }
      ]},
      options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: baseFont, padding: 12, boxWidth: 12 } } }, scales: { x: { stacked: true, ticks: { font: baseFont, callback: v => v + ' kW' } }, y: { stacked: true, ticks: { font: baseFont } } } }
    });
  }
}

// ==================== 互動 ====================
function setFilter(path, value) {
  const [section, key] = path.split('.');
  if (!key) {
    setState({ [section]: value });
  } else {
    state[section][key] = value;
    // 部分篩選不需重畫全頁，只重畫卡片
    if (key === 'search' || key === 'mgmt' || key === 'type' || key === 'stage' || key === 'substage' || key === 'anomaly') {
      const container = document.getElementById(section + '-cards-container');
      if (container) {
        container.innerHTML = section === 'solar' ? tplSolarCards() : tplHydroCards();
        // search 來自文字輸入框,不重畫全頁(避免失焦與中文輸入法選字被打斷)
        // 只更新「目前篩選顯示 X / Y 案」這類計數
        if (key === 'search') {
          const countEl = document.getElementById(section + '-filter-count');
          if (countEl) {
            const total = section === 'solar' 
              ? (DATA.solar.completed_sites.length + DATA.solar.construction_sites.length + DATA.solar.admin_sites.length + DATA.solar.planning_sites.length)
              : DATA.hydro.sites.length;
            const filtered = container.querySelectorAll('.site-card').length;
            countEl.textContent = '目前篩選顯示 ' + filtered + ' / ' + total + ' 案' + (filtered > 60 ? ',效能考量先顯示前 60 筆,請使用篩選器縮小範圍' : '');
          }
          return; // 搜尋時不重畫全頁
        }
        // 其他篩選(按鈕點擊)才重畫全頁以更新按鈕 active 狀態
        render();
        return;
      }
    }
    render();
  }
}

// ===== 中文輸入法支援 =====
// 在搜尋框組字中暫停 setFilter,避免「ㄐㄧㄚˇ」這種未選字狀態觸發搜尋
const _composingInputs = new WeakSet();
function handleSearchInput(input, path) {
  if (_composingInputs.has(input)) return;  // 組字中,不搜尋
  setFilter(path, input.value);
}
function handleCompositionStart(input) { _composingInputs.add(input); }
function handleCompositionEnd(input, path) {
  _composingInputs.delete(input);
  setFilter(path, input.value);  // 組完字才正式搜尋
}

// 單一案場詳情 Modal — 重用 tplCaseRefEmbed 渲染主體
function tplSiteDetailModal() {
  if (!state.siteModal) return '';
  const caseRef = state.siteModal.caseRef;
  const info = resolveCaseRef(caseRef);
  if (!info || info.notFound) {
    return `
      <div class="modal-backdrop no-print" onclick="if(event.target===this)closeModal()">
        <div class="modal-content" style="max-width:500px">
          <div class="p-6">
            <p style="color:#92400e">⚠️ 找不到此案場資料</p>
            <button class="icon-btn mt-4" onclick="closeModal()">關閉</button>
          </div>
        </div>
      </div>
    `;
  }
  
  const isSite = info.type === 'site';
  const isHydro = info.category === 'hydro';
  const siteName = isSite ? (info.row.name || '(無名稱)') : info.name;
  const mgmtName = isSite ? info.row.mgmt : info.name.replace('管理處','');
  const accentColor = isHydro ? 'var(--hydro)' : 'var(--solar)';
  const typeLabel = isHydro ? '小水力' : '太陽光電';
  
  return `
    <div class="modal-backdrop no-print" onclick="if(event.target===this)closeModal()">
      <div class="modal-content" style="max-width:720px;max-height:85vh;overflow:auto">
        <div class="sticky top-0 bg-white border-b px-6 py-4 flex items-center justify-between" style="border-color:var(--border);z-index:1">
          <div>
            <p class="text-xs font-medium uppercase mb-1" style="color:${accentColor};letter-spacing:0.1em">${typeLabel} · 案場深入查看</p>
            <h2 class="text-xl font-bold font-serif-tc">${siteName}</h2>
          </div>
          <button class="icon-btn" onclick="closeModal()">✕ 關閉</button>
        </div>
        <div class="p-6">
          ${tplCaseRefEmbed(caseRef)}
          
          ${isSite && mgmtName ? `
            <div class="mt-4 p-3 rounded-lg" style="background:#f8fafc;border:1px solid var(--border)">
              <p class="text-xs mb-2" style="color:var(--ink-soft)">同管理處的其他案場?</p>
              <button class="icon-btn" onclick="openMgmtModal('${mgmtName}')" style="background:${accentColor};color:white;border-color:${accentColor}">
                🏢 查看「${mgmtName}管理處」完整資料
              </button>
            </div>
          ` : ''}
          
          ${isSite ? tplSiteRelatedOpinions(caseRef) : ''}
        </div>
      </div>
    </div>
  `;
}

// 顯示與本案場關聯的輿情(若有)
function tplSiteRelatedOpinions(caseRef) {
  const tab = caseRef.startsWith('solar:') ? 'solar' : 'hydro';
  const opinions = loadOpinions(tab);
  const related = opinions.filter(op => op.case_ref === caseRef);
  if (related.length === 0) return '';
  
  return `
    <div class="mt-4 p-3 rounded-lg" style="background:#fffbeb;border:1px solid #fbbf24">
      <p class="text-xs font-bold mb-2" style="color:#92400e">📢 與此案場關聯的輿情事件 (${related.length})</p>
      <div class="space-y-2">
        ${related.map(op => `
          <div class="text-xs p-2 rounded" style="background:white;border:1px solid #fde68a">
            <div class="flex items-center gap-2 flex-wrap">
              <span style="color:${(OPINION_SEVERITIES[op.severity]||OPINION_SEVERITIES.medium).color};font-weight:bold">${(OPINION_SEVERITIES[op.severity]||OPINION_SEVERITIES.medium).label}</span>
              <span style="color:${(OPINION_STATUSES[op.status]||OPINION_STATUSES.unhandled).color}">${(OPINION_STATUSES[op.status]||OPINION_STATUSES.unhandled).label}</span>
            </div>
            <p class="mt-1 font-medium">${op.title}</p>
            ${op.summary ? `<p class="mt-1" style="color:var(--ink-soft)">${op.summary}</p>` : ''}
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function getEditorArray(section) {
  if (section === 'solar.summary') return [DATA.solar.summary];
  if (section === 'meta') return [{ updated_at: DATA.updated_at }];
  const [a, b] = section.split('.');
  return DATA[a][b];
}
