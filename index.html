function categorizeReason(r) {
  if (!r) return '其他';
  if (r.includes('民眾') || r.includes('陳抗') || r.includes('陳情')) return '民眾反對/陳抗';
  if (r.includes('土地') || r.includes('容許') || r.includes('縣府不同意')) return '土地容許問題';
  if (r.includes('契約')) return '契約失效';
  if (r.includes('廠商') || r.includes('履保') || r.includes('放棄')) return '廠商主動撤案';
  if (r.includes('施設') || r.includes('饋線') || r.includes('台電')) return '台電/施工技術';
  return '其他';
}

// 哪些 anomaly_type 其實不算異常(代表「測試完成正常退場/正常進行中」)
// - 機組已拆除/待拆除:小水力測試完成後拆機組是正常流程
// - 測試中/施工中:正常推動階段,不應視為異常
const HYDRO_ANOMALY_EXCLUDE = ['機組已拆除', '機組待拆除', '測試中', '施工中'];
function isRealAnomaly(s) {
  return s.is_anomaly && !HYDRO_ANOMALY_EXCLUDE.includes(s.anomaly_type);
}

function getSolarAnomalies() {
  const arr = [];
  // 施工中區塊中的「案場施工中下修」視為異常(紅)
  DATA.solar.construction_sites.forEach((s, i) => {
    if (s.stage === '案場施工中下修') {
      arr.push({ ...s, _level: 'red', _reason: '案場施工中下修', _kind: 'construction_sites', _idx: i, _key: 'c'+i });
    }
  });
  return arr;
}

function getMgmtSolarSites(mgmt) {
  // 先 map 加 _kind/_idx,再 filter,確保 _idx 是原始 array 的索引(關鍵:openSiteModal 需要)
  return [
    ...DATA.solar.completed_sites.map((s,i) => ({...s, _kind:'completed_sites', _idx:i, _stage:'已完工'})).filter(s => s.mgmt === mgmt),
    ...DATA.solar.construction_sites.map((s,i) => ({...s, _kind:'construction_sites', _idx:i, _stage:s.stage})).filter(s => s.mgmt === mgmt),
    ...DATA.solar.admin_sites.map((s,i) => ({...s, _kind:'admin_sites', _idx:i, _stage:'行政程序中'})).filter(s => s.mgmt === mgmt),
    ...DATA.solar.planning_sites.map((s,i) => ({...s, _kind:'planning_sites', _idx:i, _stage:'規劃推動'})).filter(s => s.mgmt === mgmt)
  ];
}

function getVendorAnalysis() {
  const map = {};
  DATA.solar.cancelled_sites.forEach((c, i) => {
    const v = c.vendor || '未填';
    if (!map[v]) map[v] = { name: v, count: 0, mw: 0, reasons: {}, mgmts: new Set(), years: new Set(), cases: [], caseRefs: [] };
    map[v].count += 1;
    map[v].mw += c.capacity_mw;
    const cat = categorizeReason(c.reason);
    map[v].reasons[cat] = (map[v].reasons[cat] || 0) + 1;
    map[v].mgmts.add(c.mgmt);
    map[v].years.add(c.year);
    map[v].cases.push({...c, _idx: i});
    map[v].caseRefs.push('solar:cancelled_sites:' + i);
  });
  return Object.values(map)
    .map(v => ({ ...v, mgmts: Array.from(v.mgmts), years: Array.from(v.years).sort() }))
    .sort((a, b) => b.mw - a.mw);
}

function tplKpi({ label, value, unit, sublabel, accent, danger, source, onClick }) {
  const color = danger ? 'var(--alert)' : (accent || 'var(--ink)');
  const trustedStyle = source ? 'background:#fffbeb;border-left:3px solid #f59e0b' : '';
  const trustedBadge = source ? `<span class="ml-1 text-xs" style="color:#d97706;font-weight:normal" title="${source}">✓</span>` : '';

function tplSolarMgmtTable() {
  var mgmts = STANDARD_MGMTS;
  var stats = {};
  var cancelledByMgmt = {};
  mgmts.forEach(function(m) {
    stats[m] = {
      operating: { count: 0, refs: [] },
      construction: { count: 0, refs: [] },
      admin: { count: 0, refs: [] },
      planning: { count: 0, refs: [] }
    };
    cancelledByMgmt[m] = { count: 0, refs: [] };
  });
  (DATA.solar.cancelled_sites || []).forEach(function(s, i) {
    if (cancelledByMgmt.hasOwnProperty(s.mgmt)) {
      cancelledByMgmt[s.mgmt].count++;
      cancelledByMgmt[s.mgmt].refs.push('solar:cancelled_sites:' + i);
    }
  });
  DATA.solar.completed_sites.forEach(function(s, i) {
    if (stats[s.mgmt]) { stats[s.mgmt].operating.count++; stats[s.mgmt].operating.refs.push('solar:completed_sites:' + i); }
  });
  DATA.solar.construction_sites.forEach(function(s, i) {
    if (stats[s.mgmt]) { stats[s.mgmt].construction.count++; stats[s.mgmt].construction.refs.push('solar:construction_sites:' + i); }
  });
  DATA.solar.admin_sites.forEach(function(s, i) {
    if (stats[s.mgmt]) { stats[s.mgmt].admin.count++; stats[s.mgmt].admin.refs.push('solar:admin_sites:' + i); }
  });
  DATA.solar.planning_sites.forEach(function(s, i) {
    if (stats[s.mgmt]) { stats[s.mgmt].planning.count++; stats[s.mgmt].planning.refs.push('solar:planning_sites:' + i); }
  });

  var colOp = DATA.solar.completed_sites.length;
  var colCn = DATA.solar.construction_sites.length;
  var colAd = DATA.solar.admin_sites.length;
  var colPl = DATA.solar.planning_sites.length;
  var colSub = colOp + colCn + colAd;
  var colGrand = colSub + colPl;
  // 總計列用的 refs
  var refsOp    = DATA.solar.completed_sites.map(function(_,i){ return 'solar:completed_sites:'+i; });
  var refsCn    = DATA.solar.construction_sites.map(function(_,i){ return 'solar:construction_sites:'+i; });
  var refsAd    = DATA.solar.admin_sites.map(function(_,i){ return 'solar:admin_sites:'+i; });
  var refsPl    = DATA.solar.planning_sites.map(function(_,i){ return 'solar:planning_sites:'+i; });
  var refsSub   = refsOp.concat(refsCn).concat(refsAd);
  var refsGrand = refsSub.concat(refsPl);
  function mkTotalCell(n, refs, label, bg) {
    if (n === 0) return '<td class="px-3 py-2 border text-center tabular-nums" style="border-color:var(--border);' + (bg?'background:'+bg+';':'') + 'color:var(--ink-muted)">0</td>';
    var safe = JSON.stringify(refs).replace(/"/g,'&quot;');
    var lbl = encodeURIComponent(label);
    return '<td class="px-3 py-2 border text-center tabular-nums" style="border-color:var(--border);' + (bg?'background:'+bg+';':'') + 'cursor:pointer;color:var(--solar);font-weight:700" onclick="openListModal(decodeURIComponent(\'' + lbl + '\'),\'共 ' + n + ' 案\',' + safe + ',\'var(--solar)\')">' + n + '</td>';
  }

  function mkCell(n, refs, label, mgmt, color, hoverBg) {
    if (n === 0) return '<td class="text-center tabular-nums" style="color:var(--ink-muted)">0</td>';
    var safe = JSON.stringify(refs).replace(/"/g, '&quot;');
    var onclick = "openListModal('" + mgmt + "管理處・" + label + "', '共 " + n + " 案', " + safe + ", 'var(--solar)')";
    return '<td class="text-center tabular-nums" style="cursor:pointer;color:' + color + ';font-weight:600"'
      + ' onmouseover="this.style.background=\'' + hoverBg + '\'" onmouseout="this.style.background=\'\'"'
      + ' onclick="' + onclick + '">' + n + '</td>';
  }

  var rows = mgmts.map(function(m) {
    var s = stats[m];
    var subtotal = s.operating.count + s.construction.count + s.admin.count;
    var grandTotal = subtotal + s.planning.count;
    var cancelledCount = cancelledByMgmt[m] ? cancelledByMgmt[m].count : 0;
    var cancelledRefs = cancelledByMgmt[m] ? cancelledByMgmt[m].refs : [];
    var safeCancelledRefs = JSON.stringify(cancelledRefs).replace(/"/g, '&quot;');
    var subRefs = s.operating.refs.concat(s.construction.refs, s.admin.refs);
    var safeSubRefs = JSON.stringify(subRefs).replace(/"/g, '&quot;');
    var subtotalCell = subtotal > 0
      ? ('<td class="text-center tabular-nums font-bold" style="cursor:pointer;background:#fef3c7"'
          + ' onmouseover="this.style.background=\'#fde68a\'" onmouseout="this.style.background=\'#fef3c7\'"'
          + ' onclick="openListModal(\'' + m + "管理處・合計(不含規劃中)', '共 " + subtotal + " 案', " + safeSubRefs + ", 'var(--solar)')" + '">'
          + subtotal + '</td>')
      : '<td class="text-center tabular-nums" style="color:var(--ink-muted)">0</td>';
    var grandTotalCell = grandTotal > 0
      ? ('<td class="text-center tabular-nums font-bold" style="cursor:pointer;background:#fde68a"'
          + ' onmouseover="this.style.background=\'#fbbf24\'" onmouseout="this.style.background=\'#fde68a\'"'
          + ' onclick="openMgmtModal(\'' + m + '\')">' + grandTotal + '</td>')
      : '<td class="text-center tabular-nums" style="color:var(--ink-muted)">0</td>';
    return '<tr>'
      + '<td class="font-medium" style="cursor:pointer;color:var(--solar)" onclick="openMgmtModal(\'' + m + '\')" title="點擊查看 ' + m + '管理處 完整資料">' + m + '</td>'
      + mkCell(s.operating.count, s.operating.refs, '營運階段', m, 'var(--solar)', '#fef3c7')
      + mkCell(s.construction.count, s.construction.refs, '施工階段', m, 'var(--solar)', '#fef3c7')
      + mkCell(s.admin.count, s.admin.refs, '申設階段', m, 'var(--solar)', '#fef3c7')
      + subtotalCell
      + mkCell(s.planning.count, s.planning.refs, '規劃中', m, '#94a3b8', '#f1f5f9')
      + grandTotalCell
      + (cancelledCount > 0
          ? '<td class="text-center tabular-nums" style="cursor:pointer;background:#fff1f2;color:#991b1b;font-weight:600;border:1px solid var(--border)"'            + ' onmouseover="this.style.background=\'#fecdd3\'" onmouseout="this.style.background=\'#fff1f2\'"'            + ' onclick="openListModal(\'' + m + '管理處・解約撤案\', \'共 ' + cancelledCount + ' 案\', ' + safeCancelledRefs + ', \'#dc2626\')">'            + cancelledCount + '</td>'          : '<td class="text-center tabular-nums" style="background:#fff1f2;color:#94a3b8;border:1px solid var(--border)">0</td>')
      + '</tr>';
  }).join('');

  return '<div class="mgmt-table-wrap"><table class="w-full text-sm border-collapse mgmt-table">'
    + '<thead><tr style="background:#fef3c7">'
    + '<th class="px-3 py-2 border" style="border-color:var(--border);width:12%">管理處</th>'
    + '<th class="px-3 py-2 border text-center" style="border-color:var(--border)">營運階段<div class="text-xs font-normal" style="color:var(--ink-soft)">已完工</div></th>'
    + '<th class="px-3 py-2 border text-center" style="border-color:var(--border)">施工階段<div class="text-xs font-normal" style="color:var(--ink-soft)">施工/待施工/停工</div></th>'
    + '<th class="px-3 py-2 border text-center" style="border-color:var(--border)">申設階段<div class="text-xs font-normal" style="color:var(--ink-soft)">行政程序</div></th>'
    + '<th class="px-3 py-2 border text-center" style="border-color:var(--border);background:#fde68a">合計<div class="text-xs font-normal" style="color:var(--ink-soft)">不含規劃中</div></th>'
    + '<th class="px-3 py-2 border text-center" style="border-color:var(--border);background:#f1f5f9;color:#64748b">規劃中<div class="text-xs font-normal">評估招商</div></th>'
    + '<th class="px-3 py-2 border text-center" style="border-color:var(--border);background:#fbbf24">總計</th>'
    + '<th class="px-3 py-2 border text-center" style="border-color:var(--border);background:#fee2e2;color:#991b1b">解約撤案<div class="text-xs font-normal">歷年累計</div></th>'
    + '</tr></thead>'
    + '<tbody>' + rows
    + '<tr style="background:#fef3c7;font-weight:700">'
    + '<td class="px-3 py-2 border" style="border-color:var(--border)">總計</td>'
    + mkTotalCell(colOp, refsOp, '營運階段', '')
    + mkTotalCell(colCn, refsCn, '施工階段', '')
    + mkTotalCell(colAd, refsAd, '申設階段', '')
    + mkTotalCell(colSub, refsSub, '合計', '#fde68a')
    + mkTotalCell(colPl, refsPl, '規劃中', '#f1f5f9')
    + mkTotalCell(colGrand, refsGrand, '總計', '#fbbf24')
    + '<td class="px-3 py-2 border text-center tabular-nums" style="border-color:var(--border);background:#fecdd3;color:#991b1b;font-weight:700">' + DATA.solar.cancelled_sites.length + '</td>'
    + '</tr></tbody></table>'
    + '</div>'
    + '<p class="text-xs mt-3" style="color:var(--ink-muted)">※ 合計＝營運+施工+申設；總計＝合計+規劃中；解約撤案為歷年累計，不計入合計與總計</p>';
}

// 小水力:管理處 × 5 substage 分類
function tplHydroMgmtTable() {
  var mgmts = STANDARD_MGMTS;

  // 分類輔助
  function getOp(s) { return (s.operation||'') + ' ' + (s.note||''); }
  function isRecruit(s) {
    if (!['營運中','推動中'].includes(s.substage)) return false;
    var op = getOp(s);
    return !['運轉測試中','申請中(同意測試','機組調整中','15/6/10 廠辦辦理展延中'].some(function(k){ return op.includes(k); });
  }
  function isTest(s) {
    if (['測試','專案示範'].includes(s.substage)) return true;
    if (s.substage !== '推動中') return false;
    var op = getOp(s);
    return ['運轉測試中','申請中(同意測試','機組調整中','15/6/10 廠辦辦理展延中'].some(function(k){ return op.includes(k); });
  }
  function isPotential(s) { return s.substage === '潛力'; }

  // 招標案階段
  function recruitStage(s) {
    var op = s.operation || '';
    if (s.substage === '營運中' || op.includes('營運中')) return 'r_op';
    if (['機組已拆除','機組待拆除'].some(function(k){ return op.includes(k); })) return 'r_rem';
    return 'r_prog'; // 申請/施工階段
  }

  // 測試案階段
  function testStage(s) {
    var op = getOp(s);
    if (['機組已拆除','機組待拆除'].some(function(k){ return op.includes(k); })) return 't_rem';
    if (s.substage === '專案示範') return 't_demo';
    if (op.includes('運轉測試中') || op.includes('機組測試中')) return 't_test';
    return 't_prog'; // 申請/施工階段
  }

  var stats = {};
  mgmts.forEach(function(m) {
    stats[m] = {
      r_op:0, r_prog:0, r_rem:0,
      t_test:0, t_prog:0, t_demo:0, t_rem:0,
      pot:0,
      refs: { r_op:[], r_prog:[], r_rem:[], t_test:[], t_prog:[], t_demo:[], t_rem:[], pot:[] }
    };
  });

  DATA.hydro.sites.forEach(function(s, idx) {
    var st = stats[s.mgmt];
    if (!st) return;
    var ref = 'hydro:sites:' + idx;
    if (isRecruit(s))     { var k = recruitStage(s); st[k]++; st.refs[k].push(ref); }
    else if (isTest(s))   { var k = testStage(s);    st[k]++; st.refs[k].push(ref); }
    else if (isPotential(s)) { st.pot++; st.refs.pot.push(ref); }
  });

  var totals = { r_op:0,r_prog:0,r_rem:0, t_test:0,t_prog:0,t_demo:0,t_rem:0, pot:0, sub:0, grand:0 };
  var bd = 'border-color:var(--border)';

  function tdBase(style, inner) {
    return '<td class="px-3 py-2 border text-center tabular-nums" style="' + bd + ';' + style + '">' + inner + '</td>';
  }
  function tdClick(style, oc, hIn, hOut, inner) {
    return '<td class="px-3 py-2 border text-center tabular-nums" style="' + bd + ';' + style + '"'
      + ' onclick="' + oc + '" onmouseover="this.style.background=\'' + hIn + '\'" onmouseout="this.style.background=\'' + hOut + '\'">'
      + inner + '</td>';
  }
  function mkCell(n, refs, label, mgmt) {
    if (n === 0) return tdBase('color:var(--ink-muted)', '0');
    var safe = JSON.stringify(refs).replace(/"/g, '&quot;');
    var oc = "openListModal('" + mgmt + "管理處・" + label + "','共 " + n + " 案'," + safe + ",'var(--hydro)')";
    return tdClick('cursor:pointer;color:var(--hydro);font-weight:600', oc, '#ccfbf1', '', String(n));
  }

  var th = function(label, attrs) {
    return '<th class="px-3 py-2 border text-center font-medium text-xs" style="' + bd + ';' + (attrs||'') + '">' + label + '</th>';
  };

  var thead = '<thead>'
    + '<tr style="background:#ecfdf5">'
    + '<th class="px-3 py-2 border text-left font-medium" style="' + bd + '" rowspan="2">管理處</th>'
    + '<th class="px-3 py-2 border text-center font-medium" style="' + bd + ';background:#d1fae5" colspan="3">招標案</th>'
    + '<th class="px-3 py-2 border text-center font-medium" style="' + bd + ';background:#e0f2fe" colspan="4">測試案</th>'
    + '<th class="px-3 py-2 border text-center font-medium" style="' + bd + ';background:#a7f3d0" rowspan="2">合計<br><span class="text-xs font-normal" style="color:var(--ink-muted)">不含潛力</span></th>'
    + '<th class="px-3 py-2 border text-center font-medium" style="' + bd + '" rowspan="2">潛力</th>'
    + '<th class="px-3 py-2 border text-center font-medium" style="' + bd + ';background:#6ee7b7" rowspan="2">總計</th>'
    + '</tr>'
    + '<tr>'
    + th('營運中',       'background:#e8fdf4')
    + th('申請/施工',    'background:#e8fdf4')
    + th('拆除',         'background:#e8fdf4')
    + th('測試中',       'background:#e8f7ff')
    + th('申請/施工',    'background:#e8f7ff')
    + th('示範案場',     'background:#e8f7ff')
    + th('拆除',         'background:#e8f7ff')
    + '</tr>'
    + '</thead>';

  // 累積各欄的全域 refs（供總計列點擊用）
  var totalRefs = { r_op:[], r_prog:[], r_rem:[], t_test:[], t_prog:[], t_demo:[], t_rem:[], pot:[] };
  function mkTotalCell(n, refs, label, bg) {
    if (n === 0) return '<td class="px-3 py-2 border text-center tabular-nums" style="' + bd + ';' + (bg?'background:'+bg+';':'') + 'color:var(--ink-muted)">0</td>';
    var safe = JSON.stringify(refs).replace(/"/g,'&quot;');
    var oc = "openListModal('總計・" + label + "','共 " + n + " 案'," + safe + ",'var(--hydro)')";
    return '<td class="px-3 py-2 border text-center tabular-nums" style="' + bd + ';' + (bg?'background:'+bg+';':'') + 'cursor:pointer;color:var(--hydro);font-weight:700" onclick="' + oc + '" onmouseover="this.style.opacity=0.8" onmouseout="this.style.opacity=1">' + n + '</td>';
  }
  var rows = mgmts.map(function(m) {
    var st = stats[m];
    var r_sub = st.r_op + st.r_prog + st.r_rem;
    var t_sub = st.t_test + st.t_prog + st.t_demo + st.t_rem;
    var sub   = r_sub + t_sub;
    var grand = sub + st.pot;

    totals.r_op+=st.r_op; totals.r_prog+=st.r_prog; totals.r_rem+=st.r_rem;
    totals.t_test+=st.t_test; totals.t_prog+=st.t_prog; totals.t_demo+=st.t_demo; totals.t_rem+=st.t_rem;
    totals.pot+=st.pot; totals.sub+=sub; totals.grand+=grand;
    ['r_op','r_prog','r_rem','t_test','t_prog','t_demo','t_rem','pot'].forEach(function(k){ totalRefs[k]=totalRefs[k].concat(st.refs[k]); });

    var allRefs = ['r_op','r_prog','r_rem','t_test','t_prog','t_demo','t_rem'].reduce(function(a,k){ return a.concat(st.refs[k]); },[]);
    var safe2 = JSON.stringify(allRefs).replace(/"/g,'&quot;');
    var oc2 = "openListModal('"+m+"管理處・合計','共 "+sub+" 案',"+safe2+",'var(--hydro)')";
    var oc3 = "openMgmtModal('"+m+"')";

    var subCell = sub > 0
      ? tdClick('font-weight:600;background:#d1fae5;cursor:pointer', oc2, '#a7f3d0', '#d1fae5', String(sub))
      : tdBase('color:var(--ink-muted)', '0');
    var grandCell = grand > 0
      ? tdClick('font-weight:600;background:#a7f3d0;cursor:pointer', oc3, '#6ee7b7', '#a7f3d0', String(grand))
      : tdBase('color:var(--ink-muted)', '0');

    return '<tr>'
      + '<td class="px-3 py-2 border font-medium" style="' + bd + ';cursor:pointer;color:var(--hydro)" onclick="openMgmtModal(\'' + m + '\')">' + m + '</td>'
      + mkCell(st.r_op,   st.refs.r_op,   '招標-營運中',    m)
      + mkCell(st.r_prog, st.refs.r_prog, '招標-申請/施工', m)
      + mkCell(st.r_rem,  st.refs.r_rem,  '招標-拆除',      m)
      + mkCell(st.t_test, st.refs.t_test, '測試-測試中',    m)
      + mkCell(st.t_prog, st.refs.t_prog, '測試-申請/施工', m)
      + mkCell(st.t_demo, st.refs.t_demo, '測試-示範案場',  m)
      + mkCell(st.t_rem,  st.refs.t_rem,  '測試-拆除',      m)
      + subCell
      + mkCell(st.pot, st.refs.pot, '潛力', m)
      + grandCell
      + '</tr>';
  });

  var allSubRefs = ['r_op','r_prog','r_rem','t_test','t_prog','t_demo','t_rem'].reduce(function(a,k){ return a.concat(totalRefs[k]); },[]);
  var totalRow = '<tr style="background:#f0fdf4;font-weight:700">'
    + '<td class="px-3 py-2 border" style="' + bd + '">總計</td>'
    + ['r_op','r_prog','r_rem','t_test','t_prog','t_demo','t_rem'].map(function(k){
        var lbl = {r_op:'招標-營運中',r_prog:'招標-申請/施工',r_rem:'招標-拆除',t_test:'測試-測試中',t_prog:'測試-申請/施工',t_demo:'測試-示範案場',t_rem:'測試-拆除'}[k];
        return mkTotalCell(totals[k], totalRefs[k], lbl, '');
      }).join('')
    + mkTotalCell(totals.sub, allSubRefs, '合計(不含潛力)', '#a7f3d0')
    + mkTotalCell(totals.pot, totalRefs.pot, '潛力', '') + '</tr>';

  return '<div class="mgmt-table-wrap"><table class="w-full text-sm border-collapse mgmt-table">'
    + thead + '<tbody>' + rows.join('') + totalRow + '</tbody></table></div>'
    + '<p class="text-xs mt-3" style="color:var(--ink-muted)">※ 合計不含潛力案場；各欄可點擊查看案場清單</p>';
}

function tplSolarCards() {
  const all = [
    ...DATA.solar.completed_sites.map((s,i) => ({...s, _stage: '已完工', _kind: 'completed_sites', _idx: i})),
    ...DATA.solar.construction_sites.map((s,i) => ({...s, _stage: s.stage, _kind: 'construction_sites', _idx: i})),
    ...DATA.solar.admin_sites.map((s,i) => ({...s, _stage: '申設中', _kind: 'admin_sites', _idx: i})),
    ...DATA.solar.planning_sites.map((s,i) => ({...s, _stage: '規劃中', _kind: 'planning_sites', _idx: i}))
  ];
  const f = state.solar;
  const filtered = all.filter(s => {
    if (f.mgmt !== 'all' && s.mgmt !== f.mgmt) return false;
    if (f.type !== 'all' && s.type !== f.type) return false;
    if (f.stage !== 'all' && (s._stage || s.stage) !== f.stage) return false;
    if (f.search && !(s.name||'').toLowerCase().includes(f.search.toLowerCase()) && !(s.vendor||'').toLowerCase().includes(f.search.toLowerCase())) return false;
    return true;
  });
  const display = filtered.slice(0, 60);
  return `
    <p id="solar-filter-count" class="text-xs mb-3" style="color:var(--ink-soft)">目前篩選顯示 <strong>${filtered.length}</strong> / ${all.length} 案${filtered.length > 60 ? '，效能考量先顯示前 60 筆，請使用篩選器縮小範圍' : ''}</p>

    </div>`;
}

function tplHydroDashboard() {
  // 帶上 _idx + 用 isRealAnomaly 過濾掉「機組已拆除/待拆除」這類非異常
  const sitesWithIdx = DATA.hydro.sites.map((s, i) => ({...s, _idx: i}));
  const anomalies = sitesWithIdx.filter(s => isRealAnomaly(s));
  const red = anomalies.filter(a => a.anomaly_level === 'red');
  const yellow = anomalies.filter(a => a.anomaly_level === 'yellow');
  
  // typeMap: 類型 → 數量;typeRefs: 類型 → caseRefs
  const typeMap = {};
  const typeRefs = {};
  anomalies.forEach(a => { 
    typeMap[a.anomaly_type] = (typeMap[a.anomaly_type] || 0) + 1;
    if (!typeRefs[a.anomaly_type]) typeRefs[a.anomaly_type] = [];
    typeRefs[a.anomaly_type].push('hydro:sites:' + a._idx);
  });
  
  // substageMap: 類別 → 統計;substageRefs: 類別 → caseRefs
  const substageMap = {};
  const substageRefs = {};
  sitesWithIdx.forEach(s => {
    if (!substageMap[s.substage]) substageMap[s.substage] = { name: s.substage, cases: 0, kw: 0 };
    substageMap[s.substage].cases += 1;
    substageMap[s.substage].kw += s.capacity_kw;
    if (!substageRefs[s.substage]) substageRefs[s.substage] = [];
    substageRefs[s.substage].push('hydro:sites:' + s._idx);
  });
  const substageOrder = ['營運中','推動中','專案示範','測試','潛力'];
  const substageData = substageOrder.map(n => substageMap[n]).filter(Boolean);
  
  const mgmtSorted = [...DATA.hydro.mgmt].sort((a,b) => b.capacity_kw - a.capacity_kw);
  
  const _hydroCollapsible = (key, accentColor, title, subtitle, innerHtml) => {
    const exp = state.expandedHydroSec[key];
    return '<section id="sec-hydro-' + key + '" class="section-card mt-8">'
      + '<div class="px-6 py-4 flex items-center justify-between"'
      + ' style="cursor:pointer;border-bottom:' + (exp ? '1px solid var(--border)' : 'none') + '"'
      + ' onclick="toggleHydroSec(\'' + key + '\')">'
      + '<div>'
      + '<p class="text-xs font-medium uppercase mb-0.5" style="color:' + accentColor + ';letter-spacing:0.1em">' + title + '</p>'
      + '<p class="text-xs" style="color:var(--ink-soft)">' + subtitle + '</p>'
      + '</div>'
      + '<span style="font-size:12px;color:var(--ink-soft)">' + (exp ? '收起 ▲' : '展開 ▼') + '</span>'
      + '</div>'
      + (exp ? innerHtml : '')
      + '</section>';
  };

  const isMobile = state.viewMode === 'mobile';

  // 提前計算 inner HTML（可存取 closure 變數）
  const anomalyInnerHtml = _tplHydroAnomalyInner(red, yellow, typeMap, typeRefs, anomalies);
  const stageInnerHtml   = _tplHydroStageInner(substageData, substageRefs);
  const mgmtInnerHtml    = _tplHydroMgmtInner(mgmtSorted, sitesWithIdx);

  return (
    (isMobile ? _tplHydroMgmtTableSection() + _tplHydroSitesSection() : '')
    + (isMobile
        ? _hydroCollapsible('anomaly', 'var(--alert)', '⚠️ 異常警示案件', '紅燈：撤案／終止／暫緩；黃燈：機組調整', anomalyInnerHtml)
        : _tplHydroAnomalySection(red, yellow, typeMap, typeRefs, anomalies))
    + (isMobile
        ? _hydroCollapsible('stage', 'var(--hydro)', '各管理處案件數', '含異常標示，可點擊', stageInnerHtml)
        : _tplHydroStageSection(substageData, substageRefs))
    + (isMobile ? '' : _tplHydroMgmtTableSection())
    + (isMobile
        ? _hydroCollapsible('mgmt', 'var(--hydro)', '各管理處推動概況', '按容量排序，可點任一處深入查看', mgmtInnerHtml)
        : _tplHydroMgmtSection(mgmtSorted, sitesWithIdx))
    + (isMobile ? '' : _tplHydroSitesSection())
  );
}

function tplHydroCards() {
  const f = state.hydro;
  const withIdx = DATA.hydro.sites.map((s, i) => ({...s, _idx: i}));
  const filtered = withIdx.filter(s => {
    if (f.mgmt !== 'all' && s.mgmt !== f.mgmt) return false;
    if (f.substage !== 'all' && s.substage !== f.substage) return false;
    // 分類輔助函式
    const _op = (s.operation || '') + ' ' + (s.note || '');
    const _isRecruit = ['營運中','推動中'].includes(s.substage)
      && !['運轉測試中','申請中(同意測試','機組調整中'].some(k=>_op.includes(k))
      && !(_op.includes('廠辦辦理展延') || _op.includes('15/6/10'));
    const _isTest = ['測試','專案示範'].includes(s.substage)
      || (['推動中'].includes(s.substage) && (
        ['運轉測試中','申請中(同意測試','機組調整中','15/6/10 廠辦辦理展延中'].some(k=>_op.includes(k))
        ));
    // 類別篩選
    if (f.category === 'recruit'   && !_isRecruit) return false;
    if (f.category === 'test'      && !_isTest) return false;
    if (f.category === 'potential' && s.substage !== '潛力') return false;
    // 階段篩選
    if (f.operation !== 'all') {
      const op = s.operation || '';
      // 招標案
      if (f.operation === 'operating' && !(op.includes('營運中') || s.substage === '營運中')) return false;
      if (f.operation === 'removed'   && !['機組已拆除','機組待拆除'].some(k=>op.includes(k))) return false;
      // 招標案+測試案 共用：申請/施工階段
      if (f.operation === 'progress') {
        if (f.category === 'recruit') {
          if (!['施工中','申設中','申請中','籌辦招標'].some(k=>op.includes(k))) return false;
        } else {
          // 測試案的申請/施工：阿罩霧迪暘、吉安圳2幹線、白冷圳(推動中)
          if (!['機組調整中','15/6/10 廠辦辦理展延中','申請中(同意測試'].some(k=>op.includes(k))) return false;
        }
      }
      // 測試案專屬
      if (f.operation === 'testing') {
        if (!['運轉測試中','機組測試中'].some(k=>op.includes(k))) return false;
      }
      if (f.operation === 'demo') {
        if (s.substage !== '專案示範') return false;
      }
    }
    if (f.anomaly === 'red' && s.anomaly_level !== 'red') return false;
    if (f.anomaly === 'yellow' && s.anomaly_level !== 'yellow') return false;
    if (f.anomaly === 'none' && s.is_anomaly) return false;
    if (f.search && !s.name.toLowerCase().includes(f.search.toLowerCase()) && !(s.vendor||'').toLowerCase().includes(f.search.toLowerCase())) return false;
    if (f.vendor !== 'all' && (s.vendor||'') !== f.vendor) return false;
    return true;
  });
  return `
    <p id="hydro-filter-count" class="text-xs mb-3" style="color:var(--ink-soft)">目前篩選顯示 <strong>${filtered.length}</strong> / ${DATA.hydro.sites.length} 案場</p>

}

const chartInstances = {};

function destroyCharts() {
  Object.values(chartInstances).forEach(c => c && c.destroy && c.destroy());
  Object.keys(chartInstances).forEach(k => delete chartInstances[k]);
}

function renderCharts() {
  destroyCharts();
  const baseFont = { family: 'Noto Sans TC, sans-serif', size: 11 };
  
  if (state.tab === 'solar') {
    const cancelled = DATA.solar.cancelled_sites;
    const reasonMap = {};
    const reasonRefsChart = {};  // 分類 → caseRefs
    cancelled.forEach((c, i) => { 
      const cat = categorizeReason(c.reason); 
      reasonMap[cat] = (reasonMap[cat] || 0) + 1;
      if (!reasonRefsChart[cat]) reasonRefsChart[cat] = [];
      reasonRefsChart[cat].push('solar:cancelled_sites:' + i);
    });
    const reasonData = Object.entries(reasonMap).sort((a,b)=>b[1]-a[1]);
    
    // 原因分類(條形圖,點擊某條開啟列表 modal)
    const c1 = document.getElementById('chart-reason');
    if (c1) chartInstances.reason = new Chart(c1, {
      type: 'bar',
      data: { labels: reasonData.map(r=>r[0]), datasets: [{ data: reasonData.map(r=>r[1]), backgroundColor: '#dc2626', borderRadius: 4 }] },
      options: { 
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        plugins: { 
          legend: { display: false },
          tooltip: { callbacks: { afterLabel: () => '(點擊查看清單)' } }
        }, 
        scales: { x: { ticks: { font: baseFont } }, y: { ticks: { font: baseFont } } },
        onHover: (e, els) => { e.native.target.style.cursor = els.length ? 'pointer' : 'default'; },
        onClick: (e, els) => {
          if (!els || els.length === 0) return;
          const idx = els[0].index;
          const reason = reasonData[idx][0];
          const count = reasonData[idx][1];
          openListModal('解約原因:' + reason, '此原因分類共 ' + count + ' 案', reasonRefsChart[reason] || [], 'var(--alert)');
        }
      }
    });
    
    // 年度趨勢
    const yearMap = { 112: 0, 113: 0, 114: 0 };
    cancelled.forEach(c => { yearMap[c.year] += c.capacity_mw; });
    const c2 = document.getElementById('chart-year');
    if (c2) chartInstances.year = new Chart(c2, {
      type: 'bar',
      data: { labels: ['112年','113年','114年'], datasets: [{ label: '解約容量 (MW)', data: [yearMap[112], yearMap[113], yearMap[114]], backgroundColor: '#dc2626', borderRadius: 4 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { font: baseFont } }, y: { beginAtZero: true, ticks: { font: baseFont } } } }
    });
    
    // 廠商解約分析條形圖(可點某廠商查看其所有解約案場)
    const vendors = getVendorAnalysis().slice(0, 8);
    const c3 = document.getElementById('chart-vendor-mw');
    if (c3) chartInstances.vendor = new Chart(c3, {
      type: 'bar',
      data: { labels: vendors.map(v => v.name.length > 14 ? v.name.substring(0,14)+'…' : v.name), datasets: [{ label: '流失容量 (MW)', data: vendors.map(v => parseFloat(v.mw.toFixed(2))), backgroundColor: '#d97706', borderRadius: 4 }] },
      options: { 
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        plugins: { 
          legend: { display: false }, 
          tooltip: { callbacks: { 
            label: ctx => ctx.parsed.x + ' MW (' + vendors[ctx.dataIndex].count + ' 案)',
            afterLabel: () => '(點擊查看清單)'
          } } 
        }, 
        scales: { x: { ticks: { font: baseFont } }, y: { ticks: { font: { ...baseFont, size: 10 } } } },
        onHover: (e, els) => { e.native.target.style.cursor = els.length ? 'pointer' : 'default'; },
        onClick: (e, els) => {
          if (!els || els.length === 0) return;
          const idx = els[0].index;
          const v = vendors[idx];
          openListModal('廠商:' + v.name, '解約 ' + v.count + ' 案、流失 ' + v.mw.toFixed(2) + ' MW', v.caseRefs || [], 'var(--warning)');
        }
      }
    });
    
    // 達成率 doughnut
    const totalCompleted = DATA.solar.summary.total_completed_mw;
    const target = DATA.solar.summary.target_mw;
    const c4 = document.getElementById('chart-achievement');
    if (c4) chartInstances.achievement = new Chart(c4, {
      type: 'doughnut',
      data: { datasets: [{ data: [totalCompleted, target - totalCompleted], backgroundColor: ['#b45309','#fde68a'], borderWidth: 0 }] },
      options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { display: false }, tooltip: { enabled: false } } }
    });
    
    // 管理處堆疊
    const c5 = document.getElementById('chart-mgmt-solar');
    if (c5) {
      const m = [...DATA.solar.mgmt].sort((a,b)=>b.total_potential_mw - a.total_potential_mw);
      chartInstances.mgmtSolar = new Chart(c5, {
        type: 'bar',
        data: { labels: m.map(x=>x.name), datasets: [
          { label: '已完工', data: m.map(x=>x.completed_mw), backgroundColor: '#059669' },
          { label: '施工中', data: m.map(x=>x.construction_mw), backgroundColor: '#0891b2' },
          { label: '行政程序', data: m.map(x=>x.admin_mw), backgroundColor: '#6366f1' },
          { label: '規劃推動', data: m.map(x=>x.planning_mw), backgroundColor: '#94a3b8' }
        ]},
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: baseFont, padding: 12, boxWidth: 12 } }, tooltip: { callbacks: { footer: items => { const total = items.reduce((a,b)=>a+b.parsed.y,0); return '合計 ' + total.toFixed(2) + ' MW'; } } } }, scales: { x: { stacked: true, ticks: { font: baseFont } }, y: { stacked: true, ticks: { font: baseFont, callback: v => v + ' MW' } } } }
      });
    }
  }
  
  if (state.tab === 'hydro') {
    // 用 isRealAnomaly 過濾「機組已拆除/待拆除」等非真異常,並帶上 _idx
    const sitesWithIdxH = DATA.hydro.sites.map((s, i) => ({...s, _idx: i}));
    const anomalies = sitesWithIdxH.filter(s => isRealAnomaly(s));
    const typeMap = {};
    const typeRefsChart = {};  // 類型 → caseRefs
    anomalies.forEach(a => { 
      typeMap[a.anomaly_type] = (typeMap[a.anomaly_type] || 0) + 1; 
      if (!typeRefsChart[a.anomaly_type]) typeRefsChart[a.anomaly_type] = [];
      typeRefsChart[a.anomaly_type].push('hydro:sites:' + a._idx);
    });
    const typeData = Object.entries(typeMap).sort((a,b)=>b[1]-a[1]);
    
    // 小水力異常類型條形圖,加 onClick
    const c1 = document.getElementById('chart-hydro-type');
    if (c1) chartInstances.hydroType = new Chart(c1, {
      type: 'bar',
      data: { labels: typeData.map(t=>t[0]), datasets: [{ data: typeData.map(t=>t[1]), backgroundColor: '#dc2626', borderRadius: 4, maxBarThickness: 60 }] },
      options: { 
        responsive: true, maintainAspectRatio: false,
        plugins: { 
          legend: { display: false },
          tooltip: { callbacks: { afterLabel: () => '(點擊查看清單)' } }
        }, 
        scales: { x: { ticks: { font: baseFont } }, y: { beginAtZero: true, max: typeData.length > 0 ? Math.max(...typeData.map(t=>t[1])) + 1 : 2, ticks: { font: baseFont, stepSize: 1, precision: 0 } } },
        onHover: (e, els) => { e.native.target.style.cursor = els.length ? 'pointer' : 'default'; },
        onClick: (e, els) => {
          if (!els || els.length === 0) return;
          const idx = els[0].index;
          const typeName = typeData[idx][0];
          const count = typeData[idx][1];
          openListModal('異常類型:' + typeName, '此類型共 ' + count + ' 案', typeRefsChart[typeName] || [], 'var(--alert)');
        }
      }
    });
    
    const mgmtA = DATA.hydro.mgmt.filter(m=>m.anomaly_cases>0).sort((a,b)=>b.anomaly_cases-a.anomaly_cases);
    const c2 = document.getElementById('chart-hydro-mgmt-anomaly');
    if (c2) chartInstances.hydroMgmtAnomaly = new Chart(c2, {
      type: 'bar',
      data: { labels: mgmtA.map(m=>m.name), datasets: [{ data: mgmtA.map(m=>m.anomaly_cases), backgroundColor: '#dc2626', borderRadius: 4, maxBarThickness: 60 }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false },
          tooltip: { callbacks: { label: ctx => ctx.parsed.y + ' 件異常' } }
        },
        scales: { x: { ticks: { font: baseFont } }, y: { beginAtZero: true, max: Math.max(...mgmtA.map(m=>m.anomaly_cases), 1) + 1, ticks: { font: baseFont, stepSize: 1, precision: 0 } } },
        onClick: (evt, elements) => {
          if (!elements.length) return;
          const mg = mgmtA[elements[0].index];
          if (!mg) return;
          // 找該管理處的異常案場 refs
          const refs = DATA.hydro.sites
            .map((s,i) => ({s,i}))
            .filter(({s}) => s.mgmt === mg.name && s.is_anomaly)
            .map(({i}) => 'hydro:sites:' + i);
          if (refs.length) openListModal(mg.name + '管理處・異常案件', '共 ' + refs.length + ' 案', refs, 'var(--alert)');
        },
        onHover: (evt, elements) => { evt.native.target.style.cursor = elements.length ? 'pointer' : 'default'; }
      }
    });
    
    const mgmt = [...DATA.hydro.mgmt].sort((a,b)=>b.capacity_kw-a.capacity_kw);
    const c3 = document.getElementById('chart-hydro-mgmt-cap');
    if (c3) chartInstances.hydroMgmtCap = new Chart(c3, {
      type: 'bar',
      data: { labels: mgmt.map(m=>m.name), datasets: [
        { label: '已完工', data: mgmt.map(m=>m.completed_kw), backgroundColor: '#059669' },
        { label: '推動中', data: mgmt.map(m=>m.in_progress_kw), backgroundColor: '#0f766e' }
      ]},
      options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: baseFont, padding: 12, boxWidth: 12 } } }, scales: { x: { stacked: true, ticks: { font: baseFont, callback: v => v + ' kW' } }, y: { stacked: true, ticks: { font: baseFont } } } }
    });
  }
}

// ==================== 互動 ====================
function setFilter(path, value) {
  const [section, key] = path.split('.');
  if (!key) {
    setState({ [section]: value });
  } else {
    state[section][key] = value;
    // 部分篩選不需重畫全頁，只重畫卡片
    if (key === 'search' || key === 'mgmt' || key === 'type' || key === 'stage' || key === 'substage' || key === 'anomaly') {
      const container = document.getElementById(section + '-cards-container');
      if (container) {
        container.innerHTML = section === 'solar' ? tplSolarCards() : tplHydroCards();
        // search 來自文字輸入框,不重畫全頁(避免失焦與中文輸入法選字被打斷)
        // 只更新「目前篩選顯示 X / Y 案」這類計數
        if (key === 'search') {
          const countEl = document.getElementById(section + '-filter-count');
          if (countEl) {
            const total = section === 'solar' 
              ? (DATA.solar.completed_sites.length + DATA.solar.construction_sites.length + DATA.solar.admin_sites.length + DATA.solar.planning_sites.length)
              : DATA.hydro.sites.length;
            const filtered = container.querySelectorAll('.site-card').length;
            countEl.textContent = '目前篩選顯示 ' + filtered + ' / ' + total + ' 案' + (filtered > 60 ? ',效能考量先顯示前 60 筆,請使用篩選器縮小範圍' : '');
          }
          return; // 搜尋時不重畫全頁
        }
        // 其他篩選(按鈕點擊)才重畫全頁以更新按鈕 active 狀態
        render();
        return;
      }
    }
    render();
  }
}

// ===== 中文輸入法支援 =====
// 在搜尋框組字中暫停 setFilter,避免「ㄐㄧㄚˇ」這種未選字狀態觸發搜尋
const _composingInputs = new WeakSet();
function handleSearchInput(input, path) {
  if (_composingInputs.has(input)) return;  // 組字中,不搜尋
  setFilter(path, input.value);
}
function handleCompositionStart(input) { _composingInputs.add(input); }
function handleCompositionEnd(input, path) {
  _composingInputs.delete(input);
  setFilter(path, input.value);  // 組完字才正式搜尋
}

// 通用列表 Modal:顯示一群案場/管理處,點任一筆進對應的詳情
function openListModal(title, subtitle, caseRefs, color) {
  setState({ listModal: { title, subtitle, caseRefs, color: color || 'var(--solar)' }, siteModal: null, mgmtModal: null, vendorModal: null });
}

function tplListModal() {
  if (!state.listModal) return '';
  const { title, subtitle, caseRefs, color } = state.listModal;
  
  if (!caseRefs || caseRefs.length === 0) {
    return `
      <div class="modal-backdrop no-print" onclick="if(event.target===this)closeModal()">
        <div class="modal-content" style="max-width:500px">
          <div class="p-6">
            <h3 class="text-lg font-bold mb-2" style="color:${color||'var(--solar)'}">${title}</h3>
            ${subtitle ? `<p class="text-sm" style="color:var(--ink-soft)">${subtitle}</p>` : ''}
            <p class="mt-4 text-center py-6" style="color:var(--ink-muted)">此分類目前沒有案場</p>
            <button class="icon-btn mt-2" onclick="closeModal()">關閉</button>
          </div>
        </div>
      </div>
    `;
  }
  
  // 渲染每張小卡
  const cards = caseRefs.map(ref => {
    // 管理處
    if (ref.startsWith('mgmt:')) {
      const parts = ref.split(':');
      const cat = parts[1];
      const name = parts.slice(2).join(':');
      return `
        <div class="rounded-lg border p-3 mgmt-clickable" style="border-color:var(--border);background:white;cursor:pointer"
             onclick="openMgmtModal('${name}')">
          <div class="flex items-center justify-between">
            <div>
              <p class="font-semibold text-sm">${name}管理處</p>
              <p class="text-xs mt-0.5" style="color:var(--ink-soft)">${cat==='solar'?'太陽光電':'小水力'}</p>
            </div>
            <span style="color:var(--ink-muted);font-size:18px">→</span>
          </div>
        </div>
      `;
    }
    
    // 案場
    const info = resolveCaseRef(ref);
    if (!info || info.notFound || !info.row) {
      return `<div class="rounded-lg border p-3" style="border-color:var(--border);background:#fef3c7;color:#92400e">⚠️ 找不到案場 (${ref})</div>`;
    }
    const r = info.row;
    const isHydro = info.category === 'hydro';
    const capStr = isHydro ? (r.capacity_kw + ' kW') : (r.capacity_mw + ' MW');
    const stageLabel = isHydro 
      ? (r.substage || '') + (r.stage ? ' · ' + r.stage : '')
      : ({ completed_sites:'已完工', construction_sites:r.stage, admin_sites:'行政程序中', planning_sites:'規劃推動', cancelled_sites:'解約/撤案' })[info.kind] || info.kind;
    
    let borderColor = 'var(--border)';
    let bgColor = 'white';
    if (info.kind === 'cancelled_sites') { borderColor = '#fecaca'; bgColor = '#fef2f2'; }
    else if (info.kind === 'completed_sites') { borderColor = '#bbf7d0'; bgColor = '#f0fdf4'; }
    else if (r.stage === '停工中' || (r.progress && r.progress.includes('撤案'))) { borderColor = '#fecaca'; bgColor = '#fef2f2'; }
    else if (r.stage === '待施工') { borderColor = '#fed7aa'; bgColor = '#fff7ed'; }
    else if (isRealAnomaly(r) && r.anomaly_level === 'red') { borderColor = '#fecaca'; bgColor = '#fef2f2'; }
    else if (isRealAnomaly(r) && r.anomaly_level === 'yellow') { borderColor = '#fed7aa'; bgColor = '#fff7ed'; }
    
    return `
      <div class="rounded-lg border p-3 mgmt-clickable" style="border-color:${borderColor};background:${bgColor};cursor:pointer"
           onclick="openSiteModal('${ref}', true)">
        <div class="flex items-start justify-between gap-2 mb-1">
          <p class="font-semibold text-sm flex-1">${r.name || '(無名稱)'}</p>
          <span class="text-xs px-1.5 py-0.5 rounded shrink-0" style="background:rgba(0,0,0,0.06);color:var(--ink-soft)">${stageLabel}</span>
        </div>
        <p class="text-xs" style="color:var(--ink-soft)">${r.mgmt||'-'}管理處${r.county?' · '+r.county:''}${r.township||''}</p>
        <div class="flex items-center gap-3 text-xs mt-2 pt-2 border-t flex-wrap" style="border-color:rgba(0,0,0,0.06)">
          <span style="color:var(--ink-soft)">容量 <strong>${capStr}</strong></span>
          ${r.vendor ? `<span style="color:var(--ink-soft)">廠商 <strong>${(r.vendor||'').split('(')[0].trim()}</strong></span>` : ''}
        </div>
        ${r.progress ? `<p class="text-xs mt-1" style="color:var(--ink-muted)">進度:${r.progress}</p>` : ''}
        ${r.reason ? `<p class="text-xs mt-1" style="color:#991b1b">原因:${r.reason}</p>` : ''}
        ${r.operation ? `<p class="text-xs mt-1" style="color:var(--ink-soft)">辦理情形:${String(r.operation).substring(0, 60)}${String(r.operation).length > 60 ? '...' : ''}</p>` : ''}
      </div>
    `;
  }).join('');
  
  return `
    <div class="modal-backdrop no-print" onclick="if(event.target===this)closeModal()">
      <div class="modal-content" style="max-width:1000px;max-height:90vh;overflow:auto">
        <div class="sticky top-0 bg-white border-b px-6 py-4 flex items-center justify-between" style="border-color:var(--border);z-index:1">
          <div>
            <h3 class="text-lg font-bold" style="color:${color}">${title}</h3>
            ${subtitle ? `<p class="text-xs mt-1" style="color:var(--ink-soft)">${subtitle}</p>` : ''}
            <p class="text-xs mt-1" style="color:var(--ink-muted)">共 ${caseRefs.length} 筆,點任一筆查看詳細資料</p>
          </div>
          <button class="icon-btn" onclick="closeModal()">✕ 關閉</button>
        </div>
        <div class="p-6">
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">${cards}</div>
        </div>
      </div>
    </div>
  `;
}

// 顯示與本案場關聯的輿情(若有)
function tplSiteRelatedOpinions(caseRef) {
  const tab = caseRef.startsWith('solar:') ? 'solar' : 'hydro';
  const opinions = loadOpinions(tab);
  const related = opinions.filter(op => op.case_ref === caseRef);
  if (related.length === 0) return '';
  
  return `
    <div class="mt-4 p-3 rounded-lg" style="background:#fffbeb;border:1px solid #fbbf24">
      <p class="text-xs font-bold mb-2" style="color:#92400e">📢 與此案場關聯的輿情事件 (${related.length})</p>
      <div class="space-y-2">
        ${related.map(op => `
          <div class="text-xs p-2 rounded" style="background:white;border:1px solid #fde68a">
            <div class="flex items-center gap-2 flex-wrap">
              <span style="color:${(OPINION_SEVERITIES[op.severity]||OPINION_SEVERITIES.medium).color};font-weight:bold">${(OPINION_SEVERITIES[op.severity]||OPINION_SEVERITIES.medium).label}</span>
              <span style="color:${(OPINION_STATUSES[op.status]||OPINION_STATUSES.unhandled).color}">${(OPINION_STATUSES[op.status]||OPINION_STATUSES.unhandled).label}</span>
            </div>
            <p class="mt-1 font-medium">${op.title}</p>
            ${op.summary ? `<p class="mt-1" style="color:var(--ink-soft)">${op.summary}</p>` : ''}
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function openEditor(section) {

  state.editorRow = null;
  state.mgmtModal = null;
  state.siteModal = null;
  state.vendorModal = null;
  render();
}

function getEditorArray(section) {
  if (section === 'solar.summary') return [DATA.solar.summary];
  if (section === 'meta') return [{ updated_at: DATA.updated_at }];
  const [a, b] = section.split('.');
  return DATA[a][b];
}

function tplEditorModal() {
  const section = state.editor;
  const cfg = EDITOR_SECTIONS[section];
  if (!cfg) return '';
  const arr = getEditorArray(section);
  
  // 子頁籤
  const tabs = Object.entries(EDITOR_SECTIONS).map(([k, v]) => 
    `<button class="filter-btn ${section === k ? 'active' : ''}" onclick="state.editor='${k}';state.editorRow=null;render()">${v.label}</button>`
  ).join('');
  
  // 編輯表單(新增/編輯)
  let formHtml = '';
  if (state.editorRow !== null) {
    const isNew = state.editorRow === 'new';
    const row = isNew ? {} : arr[state.editorRow];
    formHtml = `
      <div class="rounded-xl border-2 p-4 mb-4" style="border-color:#f59e0b;background:#fffbeb">
        <h3 class="text-base font-bold mb-3">${isNew ? '➕ 新增' : '✏️ 編輯第 ' + (state.editorRow + 1) + ' 筆'}</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
          ${cfg.fields.map(f => {
            const val = row[f.k] !== undefined ? row[f.k] : (f.default || '');
            const wideCls = f.wide ? 'md:col-span-2' : '';
            if (f.type === 'select') {
              return `<div class="${wideCls}">
                <label class="block text-xs font-medium mb-1" style="color:var(--ink-soft)">${f.label}</label>
                <select id="edit-${f.k}" style="width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px">
                  ${f.options.map(o => `<option value="${o}" ${val === o ? 'selected' : ''}>${o || '(無)'}</option>`).join('')}
                </select>
              </div>`;
            }
            if (f.type === 'checkbox') {
              return `<div class="${wideCls}">
                <label class="flex items-center gap-2 text-xs font-medium" style="color:var(--ink-soft)">
                  <input type="checkbox" id="edit-${f.k}" ${val ? 'checked' : ''}>
                  ${f.label}
                </label>
              </div>`;
            }
            const step = f.step ? `step="${f.step}"` : '';
            return `<div class="${wideCls}">
              <label class="block text-xs font-medium mb-1" style="color:var(--ink-soft)">${f.label}</label>
              <input type="${f.type}" ${step} id="edit-${f.k}" value="${String(val).replace(/"/g,'&quot;')}" style="width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px">
            </div>`;
          }).join('')}
        </div>
        <div class="flex gap-2 mt-4 justify-end">
          <button class="icon-btn" onclick="state.editorRow=null;render()">取消</button>
          <button class="icon-btn" style="background:#10b981;color:white;border-color:#10b981" onclick="saveRow()">💾 儲存</button>

      </div>
    `;
  }
  
  // 表格列出資料
  const searchFields = ['name','vendor','mgmt','county'];
  const searchText = (state.editor + '_search' in state) ? state[state.editor + '_search'] : '';
  let displayArr = arr;
  if (searchText && !cfg.singleton) {
    const lc = searchText.toLowerCase();
    displayArr = arr.filter(r => searchFields.some(f => (r[f] || '').toString().toLowerCase().includes(lc)));

  return `
    <div class="modal-backdrop no-print" onclick="if(event.target===this)closeModal()">

              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  `;
}

function saveRow() {
  const section = state.editor;
  const cfg = EDITOR_SECTIONS[section];
  const arr = getEditorArray(section);
  const isNew = state.editorRow === 'new';
  const row = isNew ? {} : { ...arr[state.editorRow] };
  
  // 從表單收集資料
  cfg.fields.forEach(f => {
    const el = document.getElementById('edit-' + f.k);
    if (!el) return;
    let v;
    if (f.type === 'checkbox') v = el.checked;
    else if (f.type === 'number') v = el.value === '' ? 0 : parseFloat(el.value);
    else v = el.value;
    row[f.k] = v;
  });
  
  // 寫回
  if (section === 'solar.summary') {
    Object.assign(DATA.solar.summary, row);
  } else if (section === 'meta') {
    DATA.updated_at = row.updated_at;
  } else {
    if (isNew) {
      arr.push(row);
    } else {
      arr[state.editorRow] = row;
    }
  }
  
  // 重算彙總(編輯管理處目標時不需,但其他都需)
  if (section !== 'meta') recomputeSummaries();
  saveData();
  state.editorRow = null;
  render();
}

function deleteRow(idx) {
  const section = state.editor;
  const arr = getEditorArray(section);
  if (!confirm('確定要刪除第 ' + (idx + 1) + ' 筆:「' + (arr[idx].name || arr[idx].mgmt || '') + '」?')) return;
  arr.splice(idx, 1);
  recomputeSummaries();
  saveData();
  render();
}

// ==================== 編輯器 結束 ====================

function closeModal() {
  setState({ mgmtModal: null, vendorModal: null, siteModal: null, listModal: null, editor: null, editorRow: null, importPreview: null, importPreviewSelections: null, newProjectModal: false });
}

function printDashboard() {
  // 關閉 modal
  if (state.mgmtModal !== null || state.vendorModal !== null || state.siteModal !== null || state.listModal !== null || state.newProjectModal) {
    state.mgmtModal = null;
    state.vendorModal = null;
    state.siteModal = null;
    state.listModal = null;
    state.newProjectModal = false;
    render();
  }
  
  // 1. 列印前:處理 header 的 sticky / backdrop / z-50
  const header = document.querySelector('header');
  const savedHeaderClasses = header ? header.className : null;
  if (header) {
    header.className = header.className
      .replace(/\bsticky\b/g, '')
      .replace(/\btop-0\b/g, '')
      .replace(/\bz-50\b/g, '')
      .replace(/\bbackdrop-blur\b/g, '')
      .replace(/\bbg-white\/95\b/g, 'bg-white');
  }
  
  // 2. 列印前:處理寫死 height 的 canvas 容器
  // 不同尺寸給不同列印高度
  const heightMap = [
    { match: /height:480px/, print: '290px' },  // 小水力 mgmt cap (14 處)
    { match: /height:420px/, print: '290px' },  // 太陽光電 mgmt 進度 (14 處)
    { match: /height:400px/, print: '270px' },  // 一般大圖
    { match: /height:380px/, print: '270px' },  // 一般大圖
    { match: /height:300px/, print: '220px' },  // 中圖
    { match: /height:220px/, print: '200px' }   // 小圖(原因/年度/異常分佈等)
  ];
  
  const allCanvases = document.querySelectorAll('canvas');
  const savedWrappers = [];
  allCanvases.forEach(canvas => {
    const wrapper = canvas.parentElement;
    if (!wrapper) return;
    const style = wrapper.getAttribute('style') || '';
    for (const h of heightMap) {
      if (h.match.test(style)) {
        savedWrappers.push({ el: wrapper, style: style });
        wrapper.style.setProperty('height', h.print, 'important');
        break;
      }
    }
  });
  
  // 3. 還原函式 - 在 print 完還原
  const restore = () => {
    if (header && savedHeaderClasses) header.className = savedHeaderClasses;
    savedWrappers.forEach(s => {
      if (s.style) s.el.setAttribute('style', s.style);
      else s.el.removeAttribute('style');
    });
    // 還原後通知所有 chart 再 resize 一次
    setTimeout(() => {
      Object.values(chartInstances || {}).forEach(c => {
        if (c && typeof c.resize === 'function') try { c.resize(); } catch(e){}
      });
    }, 80);
    window.removeEventListener('afterprint', restore);
  };
  window.addEventListener('afterprint', restore);
  
  // 4. 觸發 chart 重繪 - 使用三段時序確保 Chart.js 內部計算完成
  // 階段 A: 立即 resize(讓 chart 知道容器變了)
  Object.values(chartInstances || {}).forEach(c => {
    if (c && typeof c.resize === 'function') try { c.resize(); } catch(e){}
  });
  
  // 階段 B: 兩次 RAF 確保 layout 完成
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      // 階段 C: 再 resize 一次,並對 horizontal bar chart (有 14 個 label 的) 特別 update
      Object.values(chartInstances || {}).forEach(c => {
        if (c && typeof c.resize === 'function') try { c.resize(); } catch(e){}
        // 強制重新計算 layout
        if (c && typeof c.update === 'function') try { c.update('none'); } catch(e){}
      });
      
      // 階段 D: 等動畫完成再 print
      setTimeout(() => {
        window.print();
        setTimeout(restore, 1500);
      }, 350);
    });
  });
}

function printFilteredView(target) {
  let title = '';

  let cardsHtml = '';
  let countText = '';
  
  if (target === 'solar-sites') {
    const f = state.solar;
    const all = [
      ...DATA.solar.completed_sites.map(s => ({...s, _stage: '已完工'})),
      ...DATA.solar.construction_sites.map(s => ({...s, _stage: s.stage})),
      ...DATA.solar.admin_sites.map(s => ({...s, _stage: '行政程序中'})),
      ...DATA.solar.planning_sites.map(s => ({...s, _stage: '規劃推動'}))
    ];
    const filtered = all.filter(s => {
      if (f.mgmt !== 'all' && s.mgmt !== f.mgmt) return false;
      if (f.type !== 'all' && s.type !== f.type) return false;
      if (f.stage !== 'all' && (s._stage || s.stage) !== f.stage) return false;
      if (f.search && !(s.name||'').toLowerCase().includes(f.search.toLowerCase()) && !(s.vendor||'').toLowerCase().includes(f.search.toLowerCase())) return false;
      return true;
    });
    title = '太陽光電案場層級檢視';
    if (f.mgmt !== 'all') conditionParts.push(f.mgmt + '管理處');
    if (f.type !== 'all') conditionParts.push(f.type);
    if (f.stage !== 'all') conditionParts.push(f.stage);
    if (f.search) conditionParts.push('關鍵字「' + f.search + '」');
    countText = '共 ' + filtered.length + ' 案,合計 ' + filtered.reduce((a,c)=>a+(parseFloat(c.capacity_mw)||0),0).toFixed(2) + ' MW';

async function exportPNG(sectionId, filename) {
  const el = document.getElementById(sectionId);
  if (!el) return;
  // 暫時隱藏 no-print 元素
  const noPrint = el.querySelectorAll('.no-print');
  noPrint.forEach(n => n.style.visibility = 'hidden');
  try {
    const canvas = await html2canvas(el, { backgroundColor: '#ffffff', scale: 2, useCORS: true, logging: false });
    const link = document.createElement('a');
    link.download = filename + '_' + DATA.updated_at + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch (e) {
    alert('匯出 PNG 失敗：' + e.message);
  } finally {
    noPrint.forEach(n => n.style.visibility = '');
  }
}
